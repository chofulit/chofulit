<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanye West 大全</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --bg2: #f9f9f7;
  --red: #C0392B;
  --ink: #1a1a1a;
  --mid: #555;
  --dim: #999;
  --border: #e8e8e8;
  --ann-bg: #fdf6f5;
  --ann-text: #a04030;
  --sidebar-w: 256px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--ink); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; }

/* ══ SIDEBAR ══ */
#sidebar {
  width: var(--sidebar-w); height: 100vh; background: var(--bg2);
  border-right: 1px solid var(--border); position: fixed; top: 0; left: 0;
  overflow-y: auto; z-index: 20; display: flex; flex-direction: column;
}
#sidebar-top {
  padding: 28px 22px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.sb-eyebrow { font-size: 9px; letter-spacing: 4px; text-transform: uppercase; color: var(--red); font-weight: 600; margin-bottom: 8px; }
.sb-brand { font-family: 'DM Sans', sans-serif; font-size: 18px; font-weight: 700; line-height: 1.25; }
.sb-sub { font-size: 11px; color: var(--mid); margin-top: 3px; }

/* Album accordion */
.sb-albums { flex: 1; padding: 8px 0 40px; }
.album-item { border-bottom: 1px solid var(--border); }
.album-toggle {
  width: 100%; background: none; border: none; text-align: left;
  padding: 14px 22px; cursor: pointer; display: flex; align-items: center;
  gap: 10px; font-family: 'DM Sans', sans-serif; transition: background 0.12s;
}
.album-toggle:hover { background: rgba(0,0,0,0.03); }
.album-toggle.open { background: color-mix(in srgb, var(--red) 6%, transparent); }
.album-chevron {
  font-size: 8px; color: var(--dim); transition: transform 0.2s; flex-shrink: 0; margin-right: 2px;
}
.album-toggle.open .album-chevron { transform: rotate(90deg); }
.album-thumb { width: 34px; height: 34px; object-fit: cover; border-radius: 3px; flex-shrink: 0; background: #1a1a1a; }
.album-info { flex: 1; min-width: 0; }
.album-name { font-size: 12.5px; font-weight: 600; color: var(--ink); line-height: 1.3; }
.album-toggle.open .album-name { color: var(--red); }
.album-year { font-size: 10px; color: var(--dim); margin-top: 1px; }

/* Track list (collapsible) */
.album-tracks {
  max-height: 0; overflow: hidden;
  background: rgba(0,0,0,0.015); border-top: 1px solid var(--border);
  transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1);
}
.album-tracks.open { max-height: 2000px; }
.track-btn {
  width: 100%; background: none; border: none; text-align: left;
  padding: 8px 22px 8px 36px; cursor: pointer; display: flex; gap: 10px;
  align-items: baseline; border-left: 3px solid transparent;
  transition: all 0.12s; font-family: 'DM Sans', sans-serif;
}
.track-btn:hover { background: rgba(0,0,0,0.03); }
.track-btn.active { border-left-color: var(--red); background: color-mix(in srgb, var(--red) 8%, transparent); }
.track-btn.active .track-name { color: var(--red); font-weight: 600; }
.track-btn.no-lyrics .track-name { color: var(--dim); }
.track-btn.no-lyrics.active .track-name { color: var(--red); font-weight: 600; }
.track-num { font-size: 9px; color: var(--dim); font-weight: 500; min-width: 16px; flex-shrink: 0; }
.track-info { flex: 1; min-width: 0; }
.track-name { font-size: 12px; color: var(--ink); font-weight: 500; line-height: 1.4; }
.track-feat { font-size: 10px; color: var(--dim); margin-top: 1px; }

/* ══ MAIN ══ */
#main { margin-left: var(--sidebar-w); flex: 1; padding-bottom: 120px; }

/* ══ SONG / ALBUM HEADER ══ */
.song-hdr, .album-hdr-main {
  padding: 52px 64px 40px; border-bottom: 2px solid var(--ink); max-width: 820px;
}
.hdr-track { font-size: 9px; letter-spacing: 4px; text-transform: uppercase; color: var(--red); font-weight: 600; margin-bottom: 14px; }
.hdr-title { font-family: 'DM Sans', sans-serif; font-size: 54px; line-height: 1.0; font-weight: 700; margin-bottom: 8px; }
.hdr-feat { font-family: 'DM Sans', sans-serif; font-size: 17px; color: var(--mid); margin-bottom: 24px; }
.hdr-meta { display: flex; flex-wrap: wrap; font-size: 12px; color: var(--mid); border-top: 1px solid var(--border); padding-top: 16px; margin-top: 8px; }
.hdr-meta-item { margin-right: 32px; margin-bottom: 6px; }
.hdr-meta-item b { color: var(--ink); font-weight: 600; display: block; font-size: 10px; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 1px; }
.hdr-desc { margin-top: 24px; font-size: 14px; line-height: 1.95; color: var(--mid); font-family: 'DM Sans', sans-serif; }

/* Album overview header */
.album-hdr-main { display: flex; gap: 40px; align-items: flex-start; }
.album-art img { width: 160px; height: 160px; object-fit: cover; display: block; }
.album-art-ph { width: 160px; height: 160px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #555; text-align: center; letter-spacing: 2px; text-transform: uppercase; }
.album-body { flex: 1; }
.album-body .hdr-title { font-size: 42px; }

/* ══ COMING SOON ══ */
.coming-soon-wrap { padding: 60px 64px; max-width: 820px; }
.cs-rule { width: 40px; height: 2px; background: var(--red); margin-bottom: 28px; }
.cs-title { font-family: 'DM Sans', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 12px; }
.cs-body { font-size: 14px; line-height: 1.95; color: var(--mid); margin-bottom: 32px; }
.cs-tracklist { border-top: 1px solid var(--border); }
.cs-track { display: flex; gap: 16px; align-items: baseline; padding: 10px 0; border-bottom: 1px solid var(--border); }
.cs-num { font-size: 10px; color: var(--dim); min-width: 24px; font-weight: 500; }
.cs-name { font-size: 13px; color: var(--ink); }
.cs-feat-sm { font-size: 11px; color: var(--dim); margin-top: 2px; }

/* ══ SAMPLE COMPONENT ══ */
.sample-section { max-width: 820px; border-bottom: 1px solid var(--border); background: var(--bg2); }
.sample-toggle {
  display: flex; align-items: center; gap: 10px; width: 100%;
  background: none; border: none; border-top: 2px solid var(--red);
  padding: 13px 28px; cursor: pointer; font-family: 'DM Sans', sans-serif;
  text-align: left; transition: background 0.12s;
}
.sample-toggle:hover { background: rgba(192,57,43,0.04); }
.sample-toggle-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; font-weight: 600; color: var(--ink); }
.sample-toggle-chevron { font-size: 9px; color: var(--red); transition: transform 0.2s; }
.sample-section.open .sample-toggle-chevron { transform: rotate(90deg); }
.sample-body { display: none; }
.sample-section.open .sample-body { display: block; }
.sample-heading { padding: 16px 28px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 20px; }
.sample-label { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; font-weight: 600; color: var(--red); }
.sample-item { border-bottom: 1px solid var(--border); }
.sample-item:last-child { border-bottom: none; }
.sample-item-hdr { display: flex; align-items: center; gap: 10px; padding: 12px 28px; background: rgba(192,57,43,0.05); font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--ink); border-bottom: 1px solid var(--border); }
.sample-item-num { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 50%; background: var(--red); color: #fff; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.sample-item-rel { font-size: 10px; font-weight: 600; color: var(--red); letter-spacing: 0; padding: 2px 8px; border: 1px solid var(--red); border-radius: 3px; }
/* ── WAYAKU VIDEO ── */
.wayaku-section { max-width: 820px; padding: 28px 64px 8px; }
.wayaku-label { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; font-weight: 600; color: var(--red); margin-bottom: 14px; }
.wayaku-section .sample-embed { max-width: 400px; }
.sample-tracks { display: grid; grid-template-columns: 1fr 44px 1fr; align-items: stretch; background: var(--bg); }
.sample-track { padding: 22px 28px; display: flex; flex-direction: column; }
.sample-track .sample-ts { margin-top: auto; }
.sample-role { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--dim); font-weight: 600; margin-bottom: 14px; }
.sample-track-info { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 16px; }
.sample-art { width: 64px; height: 64px; object-fit: cover; flex-shrink: 0; }
.sample-art-ph { width: 64px; height: 64px; flex-shrink: 0; background: #1a1a1a; display: flex; align-items: center; justify-content: center; font-size: 8px; color: #666; text-align: center; line-height: 1.5; padding: 6px; }
.sample-meta { flex: 1; min-width: 0; }
.sample-track-name { font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; color: var(--ink); line-height: 1.3; margin-bottom: 4px; }
.sample-artist { font-size: 12px; color: var(--mid); margin-bottom: 5px; }
.sample-album { font-size: 11px; color: var(--dim); line-height: 1.7; }
.sample-ts { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding-top: 14px; }
.sample-ts-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); font-weight: 600; }
.sample-ts-time { font-size: 16px; font-weight: 700; color: var(--ink); letter-spacing: -0.5px; }
.sample-ts-link { font-size: 11px; color: var(--red); text-decoration: none; border: 1px solid var(--red); padding: 5px 12px; font-weight: 600; flex-shrink: 0; transition: background 0.12s, color 0.12s; background: none; font-family: 'DM Sans', sans-serif; cursor: pointer; border-radius: 3px; }
.sample-ts-link:hover { background: var(--red); color: #fff; }
.sample-connector { display: flex; align-items: center; justify-content: center; }
.sample-arrow { width: 28px; height: 28px; background: var(--red); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; }
.sample-embed { position: relative; width: 100%; aspect-ratio: 16 / 9; margin-bottom: 16px; background: #000; border-radius: 4px; overflow: hidden; }
.sample-embed iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
.sample-footer { border-top: 1px solid var(--border); padding: 10px 28px; display: flex; align-items: center; justify-content: space-between; background: var(--bg); font-size: 11px; color: var(--dim); }
.sample-footer-link { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--mid); text-decoration: none; border-bottom: 1px solid var(--border); transition: color 0.12s; }
.sample-footer-link:hover { color: var(--ink); border-bottom-color: var(--ink); }

/* ══ LYRICS ══ */
.lyrics-wrap { padding: 0 64px; max-width: 820px; }
.sec-header { margin: 48px 0 20px; display: flex; align-items: center; gap: 16px; }
.sec-rule { flex: 1; height: 1px; background: var(--border); }
.sec-label-text { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--dim); font-weight: 600; white-space: nowrap; }
.sec-note { font-size: 13px; line-height: 1.85; color: var(--mid); margin-bottom: 20px; font-style: italic; padding-left: 16px; border-left: 2px solid var(--border); }
.lyric-block { padding: 6px 0; }
.en-line { font-size: 16px; line-height: 1.7; color: var(--ink); white-space: pre-wrap; font-weight: 400; }
.ja-line { font-size: 14px; line-height: 1.75; color: var(--mid); white-space: pre-wrap; margin-top: 2px; font-family: 'Noto Sans JP', sans-serif; font-weight: 300; }
.ann-line { font-size: 12.5px; line-height: 1.85; color: var(--ann-text); margin-top: 8px; padding: 10px 14px; background: var(--ann-bg); border-left: 2px solid var(--red); }
.ann-star { font-weight: 700; margin-right: 4px; }
.spacer { height: 10px; }

/* ══ GLOSSARY ══ */
.gl-term { border-bottom: 1px solid #c0392b66; cursor: pointer; transition: color 0.12s; }
.gl-term:hover { color: var(--red); border-bottom-color: var(--red); }
#term-pop {
  position: fixed; background: #fff; border: 1.5px solid var(--ink); border-radius: 4px;
  padding: 14px 18px; max-width: 290px; z-index: 200; font-size: 12.5px; line-height: 1.75;
  color: var(--mid); display: none; box-shadow: 3px 3px 0 rgba(0,0,0,0.08);
}
#term-pop .tp-type { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; color: var(--red); font-weight: 600; margin-bottom: 4px; }
#term-pop .tp-name { font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 700; color: var(--ink); margin-bottom: 8px; }

/* ══ HOME ══ */
.home-hero {
  background: #0d0d0d; color: #fff; padding: 72px 64px 64px;
}
.home-hero-eye { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; color: rgba(255,255,255,0.4); font-weight: 600; margin-bottom: 20px; }
.home-hero-title { font-size: 64px; line-height: 1.0; font-weight: 700; margin-bottom: 20px; letter-spacing: -2px; }
.home-hero-body { font-size: 15px; line-height: 1.8; color: rgba(255,255,255,0.55); max-width: 560px; margin-bottom: 48px; }
.home-hero-stats { display: flex; gap: 48px; border-top: 1px solid rgba(255,255,255,0.12); padding-top: 32px; }
.home-stat-num { font-size: 38px; font-weight: 700; letter-spacing: -2px; line-height: 1; }
.home-stat-label { font-size: 10px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 2px; margin-top: 4px; }
.home-discog-section { padding: 48px 0 80px; }
.home-discog-hdr { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--dim); font-weight: 600; padding: 0 64px 20px; border-bottom: 1px solid var(--border); margin-bottom: 3px; }
.home-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; }
.home-card {
  position: relative; aspect-ratio: 1 / 1; background: #1a1a1a;
  border: none; cursor: pointer; overflow: hidden; padding: 0;
}
.home-card-art {
  width: 100%; height: 100%; background-size: cover; background-position: center;
  transition: transform 0.45s cubic-bezier(0.25,0.46,0.45,0.94);
  display: flex; align-items: center; justify-content: center;
}
.home-card-img {
  position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.45s cubic-bezier(0.25,0.46,0.45,0.94);
}
.home-card:hover .home-card-img { transform: scale(1.06); }
.home-card:hover .home-card-art { transform: scale(1.06); }
.home-card-ph-text {
  font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(255,255,255,0.3); text-align: center; line-height: 1.8; pointer-events: none;
}
.home-card-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.4) 60%, rgba(0,0,0,0) 100%);
  padding: 40px 14px 14px;
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.25,0.46,0.45,0.94);
  text-align: left;
}
.home-card:hover .home-card-overlay { transform: translateY(0); }
.home-card-num { font-size: 9px; color: rgba(255,255,255,0.45); letter-spacing: 2px; margin-bottom: 3px; }
.home-card-title { font-size: 12px; font-weight: 600; color: #fff; line-height: 1.3; margin-bottom: 6px; }
.home-card-badge { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; }
.home-card-badge.done { color: #4ade80; }
.home-card-badge.wip { color: rgba(255,255,255,0.3); }

/* ══ MOBILE TOP BAR (hidden on desktop) ══ */
#mobile-bar { display: none; }
#sidebar-overlay { display: none; }

@media (max-width: 820px) {
  /* Mobile top bar */
  #mobile-bar {
    display: flex; align-items: center; gap: 14px;
    position: fixed; top: 0; left: 0; right: 0; height: 54px; z-index: 40;
    background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 16px;
  }
  #menu-btn { width: 30px; height: 30px; background: none; border: none; cursor: pointer; padding: 5px; display: flex; flex-direction: column; justify-content: space-between; flex-shrink: 0; }
  #menu-btn span { display: block; height: 2px; width: 100%; background: var(--ink); border-radius: 2px; transition: all 0.25s; }
  body.nav-open #menu-btn span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  body.nav-open #menu-btn span:nth-child(2) { opacity: 0; }
  body.nav-open #menu-btn span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
  .mobile-brand { background: none; border: none; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 700; color: var(--ink); cursor: pointer; padding: 0; }

  /* Off-canvas drawer */
  #sidebar {
    width: 82%; max-width: 320px; transform: translateX(-100%);
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1); z-index: 50; top: 0; height: 100vh;
  }
  body.nav-open #sidebar { transform: translateX(0); }
  #sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 45; opacity: 0; transition: opacity 0.28s; }
  body.nav-open #sidebar-overlay { display: block; opacity: 1; }

  #main { margin-left: 0; padding-top: 54px; padding-bottom: 80px; }

  /* Content paddings */
  .song-hdr, .album-hdr-main { padding: 32px 20px 28px; }
  .lyrics-wrap, .coming-soon-wrap { padding: 0 20px; }
  .wayaku-section { padding: 24px 20px 4px; }
  .hdr-title { font-size: 30px; }
  .hdr-feat { font-size: 14px; }
  .album-body .hdr-title { font-size: 26px; }
  .album-hdr-main { flex-direction: column; gap: 20px; }
  .hdr-meta-item { margin-right: 20px; }

  /* Samples stack vertically */
  .sample-tracks { grid-template-columns: 1fr; }
  .sample-track { padding: 18px 20px; }
  .sample-connector { padding: 4px 0; }
  .sample-connector .sample-arrow { transform: rotate(90deg); }
  .sample-toggle, .sample-item-hdr { padding-left: 20px; padding-right: 20px; }
  .wayaku-section .sample-embed { max-width: 100%; }

  /* Lyrics readability */
  .en-line { font-size: 15px; }
  .ja-line { font-size: 14px; }
  .sec-header { margin: 36px 0 16px; }

  /* Home */
  .home-hero { padding: 40px 20px 36px; }
  .home-hero-title { font-size: 38px; letter-spacing: -1px; }
  .home-hero-body { font-size: 14px; }
  .home-hero-stats { gap: 28px; flex-wrap: wrap; }
  .home-stat-num { font-size: 30px; }
  .home-discog-hdr { padding: 0 20px 16px; }
  .home-grid { grid-template-columns: repeat(2, 1fr); }
  .home-card-overlay { transform: translateY(0); background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.2) 70%, rgba(0,0,0,0) 100%); }

  /* Glossary popup fits screen */
  #term-pop { max-width: calc(100vw - 32px); }
}
</style>
</head>
<body>

<header id="mobile-bar">
  <button id="menu-btn" aria-label="メニュー" onclick="toggleSidebar()">
    <span></span><span></span><span></span>
  </button>
  <button class="mobile-brand" onclick="navigate('home')">Kanye West 大全</button>
</header>
<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<nav id="sidebar">
  <div id="sidebar-top">
    <div class="sb-eyebrow">和訳解説</div>
    <button class="sb-brand" onclick="navigate('home')" style="background:none;border:none;cursor:pointer;padding:0;text-align:left;display:block;width:100%;font-family:inherit;">Kanye West 大全</button>
    <div class="sb-sub">ディスコグラフィー</div>
  </div>
  <div class="sb-albums" id="album-nav"></div>
</nav>

<main id="main">
  <div id="content"></div>
</main>

<div id="term-pop"></div>

<script>
// ══════════════════════════════════════════
// DATA
// ══════════════════════════════════════════
const GLOSSARY = {
  "Common": {type:"アーティスト", desc:"シカゴ出身のコンシャス・ラッパー（本名：Lonnie Rashid Lynn）。Kanyeが最も尊敬するラッパーの一人で、この時期Kanyeとともに名盤『Be』(2005)を制作。"},
  "Gil Scott-Heron": {type:"アーティスト", desc:"詩人・ミュージシャン（1949–2011）。ジャズとポエトリー・リーディングを融合させた「ヒップホップの祖父」。My Way Homeでサンプル使用。"},
  "The Game": {type:"アーティスト", desc:"ウエストコースト（コンプトン）出身のラッパー（本名：Jayceon Terrell Taylor）。Crack Musicでフィーチャリング参加。"},
  "Brandy": {type:"アーティスト", desc:"R&B歌手（本名：Brandy Rayana Norwood）。「The Boy Is Mine」(1998)等で90年代を席巻。Bring Me Downでフィーチャリング参加。"},
  "Malik Yusef": {type:"人物", desc:"シカゴ出身の詩人・アクティビスト。Kanyeの友人で多くのアルバムにアウトロとして参加。"},

        {en:"Had lil' kids sing about the shit—y'know, the joke's on you",ja:"子供たちにそんな曲を歌わせて——皮肉はお前に返ってくるぞ",ann:null},
        {en:"You throw your motherfucking hands in the air and wave goodbye to every-motherfucking-body",ja:"両手を空に上げて、全員に手を振って別れを告げろ",ann:null},
        {en:"'Cause, you getting the fuck out of this campus",ja:"なぜなら、お前はこのキャンパスから出て行くんだから",ann:null},
        {en:"What the fuck you gon' do now?",ja:"お前はこれからどうするんだ？",ann:null}
      ]},
      {label:"[Verse: John Legend]",note:"John Legend（ジョン・レジェンド、本名John Roger Stephens、1978〜）：オハイオ州スプリングフィールド出身のR&Bシンガー・ピアニスト。Kanyeの長年の友人で、この時点ではまだソロデビュー前（「Ordinary People」でのデビューは本作より後）。後にEGOT（Emmy・Grammy・Oscar・Tony全受賞）を達成した唯一の黒人アーティスト。",lines:[
        {en:"I'm no longer confused, but, don't tell anybody",ja:"もう迷っていない、でも誰にも言うな",ann:null},
        {en:"I'm about to break the rules, but, don't tell anybody",ja:"ルールを破ろうとしている、でも誰にも言うな",ann:null},
        {en:"I got something better than school, so don't tell anybody",ja:"学校より良いものがある、だから誰にも言うな",ann:null},
        {en:"My momma would kill me, so, don't tell anybody",ja:"ママに殺されちゃうから、誰にも言うな",ann:null},
        {en:"She wants me to get a good-ass job, just like everybody",ja:"ママは俺にも皆と同じように良い仕事に就いてほしいと思ってる",ann:null},
        {en:"She ain't walked in my shoes, I'm just not everybody",ja:"ママは俺の立場にはなれない、俺はみんなと同じじゃない",ann:null}
      ]}
    ]
  }},

    whosampledUrl:"https://www.whosampled.com/Kanye-West/All-Falls-Down/",
    artwork:"1. The College Dropout/College Dropout artwork.jpg",
    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"物質主義・自己嫌悪・インセキュリティに支配される若い黒人女性と、最後に自分自身も同じ問題を抱えていると告白するKanyeを描いた曲。Lauryn Hill「Mystery of Iniquity」のクリアランス（使用許可）が下りなかったため、Syleena Johnsonが代わりにそのメロディを歌っている。歌詞にはThe Notorious B.I.G.「Real Niggaz」やKanye自身「Wow」の一節も引用されている。DeRayのアウトロで「グレイブシフト（深夜勤務）」が「奴隷船」と重ねられ、アルバム全体のテーマと接続する。",
    sections:[
      {label:"[Chorus: Syleena Johnson & Kanye West]",note:"Syleena Johnson（サイリーナ・ジョンソン）：シカゴ出身のR&Bシンガー。Lauryn Hillに近い声質で「Oh when it all falls down」を歌っている。",lines:[
        {en:"Oh, when it all, it all falls down",ja:"ああ、全てが、全てが崩れ落ちるとき",ann:null},
        {en:"(Yeah, this the real one, baby)",ja:"（そう、これが本物だ、ベイビー）",ann:null},
        {en:"I'm tellin' you all, it all falls down",ja:"みんなに言う、全ては崩れ落ちる",ann:null},
        {en:"(Uh, Chi-Town, stand up)",ja:"（シカゴ、立ち上がれ）",ann:null},
        {en:"Oh, when it all, it all falls down",ja:"ああ、全てが、全てが崩れ落ちるとき",ann:null},
        {en:"(Southside, Southside, we gon' set this party off right)",ja:"（サウスサイド、サウスサイド、このパーティーをちゃんと盛り上げる）",ann:null},
        {en:"I'm tellin' you all, it all falls down",ja:"みんなに言う、全ては崩れ落ちる",ann:null},
        {en:"(Westside, Westside, we gon' set this party off right)",ja:"（ウェストサイド、ウェストサイド、このパーティーをちゃんと盛り上げる）",ann:null},
        {en:"Oh, when it all",ja:"ああ、全てが",ann:null}
      ]},
      {label:"[Verse 1: Kanye West]",note:null,lines:[
        {en:"Man, I promise, she's so self-conscious",ja:"約束するが、彼女は本当に自意識過剰だ",ann:null},
        {en:"She has no idea what she doin' in college",ja:"大学で何をしているのか自分でもわかっていない",ann:null},
        {en:"That major that she majored in don't make no money",ja:"彼女が専攻した学科では金にならない",ann:null},
        {en:"But she won't drop out, her parents'll look at her funny",ja:"でも中退できない——親に変な目で見られるから",ann:null},
        {en:"Now, tell me that ain't insecurr",ja:"これが不安じゃないと言えるか",ann:"このヴァースでKanyeはわざと「insecure / secure / career / here」を「insecurr / securr / carurr / hurr」と崩して韻を踏む遊びをしている。"},
        {en:"The concept of school seems so securr",ja:"学校という概念はとても安定して見える",ann:null},
        {en:"Sophomore, three yurrs, ain't picked a carurr",ja:"2年生のまま3年経っても進路を決められない",ann:null},
        {en:"She like, \"Fuck it, I'll just stay down hurr and do hair\"",ja:"もうどうでもいい、ここに残って美容師でもやる、という感じ",ann:null},
        {en:"'Cause that's enough money to buy her a few pairs",ja:"それでもスニーカーを何足か買える程度の金になるから",ann:null},
        {en:"Of new Airs, 'cause her baby daddy don't really care",ja:"新しいエアマックスの——ベイビーダディはあまり気にかけてないから",ann:null},
        {en:"She's so precious with the peer pressure",ja:"仲間からのプレッシャーがかかる場面でそんなに大事なのか",ann:null},
        {en:"Couldn't afford a car, so she named her daughter Alexis",ja:"車が買えないから、娘をアレクシスと名付けた",ann:"「Alexis（アレクシス）」：レクサスの高級セダン「LS」に近い音。車が買えないため娘に高級車の名前を付けるという皮肉の中に、物質的憧れの構造が込められている。"},
        {en:"She had hair so long that it looked like weave",ja:"ウィッグに見えるほど長い髪があった",ann:null},
        {en:"Then she cut it all off, now she look like Eve",ja:"全部切ってしまって、今はイヴのように見える",ann:"Eve（イヴ）：フィラデルフィア出身のラッパー。スキンヘッド（ボーズ）で知られる2000年代初頭の女性MC。"},
        {en:"And she be dealin' with some issues that you can't believe",ja:"信じられない問題を抱えている",ann:null},
        {en:"Single black female addicted to retail and well",ja:"小売り依存症の独身黒人女性、そして",ann:null}
      ]},
      {label:"[Chorus: Syleena Johnson & Kanye West]",note:null,lines:[
        {en:"Oh, when it all, it all falls down",ja:"ああ、全てが、全てが崩れ落ちるとき",ann:null},
        {en:"(Uh, and when it falls down, who you gon' call now?)",ja:"（全てが崩れたとき、誰に頼る？）",ann:null},
        {en:"I'm tellin' you all, it all falls down",ja:"みんなに言う、全ては崩れ落ちる",ann:null},
        {en:"(C'mon, c'mon, and when it all falls down)",ja:"（さあ、全てが崩れるとき）",ann:null},
        {en:"Oh, when it all",ja:"ああ、全てが",ann:null}
      ]},
      {label:"[Verse 2: Kanye West]",note:null,lines:[
        {en:"Man, I promise, I'm so self-conscious",ja:"約束するが、俺は本当に自意識過剰だ",ann:null},
        {en:"That's why you always see me with at least one of my watches",ja:"だから俺はいつも少なくとも一本時計を着けているのが見える",ann:null},
        {en:"Rollies and Pashas done drove me crazy",ja:"ロレックスとカルティエのパシャが俺を狂わせた",ann:"Rollie（ロリー）：ロレックスの愛称。Pasha（パシャ）：カルティエの時計シリーズ。どちらも高級時計の象徴。"},
        {en:"I can't even pronounce nothing, pass that Ver-say-cee",ja:"何も発音できない、そのヴェルサーチをよこせ",ann:"Versace（ヴェルサーチ）をあえて「ヴェルサーシー」と誤った発音で読み、ブランドに不慣れな自分を自嘲している。"},
        {en:"Then I spent four hundred bucks on this",ja:"そしてこれに400ドル使った",ann:null},
        {en:"Just to be like, \"Nigga, you ain't up on this\"",ja:"「お前はこれを知らないだろ」と言うためだけに",ann:null},
        {en:"And I can't even go to the grocery store",ja:"スーパーにも行けない",ann:null},
        {en:"Without some 1s that's clean and a shirt with a team",ja:"きれいなエアフォースワンとチームのシャツなしでは",ann:"1s＝Nike Air Force 1。きれいなスニーカーなしでは外出できないという見栄の心理。"},
        {en:"It seem we livin' the American Dream",ja:"アメリカンドリームを生きているように見える",ann:null},
        {en:"But the people highest up got the lowest self-esteem",ja:"でも最も高い地位にいる人々が最も低い自尊心を持っている",ann:null},
        {en:"The prettiest people do the ugliest things",ja:"最も美しい人々が最も醜いことをする",ann:null},
        {en:"For the road to riches and diamond rings",ja:"富と宝石の指輪への道のために",ann:null},
        {en:"We shine because they hate us, floss 'cause they degrade us",ja:"憎まれるから輝く、見下されるから見せびらかす",ann:null},
        {en:"We tryna buy back our forty acres",ja:"俺たちは40エーカーを買い戻そうとしている",ann:"「40エーカー（forty acres）」：南北戦争終結後の1865年、解放された黒人奴隷に土地（40エーカーとラバ1頭）を与えるという政府の約束が果たされなかった史実への言及。物質主義的消費を、奪われた歴史的権利の回復行為として解釈する視点。"},
        {en:"And for that paper, look how low we'll stoop",ja:"その金のために、俺たちはどれほど身を低くするか",ann:null},
        {en:"Even if you in a Benz, you still a nigga in a coupe",ja:"ベンツに乗っていても、クーペに乗ったニガーにすぎない",ann:"「coupe」と「coon（黒人への蔑称）」を掛けた言葉遊び。どれだけ成功しても差別の視線からは逃れられないという含意。"}
      ]},
      {label:"[Chorus: Syleena Johnson & Kanye West]",note:null,lines:[
        {en:"Oh, when it all, it all falls down",ja:"ああ、全てが、全てが崩れ落ちるとき",ann:null},
        {en:"(Come on, come on, and when it falls down, who you gon' call now?)",ja:"（さあ、全てが崩れたとき、誰に頼る？）",ann:null},
        {en:"I'm tellin' you all, it all falls down",ja:"みんなに言う、全ては崩れ落ちる",ann:null},
        {en:"(Come on, come on, and when it all falls down)",ja:"（さあ、全てが崩れるとき）",ann:null},
        {en:"Oh, when it all",ja:"ああ、全てが",ann:null}
      ]},
      {label:"[Verse 3: Kanye West]",note:null,lines:[
        {en:"I say, \"Fuck the police,\" that's how I treat 'em",ja:"「警察なんてクソだ」、それが俺の態度だ",ann:null},
        {en:"We buy our way out of jail, but we can't buy freedom",ja:"刑務所からは金で出られるが、自由は買えない",ann:null},
        {en:"We'll buy a lot of clothes, but we don't really need 'em",ja:"たくさんの服を買う、でも本当には必要じゃない",ann:null},
        {en:"Things we buy to cover up what's inside",ja:"内側にあるものを隠すために買うもの",ann:null},
        {en:"'Cause they made us hate ourself and love they wealth",ja:"彼らが俺たちに自分を憎ませ、彼らの富を愛させたから",ann:null},
        {en:"That's why shorty's hollerin', \"Where the ballers at?\"",ja:"だからショーティーは「金持ちはどこにいる？」と叫ぶ",ann:null},
        {en:"Drug dealer buy Jordan, crackhead buy crack",ja:"麻薬売人はジョーダンを買い、クラックヘッドはクラックを買う",ann:null},
        {en:"And the white man get paid off of all of that",ja:"そして白人はその全てから利益を得ている",ann:null},
        {en:"But I ain't even gon' act holier than thou",ja:"でも俺は聖人ぶるつもりはない",ann:null},
        {en:"'Cause fuck it, I went to Jacob with twenty-five thou'",ja:"だってクソ、俺も25000ドルを持ってジェイコブのところへ行ったから",ann:"Jacob the Jeweler（ジェイコブ・ザ・ジュエラー）：ニューヨークのダイヤモンドジュエラー、Jacob Arabo。25000ドルを持ってジュエラーへ行く行為を自嘲的に告白する場面。"},
        {en:"Before I had a house and I'd do it again",ja:"家を買う前にそうしたし、また同じことをするだろう",ann:null},
        {en:"'Cause I wanna be on 106 & Park, pushin' a Benz",ja:"106 & Parkに出てベンツを乗り回したいから",ann:"106 & Park：BET（Black Entertainment Television）の人気音楽番組。黒人音楽の主要なプロモーション媒体だった2000年代の象徴。"},
        {en:"I want to act ballerific like it's all terrific",ja:"全てが素晴らしいかのようにボーラーのように振る舞いたい",ann:null},
        {en:"I got a couple past-due bills, I won't get specific",ja:"支払い期限を過ぎた請求書がいくつかある、具体的には言わない",ann:null},
        {en:"I got a problem with spendin' before I get it",ja:"稼ぐ前に使ってしまう問題がある",ann:null},
        {en:"We all self-conscious, I'm just the first to admit it",ja:"俺たちは皆自意識過剰だ、俺はただ最初にそれを認めただけ",ann:null}
      ]},
      {label:"[Chorus: Syleena Johnson & Kanye West]",note:null,lines:[
        {en:"Oh, when it all, it all falls down",ja:"ああ、全てが、全てが崩れ落ちるとき",ann:null},
        {en:"(Yeah, c'mon, c'mon, and when it falls down, who you gon' call now?)",ja:"（さあ、全てが崩れたとき、誰に頼る？）",ann:null},
        {en:"I'm tellin' you all, it all falls down",ja:"みんなに言う、全ては崩れ落ちる",ann:null},
        {en:"(C'mon, c'mon, and when it falls down)",ja:"（さあ、全てが崩れるとき）",ann:null},
        {en:"Oh, when it all, it all falls down",ja:"ああ、全てが、全てが崩れ落ちるとき",ann:null},
        {en:"(Southside, Southside, we gon' set this party off right)",ja:"（サウスサイド、サウスサイド、このパーティーをちゃんと盛り上げる）",ann:null},
        {en:"I'm tellin' you all, it all falls down",ja:"みんなに言う、全ては崩れ落ちる",ann:null},
        {en:"(Chi-Town, Chi-Town, we gon' show 'em how we get down)",ja:"（シカゴ、シカゴ、俺たちのやり方を見せてやる）",ann:null},
        {en:"Oh, when it all, it all falls down\n(Now, Syleena, you just like a safe belt, you saved my life, c'mon)",ja:"ああ、全てが、全てが崩れ落ちるとき\n（サイリーナ、お前はシートベルトのようだ、俺の命を救ってくれた）",ann:null},
        {en:"I'm tellin' you all, it all falls down",ja:"みんなに言う、全ては崩れ落ちる",ann:null}
      ]},
      {label:"[Outro: DeRay]",note:null,lines:[
        {en:"I just can't keep workin' like this",ja:"もうこんな風には働き続けられない",ann:null},
        {en:"This grave shifts is like a slave ship",ja:"このグレイブシフト（深夜シフト）は奴隷船みたいだ",ann:"「grave shift（グレイブシフト）」：深夜勤務（graveyardシフト）を指す俗語。「slave ship（奴隷船）」との言葉遊びとして機能し、低賃金労働の搾取的な性質をアルバム全体のテーマと接続する。"}
      ]}

  {num:"05",title:"I'll Fly Away",feat:"feat. Tony Williams & DeRay Davis",hasLyrics:true,data:{
    num:"05",title:"I'll Fly Away",feat:"feat. Tony Williams & DeRay Davis",
    producer:"Kanye West",sample:null,sampleSources:[],whosampledUrl:null,
    wayakuUrl:"https://www.youtube.com/watch?v=JwyhxLkcYbA",
    artwork:"1. The College Dropout/College Dropout artwork.jpg",
    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"1929年作の伝統的なアメリカのゴスペル讃美歌「I'll Fly Away」をカバーしたインタールード的楽曲（サンプリングではなくカバー）。アルバム全体を貫く信仰・救済のテーマを体現し、前曲All Falls Downの重苦しさから解放感を与える役割を果たしている。The World Famous Tony Williams（トニー・ウィリアムズ）はThe College Dropoutに複数参加するゴスペル・R&B系ボーカルで、アルバムの霊的な柱として機能する。",
    sections:[
      {label:"[Verse: The World Famous Tony Williams & DeRay Davis]",note:null,lines:[
        {en:"One glad morning, when this life is over, I'll fly away",ja:"嬉しい朝が来て、この人生が終わったとき、私は飛び立つ",ann:"「I'll Fly Away」：1929年にAlbert E. Brumleyが作曲したゴスペル讃美歌。南部の白人プロテスタント教会で生まれたが、のちに黒人ゴスペルでも広く歌われるようになった。2000年の映画「O Brother, Where Art Thou?」でも使われ広く知られる。"},
        {en:"To a land where joy shall never end, oh, I'll fly away",ja:"喜びが終わることのない土地へ、ああ、私は飛び立つ",ann:null}
      ]},
      {label:"[Chorus: The World Famous Tony Williams & DeRay Davis]",note:null,lines:[
        {en:"Oh, I'll fly away, oh, glory",ja:"ああ、飛び立つ、ああ栄光よ",ann:null},
        {en:"I'll fly away",ja:"私は飛び立つ",ann:null},
        {en:"When I die, Hallelujah, bye and bye",ja:"私が死んだとき、ハレルヤ、そのうちに",ann:null},
        {en:"I'll fly away",ja:"私は飛び立つ",ann:null}
      ]}
    ]
  }},
  {num:"06",title:"Spaceship",feat:"feat. GLC & Consequence",hasLyrics:true,data:{
    num:"06",title:"Spaceship",feat:"feat. GLC & Consequence",
    producer:"Kanye West",
    youtubeUrl:"https://www.youtube.com/watch?v=2xQ-jL7TLS4",
    wayakuUrl:"https://www.youtube.com/watch?v=7RpTWsqCUiI",
    sample:"Marvin Gaye「Distant Lover」(1973)",
    sampleSources:[
      {artist:"Marvin Gaye",title:"Distant Lover",year:1973,
       url:"https://www.whosampled.com/sample/325/Kanye-West-GLC-Consequence-Spaceship-Marvin-Gaye-Distant-Lover/",
       youtubeUrl:"https://www.youtube.com/watch?v=RXg1QP-v8yA",
       useTimes:[1], useNote:"他", srcTimes:[11,22,32]}
    ],
    whosampledUrl:"https://www.whosampled.com/Kanye-West/Spaceship/",
    artwork:"1. The College Dropout/College Dropout artwork.jpg",
    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"Kanyeが音楽の夢を追いながらGap（衣料品チェーン）でアルバイトをしていた時期の実体験を描いた曲。黒人スタッフへの差別的な扱い、閉塞感、夢への渇望を「宇宙船で飛び立ちたい」という比喩で表現している。GLC、Consequenceがそれぞれの苦境を語るヴァースも加わる。歌詞にはRhymefest「Good Ass Job」(2001)の引用も含まれる。",
    sections:[
      {label:"[Chorus: Kanye West & GLC]",note:"Gap（ギャップ）：アメリカ最大手の衣料品チェーン。Kanyeは音楽デビュー前に実際にGapでアルバイトをしており、黒人客が過剰に監視される一方、自分が働き出すと「店のアイコン」として重宝された経験を本曲で語る。",lines:[
        {en:"I've been working this grave-shift",ja:"俺はずっとグレイブシフトで働いてきた",ann:null},
        {en:"And I ain't made shit",ja:"何も稼げなかった",ann:null},
        {en:"(Yeah, yeah)",ja:"（そうだ）",ann:null},
        {en:"I wish I could",ja:"できることなら",ann:null},
        {en:"(Me, too)",ja:"（俺も）",ann:null},
        {en:"Buy me a spaceship and fly",ja:"宇宙船を買って飛んでいきたい",ann:null},
        {en:"(I swear I do)",ja:"（本当にそう思う）",ann:null},
        {en:"Past the sky, oh",ja:"空の向こうへ、ああ",ann:null},
        {en:"GLC feel you, Ye—I feel you, man",ja:"GLCわかるぞ、イェ——わかる、マン",ann:null},
        {en:"I've been working this grave-shift",ja:"俺はずっとグレイブシフトで働いてきた",ann:null},
        {en:"And I ain't made shit",ja:"何も稼げなかった",ann:null},
        {en:"I wish I could",ja:"できることなら",ann:null},
        {en:"Buy me a spaceship and fly",ja:"宇宙船を買って飛んでいきたい",ann:null},
        {en:"Past the sky",ja:"空の向こうへ",ann:null},
        {en:"(Man, man, man...)",ja:"（マン、マン、マン……）",ann:null},
        {en:"Oh, oh, oh",ja:"ああ、ああ、ああ",ann:null}
      ]},
      {label:"[Verse 1: Kanye West]",note:null,lines:[
        {en:"If my manager insults me again",ja:"マネージャーにまた侮辱されたら",ann:null},
        {en:"I will be assaulting him",ja:"殴りかかるだろう",ann:null},
        {en:"After I fuck the manager up",ja:"マネージャーをやっつけた後",ann:null},
        {en:"Then, I'm gonna shorten the register up",ja:"レジを締めてやる",ann:null},
        {en:"Let's go back, back to the Gap",ja:"ギャップに戻ろう",ann:null},
        {en:"Look at my check—wasn't no scratch",ja:"俺の給料を見ろ——何もなかった",ann:null},
        {en:"So if I stole, wasn't my fault",ja:"だから盗んだとしても、俺のせいじゃない",ann:null},
        {en:"Yeah, I stole—never got caught",ja:"そうだ、盗んだ——バレなかった",ann:null},
        {en:"They take me to the back and pat me",ja:"俺を奥に連れて行ってパットダウン（所持品検査）される",ann:null},
        {en:"Asking me about some khakis",ja:"カーキパンツのことを聞かれる",ann:null},
        {en:"But let some Black people walk in",ja:"でも黒人のお客が入ってくると",ann:null},
        {en:"I bet you they show off their token blackie",ja:"トークン・ブラッキーとして俺を前に出してくるに違いない",ann:"token blackie（トークン・ブラッキー）：企業や組織が多様性を示すために形式的に置く黒人従業員を指す皮肉的な表現。"},
        {en:"Oh, now they love Kanye",ja:"ああ、今はみんなカニエが大好き",ann:null},
        {en:"\"Let's put him all in the front of the store\"",ja:"「彼を店の前に出そう」",ann:null},
        {en:"So I'm on break",ja:"だから俺は休憩中",ann:null},
        {en:"Next to the \"No Smoking\" sign with a blunt in the mall",ja:"モールの禁煙サインの横でブラントを吸いながら",ann:null},
        {en:"Taking my hits, writing my hits",ja:"ヒット（吸引）しながら、ヒット曲を書いている",ann:"hits（吸引）とhits（ヒット曲）の掛け言葉。"},
        {en:"Writing my rhymes, playing my mind",ja:"ライムを書き、心に思いをめぐらせる",ann:null},
        {en:"This fucking job can't help him",ja:"この仕事は何の助けにもならない",ann:null},
        {en:"So I quit, y'all welcome",ja:"だから辞めた、どうぞご自由に",ann:null},
        {en:"Y'all don't know my struggle",ja:"お前らには俺の苦しみはわからない",ann:null},
        {en:"Y'all can't match my hustle",ja:"お前らは俺のハッスルには追いつけない",ann:null},
        {en:"You can't catch my hustle",ja:"俺のハッスルには追いつけない",ann:null},
        {en:"You can't fathom my love, dude",ja:"俺の情熱は想像もできない",ann:null},
        {en:"Lock yourself in a room",ja:"部屋に閉じこもれ",ann:null},
        {en:"Doing five beats a day for three summers",ja:"3年の夏、毎日5つのビートを作れ",ann:"Kanyeの猛烈な制作量を象徴する有名なライン。後にこの一節がアルバム名の候補にもなった。"},
        {en:"That's A Different World like Cree Summer's",ja:"それがCree SummerのA Different Worldだ",ann:"A Different World（ア・ディファレント・ワールド）：黒人大学（HBCU）を舞台にしたNBCのシットコム（1987〜1993年）。Cree Summer（クリー・サマー）はその出演女優。"},
        {en:"I deserve to do these numbers",ja:"俺はこれだけの数字を出す資格がある",ann:null},
        {en:"\"The kid that made that deserves that Maybach!\"",ja:"「あれを作った子はマイバッハを受け取る資格がある！」",ann:null},
        {en:"So many records in my basement",ja:"地下室にレコードがあまりにも多い",ann:null},
        {en:"I'm just waitin' on my spaceship, blaow!",ja:"ただ宇宙船を待っているだけだ、ブラウ！",ann:null}
      ]},
      {label:"[Verse 2: GLC]",note:"GLC（本名Gregory L. Collins）：シカゴ南部出身のラッパー、Kanyeの幼馴染。働けど稼げない現実と、失った家族・友人への言及がある。",lines:[
        {en:"And I didn't even try to work a job",ja:"仕事をしようとも思わなかった",ann:null},
        {en:"Represent the mob at the same time",ja:"同時にモブ（ギャング）を代表しながら",ann:null},
        {en:"Thirsty on the grind, Chi state of mind",ja:"ハングリーに動き続け、シカゴの精神で",ann:null},
        {en:"Lost my mama, lost my mind",ja:"ママを失い、正気も失った",ann:null},
        {en:"Life, my love, that's not mine",ja:"人生よ、愛よ、それは俺のものじゃない",ann:null},
        {en:"\"Why you ain't signed?\" Wasn't my time",ja:"「なぜサインされてないんだ？」まだ俺の時じゃなかった",ann:null},
        {en:"Leave me alone, work for y'all",ja:"俺を放っておいてくれ、お前らのために働いてる",ann:null},
        {en:"Half of it's yours, half of it's mine",ja:"半分はお前らの、半分は俺の",ann:null},
        {en:"Only wanna ball, never wanna fall",ja:"ただボーラーになりたい、落ちたくない",ann:null},
        {en:"Gotta get mine, gotta take mine",ja:"俺のものを手に入れなければ、奪い取らなければ",ann:null},
        {en:"Got a Tec-9, reach my prime",ja:"Tec-9（銃）を持って、全盛期に到達する",ann:"Tec-9：安価な半自動拳銃。1990年代のギャング文化を象徴する銃。"},
        {en:"Gotta make these haters respect mine",ja:"このヘイターたちに俺を尊重させなければならない",ann:null},
        {en:"In the mall 'til 12 when my schedule had said 9",ja:"スケジュールは9時までなのに12時までモールにいた",ann:null},
        {en:"Putting them pants on shelves",ja:"棚にパンツを並べながら",ann:null},
        {en:"Waiting patiently, I ask myself",ja:"辛抱強く待ちながら、自分に問いかける",ann:null},
        {en:"Where I wanna go, where I wanna be",ja:"俺はどこに行きたいのか、どこにいたいのか",ann:null},
        {en:"Life is much more than running in the streets",ja:"人生はストリートを走り回ることよりずっと多くのものがある",ann:null},
        {en:"Holler at 'Ye, hit me with the beat",ja:"イェに声をかけて、ビートをくれ",ann:null},
        {en:"Put me on my feet, sounds so sweet",ja:"俺を立ち上がらせてくれ、最高だ",ann:null},
        {en:"Yes, I'm the same ol' G",ja:"そう、俺は変わらない同じGだ",ann:null},
        {en:"Same goatee, stayin' low-key, nope",ja:"同じあごひげ、低空飛行でいる、なんて",ann:null},
        {en:"Holler at God: \"Man, why'd You have to take my folks?\"",ja:"神に問いかける：「なぜ俺の人たちを奪ったんだ？」",ann:null},
        {en:"Hope to see Freddie G., Yusef G, love my G",ja:"フレディGよ、ユーセフGよ、またいつか会えたら",ann:null},
        {en:"Rolly G, police watch me",ja:"ローリーG、警察が俺を監視してる",ann:null},
        {en:"Smoke my weed and count my Gs",ja:"マリファナを吸って、Gを数える",ann:null},
        {en:"Got a lot of people counting on me",ja:"俺を頼りにしている人が多い",ann:null},
        {en:"And I'm just tryin' to find my peace",ja:"俺はただ自分の平和を見つけようとしているだけ",ann:null},
        {en:"Should've finished school like my niece",ja:"姪のように学校を卒業すればよかった",ann:null},
        {en:"Then I finally wouldn't use my piece, blaow!",ja:"そうすれば拳銃を使わずにすんだのに、ブラウ！",ann:null}
      ]},
      {label:"[Verse 3: Consequence]",note:"Consequence（コンシクエンス）：クイーンズ出身のラッパー。A Tribe Called QuestのQ-TipがKanyeに紹介した。芸能界での冷遇を語る。",lines:[
        {en:"I 'member having to take the dollar cab",ja:"1ドルのキャブに乗らなきゃいけなかったのを覚えてる",ann:null},
        {en:"Coming home real late at night",ja:"夜遅くに帰る",ann:null},
        {en:"Standing on my feet all damn day",ja:"一日中立ちっぱなし",ann:null},
        {en:"Tryna make this thing right",ja:"これを正しくしようとして",ann:null},
        {en:"And havin' one of my coworkers say, \"Yo, you look just like",ja:"同僚の一人が言った、「お前、こんな人に似てるな",ann:null},
        {en:"This kid I seen in an old Busta Rhymes video the other night\"",ja:"先日見た古いバスタ・ライムスのビデオに出てた子に」",ann:"ConsequenceはかつてA Tribe Called Questと活動し、Busta Rhymesらと同時代に注目されたが、その後表舞台から消えていた過去を自嘲している。"},
        {en:"Well, easy come, easy go, how that saying goes",ja:"まあ、来るものは来る、去るものは去る、という言葉通り",ann:null},
        {en:"No more broad service, cars, and them TV shows",ja:"もうブロードサービスも車もテレビ番組もない",ann:null},
        {en:"That all had got snatched from me, A&Rs and they faculties",ja:"全てが奪われた、A&Rたちと彼らのスタッフに",ann:"A&R：レコードレーベルでアーティストの発掘・契約を担当する部門。"},
        {en:"All turn they back on me and didn't wanna hear a rap from me",ja:"みんな俺に背を向けて、俺のラップを聞きたくなかった",ann:null},
        {en:"So naturally, actually, had to face things factually",ja:"だから当然、実際に、物事を事実として受け止めなければならなかった",ann:null},
        {en:"Had to be a catastrophe, empty fridge is staring back at me",ja:"大惨事になるしかなかった、空っぽの冷蔵庫が俺を見つめ返してる",ann:null},
        {en:"'Cause nothing's there, nothing's fair",ja:"何もないから、何も公平じゃないから",ann:null},
        {en:"I don't wanna ever go back there",ja:"二度とあの場所に戻りたくない",ann:null},
        {en:"So I won't be taking no days off 'til my spaceship takes off, blaow!",ja:"宇宙船が飛び立つまで一日も休まない、ブラウ！",ann:null}
      ]},
      {label:"[Outro: Tony Williams]",note:null,lines:[
        {en:"I wanna fly",ja:"飛びたい",ann:null},
        {en:"I wanna fly",ja:"飛びたい",ann:null},
        {en:"I said I want my chariot to pick me up",ja:"戦車が迎えに来てくれることを願う",ann:"「chariot」は黒人霊歌「Swing Low, Sweet Chariot」を想起させる。死後に天へ運ばれる救済のイメージ。"},
        {en:"And take a brother for a ride",ja:"兄弟を乗せて走ってほしい",ann:null},
        {en:"(Heaven knows, heaven knows)",ja:"（天はご存知、天はご存知）",ann:null}
      ]}
    ]
  }},
  {num:"07",title:"Jesus Walks",feat:null,hasLyrics:true,data:{
    num:"07",title:"Jesus Walks",feat:null,
    producer:"Kanye West, Che Smith",
    youtubeUrl:"https://www.youtube.com/watch?v=1fpkdSfPzio",
    wayakuUrl:"https://www.youtube.com/watch?v=H8BPadbtE34",
    sample:"ARC Choir「Walk With Me」(1997)",
    sampleSources:[
      {artist:"The ARC Choir",title:"Walk With Me",year:1997,
       url:"https://www.whosampled.com/sample/276/Kanye-West-Jesus-Walks-The-ARC-Choir-Walk-With-Me/",
       youtubeUrl:"https://www.youtube.com/watch?v=Q2MeSvUl_Ks",
       useTimes:[0], useNote:"他", srcTimes:[0]}
    ],
    whosampledUrl:"https://www.whosampled.com/Kanye-West/Jesus-Walks/",
    artwork:"1. The College Dropout/College Dropout artwork.jpg",
    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"Kanyeの代表曲の一つ。ラジオ局に「宗教的すぎてかけられない」と3度拒否されながら、3つの異なるバージョンのMVを制作して最終的にグラミー賞最優秀ラップソングを受賞した曲。ギャングスター、ドラッグ中毒者、ストリッパーなど社会から排除されたすべての人々と「ジーザスが歩む」というメッセージを込めている。ゴスペル合唱団ARC Choir（依存症リハビリ施設の合唱団）の「Walk With Me」を中心に、Curtis Mayfieldやドラムなど計8曲をサンプリングしている。",
    sections:[
      {label:"[Spoken Intro]",note:null,lines:[
        {en:"We at war",ja:"俺たちは戦争中だ",ann:null},
        {en:"We at war with terrorism, racism",ja:"テロリズムと人種差別と戦っている",ann:"2001年9月11日のアメリカ同時多発テロ後、アメリカ社会は「テロとの戦争」を宣言した。Kanyeはその言説を受け取りながら、「最大の敵は自分自身」という内省的な問いかけに転換している。"},
        {en:"But most of all, we at war with ourselves",ja:"でも何より、俺たち自身と戦っている",ann:null}
      ]},
      {label:"[Chorus]",note:null,lines:[
        {en:"(Jesus, walk)",ja:"（ジーザス、歩め）",ann:null},
        {en:"God, show me the way because the Devil's tryna break me down",ja:"神よ、道を示してくれ、悪魔が俺を壊そうとしているから",ann:null},
        {en:"(Jesus, walk with me)",ja:"（ジーザス、俺と共に歩め）",ann:null}
      ]},
      {label:"[Verse 1]",note:null,lines:[
        {en:"You know what the Midwest is? Young and restless",ja:"中西部とは何か知ってるか？ 若くて落ち着きのない場所だ",ann:null},
        {en:"Where restless (Niggas) might snatch your necklace",ja:"落ち着きのない（仲間）がネックレスを奪うかもしれない場所",ann:null},
        {en:"And next, these (Niggas) might jack your Lexus",ja:"次には（仲間が）レクサスを盗むかもしれない",ann:null},
        {en:"Somebody tell these (Niggas) who Kanye West is",ja:"誰かこいつらにカニエ・ウェストが誰なのか教えてくれ",ann:null},
        {en:"I walk through the valley of the Chi where death is",ja:"俺は死が溢れるシカゴの谷を歩く",ann:"「Valley of the Chi」：「死の陰の谷を歩む（詩篇23篇）」のパロディ。シカゴ（Chi）の危険な地域を死の谷に見立てている。"},
        {en:"Top floor, the view alone will leave you breathless",ja:"最上階、その景色だけで息が詰まる",ann:null},
        {en:"Try to catch it, it's kinda hard",ja:"捉えようとするが、なかなか難しい",ann:null},
        {en:"Getting choked by detectives, yeah, yeah, now check the method",ja:"探偵に首を絞められる、方法を確認しろ",ann:null},
        {en:"They be askin' us questions, harass and arrest us",ja:"俺たちに質問して、ハラスメントして逮捕する",ann:null},
        {en:"Sayin' \"We eat pieces of shit like you for breakfast\"",ja:"「お前みたいなクソを朝飯代わりに食ってやる」と言う",ann:null},
        {en:"Huh? Y'all eat pieces of shit? What's the basis?",ja:"は？お前らクソを食うのか？根拠は何だ？",ann:null},
        {en:"We ain't going nowhere but got suits and cases",ja:"俺たちはどこにも行けないが、スーツと訴訟がある",ann:null},
        {en:"A trunk full of coke, rental car from Avis",ja:"コカインで満杯のトランク、エイビスのレンタカー",ann:"Avis（エイビス）：アメリカ大手レンタカー会社。麻薬運搬に使われるレンタカーとして言及される。"},
        {en:"My mama used to say only Jesus can save us",ja:"ママはいつもジーザスだけが俺たちを救えると言っていた",ann:null},
        {en:"Well, mama, I know I act a fool",ja:"ままあ、俺が馬鹿な行動をするのはわかってる",ann:null},
        {en:"But I'll be gone 'til November, I got packs to move, I hope",ja:"でも11月まで俺はいなくなる、動かさなきゃならないパック（麻薬）がある",ann:null}
      ]},
      {label:"[Chorus]",note:null,lines:[
        {en:"(Jesus, walk)",ja:"（ジーザス、歩め）",ann:null},
        {en:"God, show me the way because the Devil's tryna break me down",ja:"神よ、道を示してくれ、悪魔が俺を壊そうとしているから",ann:null},
        {en:"(Jesus, walk with me)",ja:"（ジーザス、俺と共に歩め）",ann:null},
        {en:"The only thing that I pray is that my feet don't fail me now",ja:"俺が祈るのはただ一つ、足が今ここで俺を裏切らないように",ann:null},
        {en:"(Jesus, walk)",ja:"（ジーザス、歩め）",ann:null},
        {en:"And I don't think there's nothin' I can do now to right my wrongs",ja:"今さら俺の過ちを正すためにできることはないと思う",ann:null},
        {en:"(Jesus, walk with me)",ja:"（ジーザス、俺と共に歩め）",ann:null},
        {en:"I wanna talk to God but I'm afraid 'cause we ain't spoke in so long",ja:"神と話したいが怖い、もうずっと話してないから",ann:null},
        {en:"(Jesus, walk)",ja:"（ジーザス、歩め）",ann:null}
      ]},
      {label:"[Verse 2]",note:null,lines:[
        {en:"To the hustlers, killers, murderers, drug dealers, even the scrippers",ja:"ハスラー、殺し屋、殺人犯、麻薬売人、そしてストリッパーたちへ",ann:null},
        {en:"(Jesus walks with them)",ja:"（ジーザスは彼らと共に歩む）",ann:null},
        {en:"To the victims of welfare, feel we livin' in Hell here, hell yeah",ja:"福祉の犠牲者たち、ここが地獄だと感じている、まさに地獄だ",ann:null},
        {en:"(Jesus walks with them)",ja:"（ジーザスは彼らと共に歩む）",ann:null},
        {en:"Now, hear ye, hear ye, want to see Thee more clearly",ja:"さあ聞け、聞け、お前をもっとはっきり見たい",ann:null},
        {en:"I know He hear me when my feet get weary",ja:"足が疲れた時に彼が俺の声を聞いてくれると知っている",ann:null},
        {en:"'Cause we're the almost nearly extinct",ja:"なぜなら俺たちはほぼ絶滅寸前だから",ann:null},
        {en:"We rappers is role models, we rap, we don't think",ja:"俺たちラッパーはロールモデルだ、ラップするが考えない",ann:null},
        {en:"I ain't here to argue about His facial features",ja:"神の顔の特徴について議論するためにここにいるんじゃない",ann:null},
        {en:"Or here to convert atheists into believers",ja:"無神論者を信者に改宗させるためにここにいるんじゃない",ann:null},
        {en:"I'm just tryna say the way school need teachers",ja:"ただ言いたいのは、学校が教師を必要とするように",ann:null},
        {en:"The way Kathie Lee needed Regis, that's the way I need Jesus",ja:"キャシー・リーがリージスを必要としたように、俺はジーザスを必要としている",ann:"「Live! with Regis and Kathie Lee」（1985〜2000年）というABCの朝の情報番組での名コンビ関係を指す。なくてはならないパートナー関係の比喩。"},
        {en:"So here go my single, dawg, radio needs this",ja:"これが俺のシングルだ、ラジオにはこれが必要だ",ann:null},
        {en:"They say you can rap about anything except for Jesus",ja:"何についてでもラップできると言う、でもジーザス以外は",ann:null},
        {en:"That means guns, sex, lies, videotape",ja:"つまり銃、セックス、嘘、ビデオテープについては",ann:"「sex, lies and videotape（セックスと嘘とビデオテープ）」：スティーヴン・ソダーバーグ監督の1989年の映画タイトルをもじったライン。ヒップホップが性・暴力・スキャンダルを扱うことは許容されるのに、神について語ることはラジオでかけてもらえないという矛盾を突く。"},
        {en:"But if I talk about God, my record won't get played, huh?",ja:"でも神について話したら、俺のレコードはかけてもらえない？",ann:null},
        {en:"Well, if this take away from my spins",ja:"まあ、これで俺の再生回数が減っても",ann:null},
        {en:"Which'll probably take away from my ends",ja:"多分俺の稼ぎも減るだろうが",ann:null},
        {en:"Then I hope it take away from my sins",ja:"それで俺の罪が消えてくれることを願う",ann:null},
        {en:"And bring the day that I'm dreamin' 'bout",ja:"そして俺が夢見ている日が来ることを",ann:null},
        {en:"Next time I'm in the club, everybody screamin' out",ja:"次にクラブに行った時、みんなが叫んでいる",ann:"この曲はグラミー賞（第47回・2005年）で最優秀ラップソングを受賞。当初ラジオに3度拒否されながらヒットさせた逆転劇を予言するような締めくくり。"}
      ]}
    ]
  }},

    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"Jay-ZとKanyeの信頼関係、KanyeのWest家の歴史（公民権運動）、そしてシカゴのスポークンワードアーティストJ. Ivyのバースを組み合わせた曲。「決して俺を裏切るな」というタイトルは神への祈りであり、盟友への誓いでもある。サンプル元はBlackjack（マイケル・ボルトンが在籍したバンド）の「Maybe It's the Power of Love」(1980)。",
    sections:[
      {label:"[Intro: JAY-Z]",note:null,lines:[
        {en:"Oh, baby!",ja:"ああ、ベイビー！",ann:null},
        {en:"Ha-ha-ha-ha-ha-ha",ja:"ハハハハハハ",ann:null},
        {en:"Turn the motherfuckin' music up",ja:"音楽を上げろ",ann:null},
        {en:"Uh!",ja:"ウ！",ann:null}
      ]},
      {label:"[Chorus]",note:null,lines:[
        {en:"When it comes to being true, at least true to me",ja:"真実であることについて、少なくとも自分に正直に",ann:null},
        {en:"(That's right. It's what I do! C'mon!)",ja:"（その通り、それが俺のやることだ！ カモン！）",ann:null},
        {en:"One thing I've found, one thing I found",ja:"一つのことを見つけた、一つのことを見つけた",ann:null},
        {en:"Oh, no, you'll never let me down",ja:"ああ、お前は決して俺を裏切らない",ann:null},
        {en:"(No. I ain't never let you down)",ja:"（ノー、俺は決してお前を裏切らない）",ann:null},
        {en:"Get up, I get down. Get up, I get down",ja:"立ち上がれ、俺は向き合う。立ち上がれ、俺は向き合う",ann:"「Get up, I get down」はサンプル元Blackjackのコーラスからの引用。"},
        {en:"Get up, I get down. Get up, I get down",ja:"立ち上がれ、俺は向き合う。立ち上がれ、俺は向き合う",ann:null}
      ]},
      {label:"[Verse 1: JAY-Z]",note:"Jay-Z（本名Shawn Corey Carter、1969〜）：ブルックリン出身のラッパー・経営者。Roc-A-Fella Records創業者の一人。録音当時は「The Black Album」を引っ提げた絶頂期。",lines:[
        {en:"Ayo, first, I snatched the streets, then I snatched the charts",ja:"まずストリートを制し、それからチャートを制した",ann:null},
        {en:"First, I had they ear. Now, I have they heart",ja:"最初は耳を掴んだ、今は心を掴んでいる",ann:null},
        {en:"Rappers came and went. I've been here from the start",ja:"ラッパーたちは来ては去った、俺は最初からここにいる",ann:null},
        {en:"I seen them put it together, watched them take it apart",ja:"彼らが積み上げるのを見て、崩すのを見てきた",ann:null},
        {en:"Seen the Rovers roll up with ribbons",ja:"リボン付きのロバー（レンジローバー）がやってくるのを見た",ann:null},
        {en:"I seen them re-po'd, re-sold, then re-driven",ja:"それが差し押さえられ、再販され、また乗られるのを見た",ann:null},
        {en:"So, when I reload, he holds number one position",ja:"だから俺がリロードすれば、1位の座を保つ",ann:null},
        {en:"When you hot, I'm hot. And when your feet cold, mines is sizzling",ja:"お前がホットな時、俺もホット。お前の足が冷えても俺のは焼けてる",ann:null},
        {en:"It's plain to see; niggas can't fuck with me",ja:"明らかだ、誰も俺にかなわない",ann:null},
        {en:"'Cause I'mma be that nigga for life. This is not an image",ja:"なぜなら俺は生涯そのニガーであり続けるから、これはイメージじゃない",ann:null},
        {en:"This is God-given. This is hard-livin' mixed with Cristal sippin'",ja:"これは神が授けたもの、苦労した人生とクリスタル（シャンパン）を飲む生活が混ざり合ったもの",ann:"Cristal（クリスタル）：高級シャンパン「ルイ・ロデレール・クリスタル」。2000年代ヒップホップにおける成功の象徴。"},
        {en:"It's the most consistent; Hov",ja:"最も一貫している、ホヴが",ann:null},
        {en:"Give you the most hits you can fit inside a whole disc and",ja:"一枚のディスクに収まる最も多くのヒットを与える",ann:null},
        {en:"Nigga, I'm home on these charts. Y'all niggas visitin'",ja:"ニガー、俺はこのチャートが我が家だ、お前らは訪問者だ",ann:null},
        {en:"It's Hov tradition, Jeff Gordon of rap",ja:"ホヴの伝統、ラップのジェフ・ゴードン",ann:"Hov（ホヴ）：Jay-Zの愛称。ジェホバ（神の名）に由来。Jeff Gordon（ジェフ・ゴードン）：NASCARの伝説的ドライバーでポールポジションの王者。"},
        {en:"I'm back to claim pole position. Holla at ya boy",ja:"ポールポジションを取り戻しに来た",ann:null}
      ]},
      {label:"[Verse 2: Kanye West]",note:null,lines:[
        {en:"I get down for my grandfather, who took my momma",ja:"俺が頑張るのは祖父のためだ、俺のママを連れて行ってくれた人",ann:"以下はKanyeの実話。祖父Portwood Williamsと母Donda West（当時6歳）が公民権運動のシット・イン（座り込み抗議）に実際に参加した。"},
        {en:"Made her sit in that seat where white folks ain't want us to eat",ja:"白人が俺たちに食わせたくなかった席に座らせた人",ann:"シット・イン：1950年代後半〜60年代初頭、白人専用のランチカウンター等に座り込んで行われた非暴力抗議運動。"},
        {en:"At the tender age of 6, she was arrested for the sit-ins",ja:"6歳という幼い年齢で、彼女はシット・インで逮捕された",ann:null},
        {en:"And with that in my blood, I was born to be different",ja:"その血が流れているから、俺は違う人間として生まれてきた",ann:null},
        {en:"Now, niggas can't make it to ballots to choose leadership",ja:"今、ニガーたちは指導者を選ぶ投票所にも行けない",ann:null},
        {en:"But we can make it to Jacob's or to the dealership",ja:"でもジェイコブのところや車のディーラーには行ける",ann:null},
        {en:"That's why I hear new music and I just don't be feelin' it",ja:"だから新しい音楽を聴いても心が動かない",ann:null},
        {en:"Racism still alive, they just be concealin' it",ja:"人種差別はまだ生きてる、ただ隠しているだけ",ann:null},
        {en:"But I know they don't want me in the damn club",ja:"だが俺はわかってる、彼らは俺をそのクラブに入れたくない",ann:null},
        {en:"They even made me show ID to get inside of Sam's Club",ja:"サムズクラブ（会員制倉庫店）に入るのにIDを見せさせられた",ann:"Sam's Club：ウォルマート系列の会員制倉庫型スーパー。黒人男性が入店時にIDを求められる体験を、日常的なレイシャル・プロファイリングの例として語る。"},
        {en:"I done did dirt and went to church to get my hands scrubbed",ja:"汚い事をして、教会に行って手を洗ってもらった",ann:null},
        {en:"Swear I've been baptized 'least three or four times",ja:"少なくとも3〜4回洗礼を受けたと誓う",ann:null},
        {en:"But in the land where niggas praise Yukons and getting paid",ja:"でも、ユーコン（SUV）を崇め、金を稼ぐことを称える土地では",ann:null},
        {en:"It's gon' take a lot more than coupons to get us saved",ja:"俺たちを救うにはクーポン以上のものが必要だ",ann:null},
        {en:"Like it take a lot more than durags to get you waves",ja:"ウェーブを出すのにドゥーラグ以上のものが必要なように",ann:null},
        {en:"Nothing sad as that day my girl father passed away",ja:"彼女の父親が亡くなった日ほど悲しいことはない",ann:null},
        {en:"So I promised to Mr. Rainey, I'm gonna marry your daughter",ja:"だからレイニー氏に誓った、あなたの娘と結婚しますと",ann:null},
        {en:"And you know I gotta thank you for the way that she was brought up",ja:"彼女の育て方に感謝しなければならない",ann:null},
        {en:"And I know that you were smiling when you seen the car I bought her",ja:"俺が彼女に買った車を見てあなたが微笑んでいたとわかってる",ann:null},
        {en:"And you sent tears from Heaven when you seen my car get balled up",ja:"俺の車がクラッシュするのを見て天国から涙を送ってくれた",ann:null},
        {en:"But I can't complain what the accident did to my left eye",ja:"事故が俺の左目にしたことについては文句を言えない",ann:"Kanyeは2002年10月、自動車事故で顎を骨折・後にThrough the Wireを録音。"},
        {en:"'Cause look what an accident did to Left Eye",ja:"事故がLeft Eyeに何をしたかを見れば",ann:"Left Eye：TLCのメンバーLisa Lopes（1971〜2002年）。2002年4月にホンジュラスで自動車事故死。"},
        {en:"First Aaliyah, now Romeo must die",ja:"まずアリーヤ、次にロミオ・マスト・ダイ（映画タイトル）",ann:"Aaliyah（1979〜2001年）：R&Bシンガー。2001年8月にバハマで自家用機墜落により22歳で死去。主演映画「Romeo Must Die」(2000)と掛けている。"},
        {en:"I know I got angels watching me from the other side",ja:"あの世から俺を見守っている天使がいるとわかってる",ann:null}
      ]},
      {label:"[Verse 3: J. Ivy]",note:"J. Ivy（ジェイ・アイビー）：シカゴ出身のスポークンワード（詩の朗読）アーティスト。2003年グラミー賞特別賞を受賞、Def Poetry Jamに出演。",lines:[
        {en:"We are all here for a reason on a particular path",ja:"俺たちは皆、特定の道で理由があってここにいる",ann:null},
        {en:"You don't need a curriculum to know that you a part of the math",ja:"カリキュラムがなくても、お前が数学の一部であることを知れる",ann:null},
        {en:"Cats think I'm delirious, but I'm so damn serious",ja:"みんなは俺が錯乱してると思う、でも俺は本当に本気だ",ann:null},
        {en:"That's why I expose my soul to the globe, the world",ja:"だから俺は世界に自分の魂を晒す",ann:null},
        {en:"I'm trying to make it better for these little boys and girls",ja:"この少年少女たちのために良くしようとしている",ann:null},
        {en:"I'm not just another individual",ja:"俺はただの個人じゃない",ann:null},
        {en:"My spirit is a part of this, that's why I get spiritual",ja:"俺の精神はこれの一部だ、だから俺はスピリチュアルになる",ann:null},
        {en:"But I get my hymns from Him. So it's not me, it's He that's lyrical",ja:"でも讃美歌は彼（神）から得る。だからリリカルなのは俺じゃなく彼だ",ann:null},
        {en:"I'm not a miracle. I'm a Heaven-sent instrument",ja:"俺は奇跡じゃない、天から送られた楽器だ",ann:null},
        {en:"My rhythmatic regiment",ja:"俺のリズム的な訓練が",ann:null},
        {en:"Navigates melodic notes for your soul and your mental",ja:"魂と精神のためのメロディックなノートをナビゲートする",ann:null},
        {en:"That's why I'm instrumental. Vibrations is what I'm into",ja:"だから俺はインストゥルメンタル（手段/楽器）だ、バイブレーションに引き込まれる",ann:null},
        {en:"Yeah, I need my loot by rent day",ja:"そう、家賃の日までに金が必要だ",ann:null},
        {en:"But that ain't what gives me the heart of Kunta Kinte",ja:"でもそれがクンタ・キンテの心を俺に与えるわけじゃない",ann:"Kunta Kinte（クンタ・キンテ）：小説・TV映画「ルーツ」(1977)の主人公。奴隷として連れてこられた祖先で、自由への意志と尊厳の象徴。"},
        {en:"I'm trying to get us \"us free\" like Cinque",ja:"シンクェのように俺たちを自由にしようとしている",ann:"Cinque（シンクェ）：1839年のアミスタッド号事件の指導者。奴隷船を乗っ取り自由を求めて戦ったアフリカ人の象徴。"},
        {en:"I can't stop, that's why I'm hot",ja:"止まれない、だから俺はホットだ",ann:null},
        {en:"Determination, dedication, motivation",ja:"決意、献身、モチベーション",ann:null},
        {en:"I'm talking to you of my many inspirations when I say I can't let you or self down",ja:"俺の数多くのインスピレーションについてお前に話してるんだ、お前も自分も裏切れないと言う時",ann:null},
        {en:"If I were on the highest cliff, on the highest riff",ja:"もし俺が最も高い崖の、最も高いリフの上にいたとしても",ann:null},
        {en:"And you slipped off the side and clinched on to your life",ja:"お前が端から滑り落ちて命がけでしがみついても",ann:null},
        {en:"In my grip, I would never, ever let you down",ja:"俺の手の中で、絶対に、決してお前を放さない",ann:null},
        {en:"And when these words are found",ja:"そしてこれらの言葉が見つけられた時",ann:null},
        {en:"Let it be known that God's penmanship has been signed with a language called love",ja:"神の筆跡は「愛」という言語で署名されていると知られるべきだ",ann:null},
        {en:"That's why my breath is felt by the deaf",ja:"だから俺の息は耳の聞こえない人にも感じられる",ann:null},
        {en:"And while my words are heard and confined to the ears of the blind",ja:"俺の言葉は聞かれ、目の見えない人の耳に届く",ann:null},
        {en:"I, too, dream in color and in rhyme",ja:"俺も色とライムで夢を見る",ann:null},
        {en:"So I guess I'm one of a kind in a full house",ja:"だから俺はフルハウスの中で唯一無二だ",ann:null},
        {en:"'Cause whenever I open my heart, my soul or my mouth, a touch of God reigns out",ja:"俺が心、魂、口を開くたびに、神のタッチが溢れ出す",ann:null},
        {en:"Take 'em to church",ja:"彼らを教会に連れて行け",ann:null}
      ]},
      {label:"[Verse 4: JAY-Z & Kanye West]",note:null,lines:[
        {en:"Who else you know been hot this long?",ja:"これだけ長い間ホットな人間を他に誰か知ってるか？",ann:null},
        {en:"Started from nothing, but he got this strong",ja:"無から始まったが、これほど強くなった",ann:null},
        {en:"Built the Roc from a pebble, peddled rock before I met you",ja:"小石からロックを築き、お前に会う前は石を売ってた",ann:"the Roc＝Roc-A-Fella Records。rock（クラックコカイン）との掛け言葉。"},
        {en:"Pedaled bikes, got my nephews pedal bikes because they special",ja:"自転車を漕いで、甥っ子たちが特別だから自転車をプレゼントした",ann:null},
        {en:"Let you tell it, man, I'm falling. Well, somebody must have caught him",ja:"お前に言わせれば俺は落ちてる、でも誰かが受け止めたはず",ann:null},
        {en:"'Cause every fourth quarter, I like to Mike Jordan 'em",ja:"なぜなら第4クォーターになると俺はマイク・ジョーダンのように決める",ann:null},
        {en:"Number one albums, what I got? Like four of them",ja:"ナンバーワンアルバム、いくつ持ってる？4枚くらい",ann:null},
        {en:"More of them on the way. The eighth wonder on the way",ja:"さらに来てる。第8の不思議が来てる",ann:null},
        {en:"Clear the way, I'm here to stay. Y'all can save the chitter chat",ja:"道を開けろ、俺はここにいる。ガヤガヤは要らない",ann:null},
        {en:"This and that, dissin' Jay. Dissin' Jay'll get you maced",ja:"これやあれやとジェイを侮辱する。ジェイを侮辱すれば催涙スプレーを喰らうぞ",ann:null},
        {en:"When I start spitting them lyrics, niggas get very religious",ja:"俺がリリックを吐き出し始めたら、みんな宗教的になる",ann:null},
        {en:"Six Hail Marys; \"Please, Father forgive us.\" Young",ja:"6回のアヴェ・マリア、「父よ、私たちをお許しください」若い",ann:null},
        {en:"The archbishop, the Pope John Paul of y'all niggas",ja:"大司教、お前らニガーたちのヨハネ・パウロ法王",ann:null},
        {en:"The way y'all all follow Jigga",ja:"お前らがジガ（Jay-Z）についていく様子を見れば",ann:null},
        {en:"Hov's a living legend and I'll tell you why",ja:"ホヴは生ける伝説だ、理由を言おう",ann:null},
        {en:"Everybody wanna be Hov and Hov's still alive",ja:"みんながホヴになりたがってる、そしてホヴはまだ生きてる",ann:null}
      ]}
    ]
  }},
  {num:"09",title:"Get Em High",feat:"feat. Talib Kweli & Common",hasLyrics:true,data:{
    num:"09",title:"Get Em High",feat:"feat. Talib Kweli & Common",
    producer:"Kanye West",
    youtubeUrl:"https://www.youtube.com/watch?v=TD50lqM-t1s",
    wayakuUrl:"https://www.youtube.com/watch?v=T9gr-lb0mkc",
    sample:null,
    sampleSources:[],
    whosampledUrl:null,
    artwork:"1. The College Dropout/College Dropout artwork.jpg",
    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"ヒップホップの仲間同士がバーで煙草を吸いながら競い合うような、パーティーラップと自己賛美が混在するトラック。Kanyeが「大学を中退して正解だった」と語りながら、Talib Kweli（NY）、Common（シカゴ）というリリシストたちが高い言語能力を競う。コーラスの「N-now, th-th-throw your...」はThe Notorious B.I.G.「Warning」(1994)の歌詞引用、ほかKanye「Keep the Receipt」(feat. ODB) の引用も含む（いずれも音楽サンプルではなく歌詞のインターポレーション）。",
    sections:[
      {label:"[Chorus: Kanye West]",note:null,lines:[
        {en:"N-now, th-th-throw your motherfuckin' hands",ja:"さあ、両手を上げろ",ann:"The Notorious B.I.G.「Warning」(1994) の冒頭「Who the fuck is this...」のフロウを想起させる、どもり気味の語り出し。"},
        {en:"Get 'em high",ja:"高く",ann:null},
        {en:"All the girls pass the weed to your motherfuckin' man",ja:"ガールズよ、大麻を彼氏に回せ",ann:null},
        {en:"Get 'em high",ja:"ハイになれ",ann:null},
        {en:"Now I ain't never tell you to put down your hands",ja:"一度も手を下ろせとは言ってないぞ",ann:null},
        {en:"Keep 'em high",ja:"高く保て",ann:null},
        {en:"And if you're losin' your high, then smoke again",ja:"ハイが冷めてきたらまた吸え",ann:null},
        {en:"Keep 'em high",ja:"ハイを保て",ann:null}
      ]},
      {label:"[Verse 1: Kanye West]",note:null,lines:[
        {en:"My flow is in the pocket like wallets, I got the bounce like hydraulics",ja:"俺のフローは財布のようにポケットに収まってる、油圧装置のように跳ねる",ann:null},
        {en:"I can't call it, I got the swerve like alcoholics",ja:"判断できない、アルコール中毒者のようにくねってる",ann:null},
        {en:"My freshman year, I was going through hella problems",ja:"大学1年の時、ヤバい問題を抱えてた",ann:null},
        {en:"'Till I built up the nerve to drop my ass up out of college",ja:"大学から出るための勇気をためるまで",ann:null},
        {en:"My teacher said I's a loser, I told her, \"Why don't you kill me?",ja:"先生は俺がルーザーだと言った、俺は「俺を殺してみろ」と言った",ann:null},
        {en:"I give a fuck if you fail me, I'm gonna follow",ja:"お前が俺を落第させても知ったことか、俺は",ann:null},
        {en:"My heart\", and if you follow the charts",ja:"自分の心に従う、チャートに従うなら",ann:null},
        {en:"Or the plaques or the stacks, you ain't gotta guess who's back, you see?",ja:"プラチナアルバムや金の束に従えば、誰が戻ってきたかわかるだろ？",ann:null},
        {en:"I'm so Chi' that you thought I was bashful",ja:"俺はそれほどシカゴっ子だから、恥ずかしがり屋に見えたかもしれない",ann:null},
        {en:"But this bastard's flow will bash your skull",ja:"でもこのバスタードのフローはお前の頭蓋骨を砕く",ann:null},
        {en:"And I will cut your girl like Pastor Tro'",ja:"パスター・トロのようにお前の彼女を切る",ann:null},
        {en:"And I don't usually smoke, but pass the 'dro",ja:"普段は吸わないが、ハイドロ（大麻）を回せ",ann:"hydro（ハイドロ）：水耕栽培（hydroponics）で育てられた高品質のマリファナ。"},
        {en:"And I won't give you that money that you askin' for",ja:"お前が求めてる金は渡さない",ann:null},
        {en:"Why you think me and Dame cool? We assholes",ja:"なぜ俺とデイムが仲良しだと思う？俺たちは嫌な奴だから",ann:"Dame（デイム）：Damon Dash（デイモン・ダッシュ）。Roc-A-Fella RecordsをJay-Zと共同設立。KanyeはDameに才能を認められRoc-A-Fellaと契約した。"},
        {en:"That's why we hear your music and fast forward",ja:"だから俺たちはお前の音楽を聴いて早送りする",ann:null},
        {en:"'Cause we don't wanna hear that weak shit no mo'",ja:"そんな弱いものはもう聞きたくないから",ann:null}
      ]},
      {label:"[Verse 2: Kanye West, Sumeke Rainey & Talib Kweli]",note:null,lines:[
        {en:"Now who the hell is this? Emailing me at 11:26",ja:"一体誰だこれは？11時26分にメールしてくる",ann:null},
        {en:"Telling me that she thirty-six, twenty-six plus double-D?",ja:"36、26にダブルDだって？（バスト・ウエスト・カップのスリーサイズ）",ann:null},
        {en:"You know how girls on Black Planet be when they get bubbly",ja:"ブラック・プラネットの女の子たちがノリノリになった時どうなるかわかるだろ",ann:"BlackPlanet.com（ブラック・プラネット）：2000年代前半に人気を博した黒人向けSNS（Twitter開始は2006年）。"},
        {en:"At NYU but she hail from Kansas",ja:"NYUに通ってるがカンザス出身",ann:"NYU（ニューヨーク大学）：マンハッタンのグリニッジ・ヴィレッジにある名門私立大学。"},
        {en:"Right now, she just lampin', chillin' on campus",ja:"今はキャンパスでのんびりしてる",ann:null},
        {en:"Sent me a picture with her feelin' on Candice",ja:"キャンディスに触れてる写真を送ってきた",ann:null},
        {en:"Who said her favorite rapper was the late great Francis",ja:"（彼女が言うには）好きなラッパーは故Francis",ann:null},
        {en:"Yo, Kwe, she don't believe me, please pick up the line",ja:"クウェ、彼女は俺を信じない、電話に出てくれ",ann:null},
        {en:"She gon' think that I'm lyin', just spit a couple of lines",ja:"俺が嘘をついてると思う、ちょっとラインを吐いてくれ",ann:null}
      ]},
      {label:"[Verse 3: Talib Kweli & Common]",note:"Talib Kweli（タリブ・クウェリ）：ブルックリン出身のラッパー。Mos Defとのユニット「Black Star」(1998)で名を上げたコンシャス系MC。Kanyeのデビュー前のツアーに同行し初期キャリアに貢献した。",lines:[
        {en:"I can't believe this nigga use my name for pickin' up dimes",ja:"こいつが女を口説くのに俺の名前を使うとは信じられない",ann:null},
        {en:"But never mind, I need some tracks, you tryin' to pull tracks out",ja:"まあいい、俺にはトラックが必要だ",ann:null},
        {en:"And my rhymes is finna blow, you trying to blow backs out",ja:"俺のライムは爆発しそうだ、お前のバックを吹き飛ばそうとしてる",ann:null},
        {en:"Anyways, I don't usually fuck with the Internet",ja:"とにかく、俺は普段インターネットとは関わらない",ann:null},
        {en:"Or chicks with birth control stuck to they arm like Nicorette",ja:"腕に貼り付けた避妊パッチをニコレット（禁煙パッチ）みたいに貼った女とも",ann:null}
      ]},
      {label:"[Verse 4: Common]",note:"Common（本名Lonnie Rashid Lynn Jr.）：シカゴ出身のラッパー・俳優。Kanyeとの縁は深く、後に「Finding Forever」(2007)をKanyeのプロデュースで制作。",lines:[
        {en:"Get 'em high like noon or the moon",ja:"正午か月のようにハイにさせろ",ann:null},
        {en:"Or a room filled with smoke, a hype filled with dope",ja:"煙で充満した部屋、麻薬で充満した興奮",ann:null},
        {en:"Y'all assumed I was doomed, out of tune",ja:"お前らは俺が終わってると、音痴だと思ってた",ann:null},
        {en:"But I still filled the notes with real nigga quotes",ja:"でも俺は本物のニガーのセリフでノートを満たした",ann:null},
        {en:"Real rappers is hard to find like a remote",ja:"本物のラッパーはリモコンみたいに見つかりにくい",ann:null},
        {en:"Used to, but still got love",ja:"昔はそうだったが、まだ愛がある",ann:null},
        {en:"I stole on live-er niggas than you",ja:"お前より生きてるニガーたちから盗んだ",ann:null},
        {en:"Rock clubs like Tiger Woods in the hood",ja:"タイガー・ウッズのようにゲットーでロッククラブ（ゴルフクラブ）を振る",ann:"Tiger Woods：アフリカ系アメリカ人として初めてゴルフ界を制したスーパースター。ゲットーでゴルフクラブを振る＝場違いな場所で圧倒的な支配力を発揮するという比喩。"},
        {en:"How could I ever let your words affect me?",ja:"なぜお前の言葉が俺に影響するんだ？",ann:null},
        {en:"They say hip-hop is dead, I'm here to resurrect me",ja:"ヒップホップは死んでると言う、俺がよみがえらせる",ann:"このラインは後年Nasがリリースする「Hip Hop Is Dead」(2006)を先取りしている。"},
        {en:"So when the industry crash, I survive like Kanye",ja:"業界が崩壊したとき、俺はカニエのように生き残る",ann:"Kanyeのデビュー前の自動車事故（2002年10月）とそれを経てリリースした「Through the Wire」（顎を骨折した状態で録音）への言及。同期ラッパーCommonがKanyeを認めた一節。"},
        {en:"Spittin' through wires and fires, MCs retirin'",ja:"ワイヤーと炎を通して吐き出し、MCたちは引退していく",ann:null},
        {en:"Got your hands up, get them motherfuckers higher",ja:"手を上げろ、もっと高く上げろ",ann:null}
      ]}

    sampleSources:[],
    whosampledUrl:null,
    artwork:"1. The College Dropout/College Dropout artwork.jpg",
    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"次のThe New Workout Planへの導入スキット。黒人女性たちが「ワークアウト（ダイエット）で金持ちの男を捕まえた」というテレビ通販番組風の会話を演じる。見た目を磨いてNBAプレイヤーや「baller」を捕まえようという俗物的な欲望を笑いで包んだ風刺的な小品。",
    sections:[
      {label:"[Skit: Girl #1, Girl #2, Girl #3]",note:null,lines:[
        {en:"Ayy, wassup, girl?",ja:"ちょっと、何してるの？",ann:null},

        {en:"Hey, how you doin'?",ja:"やあ、元気？",ann:null},

        {en:"Well, you lookin' all good and stuff, you got you a—",ja:"確かに良くなってるわね、あなた——",ann:null},
        {en:"Girl, I know it's that workout",ja:"あれはワークアウトのおかげよ",ann:null},
        {en:"Got you a six pack Shakur and stuff",ja:"シャクール（2Pac）みたいな六つ割り腹筋になって",ann:"six pack（腹筋）とTupac Shakurの「Shakur」を掛けた言葉遊び。"},

        {en:"My nigga, my nigga, I'm tired of puttin' 1-8-7 in my nigga's pager",ja:"あのね、もう彼氏のポケベルに1-8-7（殺す）って打つのも嫌になった",ann:"187（1-8-7）：カリフォルニア州刑法第187条、殺人を意味するスラング。ポケベル（pager）の時代に脅しの手段として相手のポケベルに打ち込む行為を指す。"},
        {en:"That shit ain't workin' no more",ja:"もう効果ないし",ann:null},
        {en:"Girl, you know I'ma video ho-ffesional now",ja:"ねえ、私今はビデオ・ホーフェッショナルよ",ann:"video ho-ffesional：「ビデオ・ガール（ヒップホップMVに登場する女性）」と「professional（専門家）」を組み合わせた造語。"},
        {en:"Since I copped this new workout plan, my shit is right",ja:"この新しいワークアウトプランを手に入れてから、体型が整ったの",ann:null},
        {en:"Rollin' in Lexus, Acuras, everything, girl",ja:"レクサスやアキュラとかいろんな車に乗ってるのよ",ann:null},
        {en:"Girl, you need to let me know how I can cop that, how much is it?",ja:"ねえ、それどうやって手に入れるのか教えて、いくらなの？",ann:null},
        {en:"Girl, you know you ain't gotta pay for nothin' around me, I'm the bootleg queen I'll give it to you for Free.99",ja:"あなたは私のそばでは何も払わなくていい、私はブートレグの女王、タダで渡すわ",ann:"Free.99（フリー・ドット・ナインティーナイン）：「無料」を価格表示風にギャグにした表現。$0.99の代わりに「Free.99」と言って実質タダ。"},

  {num:"11",title:"The New Workout Plan",feat:"feat. GLC & Bosko",hasLyrics:true,data:{
    num:"11",title:"The New Workout Plan",feat:"feat. GLC & Bosko",
    producer:"Kanye West",
    youtubeUrl:"https://www.youtube.com/watch?v=Nbg3pTsxML4",
    wayakuUrl:"https://www.youtube.com/watch?v=0R6dAgWm0-c",
    sample:null,
    sampleSources:[],
    whosampledUrl:null,
    artwork:"1. The College Dropout/College Dropout artwork.jpg",
    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"前スキット(Workout Plan)を受けて展開する曲。テレビの「ワークアウト番組」のパロディとして、ダイエットやボディメイクよりも「金持ちの男を捕まえるためのテクニック」を教える内容。エクササイズの掛け声に性的な指示が混じる下品なユーモアで、物質主義的な恋愛戦略を笑い飛ばしている。後半には実際に「Kanye's Workout Plan」でNBA選手やお金持ちを捕まえた女性たちの証言が挿入される。",
    sections:[
      {label:"[Intro: Kanye West]",note:null,lines:[
        {en:"You just popped in the Kanye West: Get Right for the Summer workout tape",ja:"カニエ・ウェスト「夏に向けて体を整えろ」ワークアウトテープを入れたところ",ann:null},
        {en:"And ladies, if you follow these instructions exactly",ja:"そしてレディースよ、これらの指示を正確に守れば",ann:null},
        {en:"You might be able to pull you a rapper, a NBA player",ja:"ラッパーやNBAプレイヤーをゲットできるかもしれない",ann:null},
        {en:"Man, at least a dude with a car",ja:"少なくとも車を持った男くらいは",ann:null},
        {en:"So, first of all, we gonna work on the stomach",ja:"まず腹筋に取り掛かろう",ann:null},
        {en:"Nobody wants a little, tight ass",ja:"誰も小さくてカチカチの尻なんか要らない",ann:null}
      ]},
      {label:"[Verse 1: Kanye West]",note:null,lines:[
        {en:"One, and two, and three, and four, and get them sit ups right and",ja:"1、2、3、4、腹筋をしっかりやって",ann:null},
        {en:"Tuck your tummy tight and",ja:"お腹をきゅっと引き締めて",ann:null},
        {en:"Do your crunches like this",ja:"このようにクランチをして",ann:null},
        {en:"Give head, stop, breathe",ja:"フェラ（奉仕）して、止まれ、息をして",ann:"エクササイズの掛け声に性的な指示を混ぜる下品なユーモアがこの曲の核。"},
        {en:"Get up, check your weave",ja:"立って、ウィッグを確認して",ann:null},
        {en:"Don't drop the blunt and disrespect the weed",ja:"ブラントを落として大麻に無礼をするな",ann:null},
        {en:"Pick up your son, don't disrespect your seed",ja:"息子を抱き上げて、自分の種（子供）に無礼をするな",ann:null},
        {en:"It's a party tonight and",ja:"今夜はパーティーがある",ann:null},
        {en:"Ooh, she's so excited",ja:"ああ、彼女はとても興奮してる",ann:null},
        {en:"\"Tell me who's invited\"",ja:"「誰が招待されてるの？」",ann:null},
        {en:"You, your friends and my dick",ja:"お前、友達、そして俺の",ann:null}
      ]},
      {label:"[Chorus: Kanye West]",note:null,lines:[
        {en:"It's been a week without me",ja:"俺なしで1週間",ann:null},
        {en:"And she feel weak without me",ja:"彼女は俺なしでは弱い",ann:null},
        {en:"She wanna talk it out but",ja:"話し合いたいと思っているが",ann:null},
        {en:"Ain't nothing to talk about, 'less",ja:"何も話すことはない、もし",ann:null},
        {en:"She's talking 'bout freaking out",ja:"盛り上がることについて話しているなら別だが",ann:null},
        {en:"Then maybe we can work it out",ja:"その場合はうまくやれるかもしれない",ann:null},
        {en:"Work it out, work it out",ja:"うまくやれ、うまくやれ",ann:null}
      ]},
      {label:"[Verse 2: Kanye West]",note:null,lines:[
        {en:"Ooh, girl, your silhouette make me wanna light a cigarette",ja:"ああ、ガール、お前のシルエットでたばこを吸いたくなる",ann:null},
        {en:"My name Kanye from the Jigga set, Twista said, \"Get It Wet\"",ja:"俺の名前はカニエ、ジガ（Jay-Z）のセットから、ツイスタは「ゲット・イット・ウェット」と言った",ann:"Jigga set：Jay-ZのチームとRoc-A-Fellaレーベルを指す。「Get It Wet」はTwista × Kanye制作の曲名。"},
        {en:"Ooh, girl, your breath is harsh!",ja:"ああ、ガール、お前の息がきつい！",ann:null},
        {en:"Cover your mouth up like you got SARS",ja:"SARSにかかったかのように口を覆え",ann:"SARS（サーズ）：重症急性呼吸器症候群。2002〜2003年に流行し、マスク着用が呼びかけられた。"},
        {en:"Off them tracks, yeah, I bought them cars",ja:"そのトラック（ビート）から、そうだ、俺はその車を買った",ann:null},
        {en:"Still, kill a nigga on 16 bars",ja:"それでも16小節でニガーを殺す",ann:null},
        {en:"We ain't sweating to the oldies, we juking to a cold beat",ja:"俺たちはオールディーズで汗をかくんじゃない、クールなビートでジュークするんだ",ann:"Juking（ジューキング）：シカゴ独自のダンス文化。ハウスミュージック系のパーティーで親密なスタイルで踊る行為。"}
      ]},
      {label:"[Interlude 1: Jill]",note:null,lines:[
        {en:"Hi, my name is Jill, I just want to say thanks to Kanye's workout plan",ja:"こんにちは、私はジルです、カニエのワークアウトプランに感謝したい",ann:null},
        {en:"I was able to pull a NBA player",ja:"NBAプレイヤーをゲットできたの",ann:null},
        {en:"And, like, now I shop every day on Rodeo Drive",ja:"そして今はロデオ・ドライブで毎日ショッピングしてる",ann:"Rodeo Drive（ロデオ・ドライブ）：ビバリーヒルズの高級ショッピング街。ヴェルサーチ、グッチ、シャネルなど超一流ブランドが並ぶ通り。"},
        {en:"I just want to say, thank you, Kanye!",ja:"カニエ、ありがとうと言いたい！",ann:null}
      ]},
      {label:"[Interlude 2: Lasandra]",note:null,lines:[
        {en:"My name is Lasandra, and I just want to say that since listening to Kanye's workout tape",ja:"私の名前はラサンドラ、カニエのワークアウトテープを聴いてから",ann:null},
        {en:"I was able to get my phone bill paid",ja:"電話代を払ってもらえるようになった",ann:null},
        {en:"I got sounds and 13's put up in my Cavalier",ja:"キャバリエ（シボレーの車）にスピーカーと13インチサブウーファーを積んだ",ann:null},
        {en:"And I was able to get a free trip to Cancun",ja:"カンクンへの無料旅行もゲットした",ann:"Cancun（カンクン）：メキシコのリゾート地。アメリカの大学生・若者に人気のビーチリゾート。"},
        {en:"And what's most importantly is that I ain't gotta fuck with Ray-Ray's broke ass no mo'",ja:"そして何より大事なのは、もうレイレイの貧乏な奴と関わらなくていいこと",ann:"Ray-Ray：黒人コミュニティでよく使われる男性のニックネーム。"}
      ]},
      {label:"[Interlude 3: Ella-May]",note:null,lines:[
        {en:"My name is Ella-May from Mobile, Alabama",ja:"私の名前はエラ・メイ、アラバマ州モービルから",ann:null},
        {en:"And I just want to say since listening to Kanye's workout tape",ja:"カニエのワークアウトテープを聴いてから言いたいのは",ann:null},
        {en:"I been able to date outside the family",ja:"家族以外の人と付き合えるようになった",ann:null},
        {en:"I got a double wide, and I rode a plane",ja:"ダブルワイド（ダブルサイズのトレーラーハウス）を手に入れて、飛行機にも乗った",ann:"Double wide（ダブルワイド）：2つのユニットを並べたトレーラーハウス。低所得白人家庭の象徴。「date outside the family（家族以外と付き合う）」というジョークと合わせ、南部の田舎の文化的ステレオタイプをパロディにしている。"}
      ]},
      {label:"[Bridge: Jill, Lasandra, Ella-May]",note:null,lines:[
        {en:"Thanks to Kanye's workout plan",ja:"カニエのワークアウトプランのおかげで",ann:null},
        {en:"I'm the envy of all my friends",ja:"友達みんなに羨ましがられてる",ann:null},
        {en:"See, I pulled me a baller man",ja:"ほら、バラー（金持ち）の男をゲットした",ann:null},
        {en:"And I ain't gotta work at the mall again",ja:"もうモールで働かなくていい",ann:null}
      ]},
      {label:"[Refrain: GLC, Kanye West]",note:null,lines:[
        {en:"That's right, put in work",ja:"そうだ、努力しろ",ann:null},
        {en:"Move your ass, go berserk",ja:"尻を動かして、暴れろ",ann:null},
        {en:"Eat your salad, no dessert",ja:"サラダを食べて、デザートなし",ann:null},
        {en:"Get that man you deserve",ja:"相応しい男をゲットしろ",ann:null}
      ]}
    ]
  }},

       useTimes:[0,14], useNote:"他", srcTimes:[348,373]}
    ],
    whosampledUrl:"https://www.whosampled.com/Twista/Slow-Jamz/",
    artwork:"1. The College Dropout/College Dropout artwork.jpg",
    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"The College Dropoutの収録曲だが、Twista名義のシングルとして先行リリースされ、ビルボードHot 100で1位を獲得。Kanyeにとって初のチャート1位曲。Jamie Foxxがルーサー・ヴァンドロスをモチーフにしたナレーターを演じ、1970〜80年代の黒人R&Bアーティストへのオマージュを捧げながら、セクシャルな雰囲気を醸し出すスロウジャムの系譜を讃える内容。コーラスにはLuther Vandross「A House Is Not a Home」のサンプルが使われている。",
    sections:[
      {label:"[Intro: Jamie Foxx & Luther Vandross]",note:"Jamie Foxx（本名Eric Marlon Bishop、1967〜）：コメディアン・俳優・シンガー。アカデミー賞受賞作「Ray」(2004)と本曲が同年にリリースされ知名度が急上昇。",lines:[
        {en:"Kanye, it-it's Foxx, man",ja:"カニエ、フォックスだよ",ann:null},
        {en:"I-I'm just— I'm just sayin', you know, I was talkin' to the girls, you know",ja:"ちょっと言わせてくれ、女の子たちと話してたんだ",ann:null},
        {en:"And-and, uh, we, we don't put enough emphasis on the ladies sometimes",ja:"俺たち、時々女性のことを十分に考えてないんだ",ann:null},
        {en:"You know, I was talkin' to this girl",ja:"ある子と話してたんだけど",ann:null},
        {en:"She was talkin' about the music all fast in the club, you know",ja:"クラブで流れるような速い音楽について言ってたんだ",ann:null},
        {en:"She gotta drink water 'cause she thirsty",ja:"喉が渇いてるから水を飲まなきゃいけない",ann:null},
        {en:"She done danced like ninety to a hundred songs back to back",ja:"90〜100曲も連続で踊りっぱなしで",ann:null},
        {en:"When ain't nobody, you know, really f— try to find out what she feelin'",ja:"誰も彼女が何を感じてるか知ろうとしない",ann:null},
        {en:"Like, how she feel? You know what she told me?",ja:"彼女はどう感じてるか？ 彼女が俺に言ったことを聞くか？",ann:null}
      ]},
      {label:"[Chorus: Jamie Foxx, Luther Vandross & Kanye West]",note:"Luther Vandross（1951〜2005年）：ニューヨーク出身のR&Bシンガー。ソウル・バラードの大家。2003年に脳卒中で倒れた。コーラスは彼の「A House Is Not a Home」のサンプル。",lines:[
        {en:"She said she want some Marvin Gaye, some Luther Vandross",ja:"彼女はマーヴィン・ゲイが聴きたいって、ルーサー・ヴァンドロスも",ann:null},
        {en:"A little Anita will definitely set this party off right",ja:"アニータを少し流せば絶対パーティーが盛り上がる",ann:"Anita＝Anita Baker（アニータ・ベイカー）。"},
        {en:"She said she want some Ready for the World, some New Edition",ja:"レディー・フォー・ザ・ワールドが聴きたいって、ニュー・エディションも",ann:null},
        {en:"Some Minnie Riperton will definitely set this party off right",ja:"ミニー・リパートンを流せば絶対パーティーが盛り上がる",ann:null}
      ]},
      {label:"[Verse 1: Kanye West, Jamie Foxx & Luther Vandross]",note:null,lines:[
        {en:"I told her to drive over in yo' new whip",ja:"新しい車で来いと言った",ann:null},
        {en:"Bring some friends you cool with",ja:"仲のいい友達を連れてきて",ann:null},
        {en:"I'ma bring the cool whip, then I want you to strip",ja:"クールウィップ（生クリーム）を持って行く、それからストリップしてほしい",ann:null},
        {en:"See, you is my new chick, so we get our grind on",ja:"お前は俺の新しい女だから、一緒に楽しもう",ann:null},

        {en:"Man, I swear, she fine, homes, why she always lyin', though?",ja:"マジで彼女はかわいいけど、なんでいつも嘘ついてんだ？",ann:null},
        {en:"Tellin' me them diamonds, when she know they rhinestones",ja:"ダイヤだって言ってるけど、ラインストーンだってわかってる",ann:null},
        {en:"She got a light-skinned friend, look like Michael Jackson",ja:"肌の明るい友達がいて、マイケル・ジャクソンに似てる",ann:"白人化していく後年のマイケルと、黒人だった頃のマイケルを「肌の明るい/暗い友達」で対比させたジョーク。"},
        {en:"Got a dark-skinned friend, look like Michael Jackson",ja:"肌の暗い友達がいて、こっちもマイケル・ジャクソンに似てる",ann:null},
        {en:"I played Ready for the World, she was ready for some action",ja:"レディー・フォー・ザ・ワールドをかけたら、彼女は行動する準備ができてた",ann:null},

        {en:"Smokey Robinson, Ashford & Simpson",ja:"スモーキー・ロビンソン、アシュフォード&シンプソン",ann:null},
