<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanye West 大全</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --bg2: #f9f9f7;
  --red: #C0392B;
  --ink: #1a1a1a;
  --mid: #555;
  --dim: #999;
  --border: #e8e8e8;
  --ann-bg: #fdf6f5;
  --ann-text: #a04030;
  --sidebar-w: 256px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--ink); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; }

/* ══ SIDEBAR ══ */
#sidebar {
  width: var(--sidebar-w); height: 100vh; background: var(--bg2);
  border-right: 1px solid var(--border); position: fixed; top: 0; left: 0;
  overflow-y: auto; z-index: 20; display: flex; flex-direction: column;
}
#sidebar-top {
  padding: 28px 22px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.sb-eyebrow { font-size: 9px; letter-spacing: 4px; text-transform: uppercase; color: var(--red); font-weight: 600; margin-bottom: 8px; }
.sb-brand { font-family: 'DM Sans', sans-serif; font-size: 18px; font-weight: 700; line-height: 1.25; }
.sb-sub { font-size: 11px; color: var(--mid); margin-top: 3px; }

/* Album accordion */
.sb-albums { flex: 1; padding: 8px 0 40px; }
.album-item { border-bottom: 1px solid var(--border); }
.album-toggle {
  width: 100%; background: none; border: none; text-align: left;
  padding: 14px 22px; cursor: pointer; display: flex; align-items: center;
  gap: 10px; font-family: 'DM Sans', sans-serif; transition: background 0.12s;
}
.album-toggle:hover { background: rgba(0,0,0,0.03); }
.album-toggle.open { background: color-mix(in srgb, var(--red) 6%, transparent); }
.album-chevron {
  font-size: 8px; color: var(--dim); transition: transform 0.2s; flex-shrink: 0; margin-right: 2px;
}
.album-toggle.open .album-chevron { transform: rotate(90deg); }
.album-info { flex: 1; min-width: 0; }
.album-name { font-size: 12.5px; font-weight: 600; color: var(--ink); line-height: 1.3; }
.album-toggle.open .album-name { color: var(--red); }
.album-year { font-size: 10px; color: var(--dim); margin-top: 1px; }

/* Track list (collapsible) */
.album-tracks {
  max-height: 0; overflow: hidden;
  background: rgba(0,0,0,0.015); border-top: 1px solid var(--border);
  transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1);
}
.album-tracks.open { max-height: 2000px; }
.track-btn {
  width: 100%; background: none; border: none; text-align: left;
  padding: 8px 22px 8px 36px; cursor: pointer; display: flex; gap: 10px;
  align-items: baseline; border-left: 3px solid transparent;
  transition: all 0.12s; font-family: 'DM Sans', sans-serif;
}
.track-btn:hover { background: rgba(0,0,0,0.03); }
.track-btn.active { border-left-color: var(--red); background: color-mix(in srgb, var(--red) 8%, transparent); }
.track-btn.active .track-name { color: var(--red); font-weight: 600; }
.track-btn.no-lyrics .track-name { color: var(--dim); }
.track-num { font-size: 9px; color: var(--dim); font-weight: 500; min-width: 16px; flex-shrink: 0; }
.track-info { flex: 1; min-width: 0; }
.track-name { font-size: 12px; color: var(--ink); font-weight: 500; line-height: 1.4; }
.track-feat { font-size: 10px; color: var(--dim); margin-top: 1px; }

/* ══ MAIN ══ */
#main { margin-left: var(--sidebar-w); flex: 1; padding-bottom: 120px; }

/* ══ SONG / ALBUM HEADER ══ */
.song-hdr, .album-hdr-main {
  padding: 52px 64px 40px; border-bottom: 2px solid var(--ink); max-width: 820px;
}
.hdr-track { font-size: 9px; letter-spacing: 4px; text-transform: uppercase; color: var(--red); font-weight: 600; margin-bottom: 14px; }
.hdr-title { font-family: 'DM Sans', sans-serif; font-size: 54px; line-height: 1.0; font-weight: 700; margin-bottom: 8px; }
.hdr-feat { font-family: 'DM Sans', sans-serif; font-size: 17px; color: var(--mid); margin-bottom: 24px; }
.hdr-meta { display: flex; flex-wrap: wrap; font-size: 12px; color: var(--mid); border-top: 1px solid var(--border); padding-top: 16px; margin-top: 8px; }
.hdr-meta-item { margin-right: 32px; margin-bottom: 6px; }
.hdr-meta-item b { color: var(--ink); font-weight: 600; display: block; font-size: 10px; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 1px; }
.hdr-desc { margin-top: 24px; font-size: 14px; line-height: 1.95; color: var(--mid); font-family: 'DM Sans', sans-serif; }

/* Album overview header */
.album-hdr-main { display: flex; gap: 40px; align-items: flex-start; }
.album-art img { width: 160px; height: 160px; object-fit: cover; display: block; }
.album-art-ph { width: 160px; height: 160px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #555; text-align: center; letter-spacing: 2px; text-transform: uppercase; }
.album-body { flex: 1; }
.album-body .hdr-title { font-size: 42px; }

/* ══ COMING SOON ══ */
.coming-soon-wrap { padding: 60px 64px; max-width: 820px; }
.cs-rule { width: 40px; height: 2px; background: var(--red); margin-bottom: 28px; }
.cs-title { font-family: 'DM Sans', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 12px; }
.cs-body { font-size: 14px; line-height: 1.95; color: var(--mid); margin-bottom: 32px; }
.cs-tracklist { border-top: 1px solid var(--border); }
.cs-track { display: flex; gap: 16px; align-items: baseline; padding: 10px 0; border-bottom: 1px solid var(--border); }
.cs-num { font-size: 10px; color: var(--dim); min-width: 24px; font-weight: 500; }
.cs-name { font-size: 13px; color: var(--ink); }
.cs-feat-sm { font-size: 11px; color: var(--dim); margin-top: 2px; }

/* ══ SAMPLE COMPONENT ══ */
.sample-section { max-width: 820px; border-bottom: 1px solid var(--border); background: var(--bg2); }
.sample-toggle {
  display: flex; align-items: center; gap: 10px; width: 100%;
  background: none; border: none; border-top: 2px solid var(--red);
  padding: 13px 28px; cursor: pointer; font-family: 'DM Sans', sans-serif;
  text-align: left; transition: background 0.12s;
}
.sample-toggle:hover { background: rgba(192,57,43,0.04); }
.sample-toggle-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; font-weight: 600; color: var(--ink); }
.sample-toggle-chevron { font-size: 9px; color: var(--red); transition: transform 0.2s; }
.sample-section.open .sample-toggle-chevron { transform: rotate(90deg); }
.sample-body { display: none; }
.sample-section.open .sample-body { display: block; }
.sample-heading { padding: 16px 28px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 20px; }
.sample-label { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; font-weight: 600; color: var(--red); }
.sample-item { border-bottom: 1px solid var(--border); }
.sample-item:last-child { border-bottom: none; }
.sample-item + .sample-item { border-top: 4px solid var(--red); }
.sample-item-hdr { display: flex; align-items: center; gap: 10px; padding: 12px 28px; background: rgba(192,57,43,0.05); font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--ink); border-bottom: 1px solid var(--border); }
.sample-item-num { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 50%; background: var(--red); color: #fff; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.sample-item-rel { font-size: 10px; font-weight: 600; color: var(--red); letter-spacing: 0; padding: 2px 8px; border: 1px solid var(--red); border-radius: 3px; }
/* ── WAYAKU VIDEO ── */
.wayaku-section { max-width: 820px; padding: 28px 64px 8px; }
.wayaku-label { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; font-weight: 600; color: var(--red); margin-bottom: 14px; }
.wayaku-section .sample-embed { max-width: 560px; }
.sample-tracks { display: grid; grid-template-columns: 1fr 44px 1fr; align-items: stretch; background: var(--bg); }
.sample-track { padding: 22px 28px; display: flex; flex-direction: column; }
.sample-track .sample-ts { margin-top: auto; }
.sample-role { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--dim); font-weight: 600; margin-bottom: 14px; }
.sample-track-info { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 16px; }
.sample-art { width: 64px; height: 64px; object-fit: cover; flex-shrink: 0; }
.sample-art-ph { width: 64px; height: 64px; flex-shrink: 0; background: #1a1a1a; display: flex; align-items: center; justify-content: center; font-size: 8px; color: #666; text-align: center; line-height: 1.5; padding: 6px; }
.sample-meta { flex: 1; min-width: 0; }
.sample-track-name { font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; color: var(--ink); line-height: 1.3; margin-bottom: 4px; }
.sample-artist { font-size: 12px; color: var(--mid); margin-bottom: 5px; }
.sample-album { font-size: 11px; color: var(--dim); line-height: 1.7; }
.sample-ts { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding-top: 14px; }
.sample-ts-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); font-weight: 600; }
.sample-ts-time { font-size: 16px; font-weight: 700; color: var(--ink); letter-spacing: -0.5px; }
.sample-ts-link { font-size: 11px; color: var(--red); text-decoration: none; border: 1px solid var(--red); padding: 5px 12px; font-weight: 600; flex-shrink: 0; transition: background 0.12s, color 0.12s; background: none; font-family: 'DM Sans', sans-serif; cursor: pointer; border-radius: 3px; }
.sample-ts-link:hover { background: var(--red); color: #fff; }
.sample-connector { display: flex; align-items: center; justify-content: center; }
.sample-arrow { width: 28px; height: 28px; background: var(--red); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; }
.sample-embed { position: relative; width: 100%; aspect-ratio: 16 / 9; margin-bottom: 16px; background: #000; border-radius: 4px; overflow: hidden; }
.sample-embed iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
.sample-footer { border-top: 1px solid var(--border); padding: 10px 28px; display: flex; align-items: center; justify-content: space-between; background: var(--bg); font-size: 11px; color: var(--dim); }
.sample-footer-link { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--mid); text-decoration: none; border-bottom: 1px solid var(--border); transition: color 0.12s; }
.sample-footer-link:hover { color: var(--ink); border-bottom-color: var(--ink); }

/* ══ LYRICS ══ */
.lyrics-wrap { padding: 0 64px; max-width: 820px; }
.sec-header { margin: 48px 0 20px; display: flex; align-items: center; gap: 16px; }
.sec-rule { flex: 1; height: 1px; background: var(--border); }
.sec-label-text { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--dim); font-weight: 600; white-space: nowrap; }
.sec-note { font-size: 13px; line-height: 1.85; color: var(--mid); margin-bottom: 20px; font-style: italic; padding-left: 16px; border-left: 2px solid var(--border); }
.lyric-block { padding: 6px 0; }
.en-line { font-size: 16px; line-height: 1.7; color: var(--ink); white-space: pre-wrap; font-weight: 400; }
.ja-line { font-size: 14px; line-height: 1.75; color: var(--mid); white-space: pre-wrap; margin-top: 2px; font-family: 'Noto Sans JP', sans-serif; font-weight: 300; }
.ann-line { font-size: 12.5px; line-height: 1.85; color: var(--ann-text); margin-top: 8px; padding: 10px 14px; background: var(--ann-bg); border-left: 2px solid var(--red); }
.ann-star { font-weight: 700; margin-right: 4px; }
.spacer { height: 10px; }

/* ══ GLOSSARY ══ */
.gl-term { border-bottom: 1px solid #c0392b66; cursor: pointer; transition: color 0.12s; }
.gl-term:hover { color: var(--red); border-bottom-color: var(--red); }
#term-pop {
  position: fixed; background: #fff; border: 1.5px solid var(--ink); border-radius: 4px;
  padding: 14px 18px; max-width: 290px; z-index: 200; font-size: 12.5px; line-height: 1.75;
  color: var(--mid); display: none; box-shadow: 3px 3px 0 rgba(0,0,0,0.08);
}
#term-pop .tp-type { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; color: var(--red); font-weight: 600; margin-bottom: 4px; }
#term-pop .tp-name { font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 700; color: var(--ink); margin-bottom: 8px; }

/* ══ HOME ══ */
.home-hero {
  background: #0d0d0d; color: #fff; padding: 72px 64px 64px;
}
.home-hero-eye { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; color: rgba(255,255,255,0.4); font-weight: 600; margin-bottom: 20px; }
.home-hero-title { font-size: 64px; line-height: 1.0; font-weight: 700; margin-bottom: 20px; letter-spacing: -2px; }
.home-hero-body { font-size: 15px; line-height: 1.8; color: rgba(255,255,255,0.55); max-width: 560px; margin-bottom: 48px; }
.home-hero-stats { display: flex; gap: 48px; border-top: 1px solid rgba(255,255,255,0.12); padding-top: 32px; }
.home-stat-num { font-size: 38px; font-weight: 700; letter-spacing: -2px; line-height: 1; }
.home-stat-label { font-size: 10px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 2px; margin-top: 4px; }
.home-discog-section { padding: 48px 0 80px; }
.home-discog-hdr { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--dim); font-weight: 600; padding: 0 64px 20px; border-bottom: 1px solid var(--border); margin-bottom: 3px; }
.home-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; }
.home-card {
  position: relative; aspect-ratio: 1 / 1; background: #1a1a1a;
  border: none; cursor: pointer; overflow: hidden; padding: 0;
}
.home-card-art {
  width: 100%; height: 100%; background-size: cover; background-position: center;
  transition: transform 0.45s cubic-bezier(0.25,0.46,0.45,0.94);
  display: flex; align-items: center; justify-content: center;
}
.home-card:hover .home-card-art { transform: scale(1.06); }
.home-card-ph-text {
  font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(255,255,255,0.3); text-align: center; line-height: 1.8; pointer-events: none;
}
.home-card-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.4) 60%, rgba(0,0,0,0) 100%);
  padding: 40px 14px 14px;
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.25,0.46,0.45,0.94);
  text-align: left;
}
.home-card:hover .home-card-overlay { transform: translateY(0); }
.home-card-num { font-size: 9px; color: rgba(255,255,255,0.45); letter-spacing: 2px; margin-bottom: 3px; }
.home-card-title { font-size: 12px; font-weight: 600; color: #fff; line-height: 1.3; margin-bottom: 6px; }
.home-card-badge { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; }
.home-card-badge.done { color: #4ade80; }
.home-card-badge.wip { color: rgba(255,255,255,0.3); }

@media (max-width: 820px) {
  #sidebar { width: 100%; position: relative; min-height: auto; border-right: none; border-bottom: 1px solid var(--border); }
  #main { margin-left: 0; }
  .song-hdr, .album-hdr-main, .lyrics-wrap, .coming-soon-wrap, .home-wrap { padding: 24px 20px; }
  .hdr-title { font-size: 34px; }
  .album-body .hdr-title { font-size: 28px; }
  .album-hdr-main { flex-direction: column; }
  .sample-tracks { grid-template-columns: 1fr; }
  .sample-connector { display: none; }
}
</style>
</head>
<body>

<nav id="sidebar">
  <div id="sidebar-top">
    <div class="sb-eyebrow">和訳解説</div>
    <button class="sb-brand" onclick="navigate('home')" style="background:none;border:none;cursor:pointer;padding:0;text-align:left;display:block;width:100%;font-family:inherit;">Kanye West 大全</button>
    <div class="sb-sub">ディスコグラフィー</div>
  </div>
  <div class="sb-albums" id="album-nav"></div>
</nav>

<main id="main">
  <div id="content"></div>
</main>

<div id="term-pop"></div>

<script>
// ══════════════════════════════════════════
// DATA
// ══════════════════════════════════════════
const GLOSSARY = {
  "Common": {type:"アーティスト", desc:"シカゴ出身のコンシャス・ラッパー（本名：Lonnie Rashid Lynn）。Kanyeが最も尊敬するラッパーの一人で、この時期Kanyeとともに名盤『Be』(2005)を制作。"},
  "Gil Scott-Heron": {type:"アーティスト", desc:"詩人・ミュージシャン（1949–2011）。ジャズとポエトリー・リーディングを融合させた「ヒップホップの祖父」。My Way Homeでサンプル使用。"},
  "The Game": {type:"アーティスト", desc:"ウエストコースト（コンプトン）出身のラッパー（本名：Jayceon Terrell Taylor）。Crack Musicでフィーチャリング参加。"},
  "Brandy": {type:"アーティスト", desc:"R&B歌手（本名：Brandy Rayana Norwood）。「The Boy Is Mine」(1998)等で90年代を席巻。Bring Me Downでフィーチャリング参加。"},
  "Malik Yusef": {type:"人物", desc:"シカゴ出身の詩人・アクティビスト。Kanyeの友人で多くのアルバムにアウトロとして参加。"},
  "Pac": {type:"アーティスト", desc:"Tupac Shakur（2Pac）のこと。1996年9月13日、ラスベガスでの銃撃事件で25歳で死去。"},
  "Mike Tyson": {type:"人物", desc:"元ヘビー級ボクシング世界チャンピオン。ボクシングにおける「コーナーマン（支えてくれる人）」の象徴として引用。"},
  "R. Kel'": {type:"アーティスト", desc:"R・ケリー。シカゴ出身R&Bシンガー。「Trapped in the Closet」(2005)シリーズで知られる。後に30年の実刑判決。"},
  "Magic Johnson": {type:"人物", desc:"NBA伝説的選手。1991年にHIV陽性を公表後も資金力から最高の医療を受け続けた。医療格差を語る文脈で引用。"},
  "Ronald Reagan": {type:"人物", desc:"第40代米大統領（1981–89）。FBIのCOINTELPROプログラムを通じてブラックパンサー党を弾圧。"},
  "Hova": {type:"アーティスト", desc:"Jay-Z（本名：Shawn Corey Carter）のニックネーム。「ジェホバ（神）」から。NYブルックリン出身のラッパー・実業家。"},
  "Etta James": {type:"アーティスト", desc:"伝説的R&Bシンガー（本名：Jamesetta Hawkins）。「At Last」等で知られる。Addictionでサンプル使用。"},
  "Amerie": {type:"アーティスト", desc:"R&Bシンガー。「1 Thing」（2005年）が大ヒット。Rosesで引用。"},
  "Bill Withers": {type:"アーティスト", desc:"ソウル・R&B歌手（1938–2020）。「Lean on Me」「Ain't No Sunshine」等で知られる。Rosesで「Rosie」(1973)がサンプル使用。"},
  "Rose Banks": {type:"アーティスト", desc:"1970年代のR&Bシンガー。「My Life Is Loving You」がBring Me Downにサンプル使用。"},
  "dome": {type:"スラング", desc:"頭・精神を指すスラング。「My dome is where fate is」＝「俺の頭の中に運命がある」"},
  "hypes": {type:"スラング", desc:"ヘロイン中毒者を指すスラング。"},
  "hustle": {type:"スラング", desc:"お金を稼ぐために働くこと（合法・非合法問わず）。"},
  "frontin'": {type:"スラング", desc:"本当の自分と違うふりをすること。"},
  "bail": {type:"スラング・法律", desc:"①保釈金 ②その場から逃げ出すこと。"},
  "fiends": {type:"スラング", desc:"ドラッグ中毒者・依存者のスラング。"},
  "shorty": {type:"スラング", desc:"若い男性・少年を指すスラング。"},
  "COINTELPRO": {type:"歴史", desc:"FBI秘密工作プログラム（Counter Intelligence Program）。1956–71年運用。ブラックパンサー党など急進派組織を弾圧した。"},
  "Talib Kweli": {type:"アーティスト", desc:"ブルックリン出身のコンシャス・ラッパー。Get Em Highに参加。"},
  "Jay-Z": {type:"アーティスト", desc:"NYブルックリン出身のラッパー・実業家（本名：Shawn Carter）。Roc-A-Fellaレーベルの共同設立者。KanyeのボスでありながらThe College Dropoutで共演。"},
  "Ludacris": {type:"アーティスト", desc:"アトランタ出身のラッパー（本名：Christopher Bridges）。Breathe In Breathe Outに参加。"},
  "Twista": {type:"アーティスト", desc:"シカゴ出身のラッパー。超高速ラップで知られる。Slow Jamzに参加。"},
  "Mos Def": {type:"アーティスト", desc:"ブルックリン出身のラッパー・俳優（本名：Dante Terrell Smith）。Two Wordsに参加。"},
};

// ── Late Registration songs ──
const LR_SONGS = [
  {
    id:"lr-my-way-home", num:"07", title:"My Way Home", feat:"feat. Common",
    producer:"Kanye West",
    youtubeUrl:"https://www.youtube.com/watch?v=q6UqUDhSUCc",

      {label:"[Intro: DeRay Davis]",note:"DeRay Davis（デレイ・デイヴィス）：シカゴ出身のコメディアン・俳優。The College Dropoutで「権威ある教師・社会の声」役を一貫して演じており、Spaceship、School Spirit Skit、Lil Jimmy Skitなどに登場する。",lines:[
        {en:"Kanye, can I talk to you for a minute?",ja:"カニエ、ちょっといいか？",ann:null},
        {en:"Me and the other faculty members was wonderin'",ja:"俺と他の先生たちで話してたんだが",ann:null},
        {en:"Could you do a lil' som—",ja:"ちょっと何かやってくれないか——",ann:null},
        {en:"Somethin' beautiful, somethin' that the kids is gon' love when they hear it",ja:"きれいなもの、子供たちが聞いたら喜ぶようなもの",ann:null},
        {en:"That's gon' make them start jumpin' up and down, and sharin' candy and stuff",ja:"飛び跳ねて、お菓子を分け合うようなやつ",ann:null},
        {en:"Think you could probably do somethin', for the kids, for graduation to sing?",ja:"子供たちのために、卒業式で歌えるようなの、何か作れるか？",ann:null}
      ]}
    ]
  }},

    whosampledUrl:"https://www.whosampled.com/Kanye-West/We-Don't-Care/",
    artwork:"1. The College Dropout/College Dropout artwork.jpg",
    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"シカゴ南部のゲットーで育つ子供たちが麻薬売買に身を投じる現実を、聖歌隊の声を背景にユーモアと怒りで描いたアルバムのリードトラック。「大学も仕事もない」状況で薬物取引が唯一のキャリアになる社会構造を批判する。コーラスに子供の聖歌隊を使うことで、次世代への問いかけを込めた。",
    sections:[
      {label:"[Intro]",note:null,lines:[
        {en:"Oh, yeah",ja:"ああ、そうだ",ann:null},
        {en:"I got the perfect song for the kids to sing",ja:"子供たちが歌うのにぴったりな曲がある",ann:null},
        {en:"And all my people that's",ja:"そして俺の仲間たち全員、",ann:null}
      ]},
      {label:"[Chorus]",note:null,lines:[
        {en:"Drug dealin' just to get by",ja:"なんとか生き残るために麻薬を売る",ann:null},
        {en:"Stack your money 'til it get sky high",ja:"金を空まで積み上げろ",ann:null},
        {en:"We wasn't s'posed to make it past twenty-five",ja:"俺たちは25を越えられないはずだった",ann:null},
        {en:"Joke's on you, we still alive",ja:"お前への皮肉だ、俺たちはまだ生きてる",ann:null},
        {en:"Throw your hands up in the sky and say",ja:"両手を空に上げて言え",ann:null},
        {en:"\"We don't care what people say\"",ja:"「人々が何を言おうと俺たちは気にしない」",ann:null}
      ]},
      {label:"[Verse 1: Kanye West]",note:"シカゴ南部（South Side）：Kanyeが幼少期を過ごした地域。黒人居住区が集中し、1990〜2000年代にかけて高い貧困率・犯罪率が続いた。公立学校の質の低さと進路選択肢の狭さが、ドラッグビジネスへの参入を構造的に生み出している現実を本曲は描く。",lines:[
        {en:"If this is your first time hearin' this",ja:"これを初めて聞くなら",ann:null},
        {en:"You are about to experience somethin' so cold, man",ja:"お前はとんでもなくヤバいものを体験しようとしてる",ann:null},
        {en:"We never had nothin' handed, took nothin' for granted",ja:"俺たちは何も与えられず、何も当然とは思わなかった",ann:null},
        {en:"Took nothin' from no man, man, I'm my own man",ja:"誰からも何も奪わなかった、俺は自分自身の男だ",ann:null},
        {en:"But as a shorty, I looked up to the dope man",ja:"でもガキの頃は、麻薬売人を尊敬してた",ann:null},
        {en:"Only adult man I knew that wasn't broke, man",ja:"俺が知ってた、金がない状態じゃなかった唯一の大人の男だった",ann:null},
        {en:"Flicking Starter coats, man—man, you don't know, man",ja:"スターターコートをはためかせて——お前にはわからない",ann:"Starter coats（スターターコート）：1990年代にスポーツチームのロゴが入ったナイロン製ジャケット。ゲットーの若者の間で流行し、高価なブランド品の象徴として扱われた。"},
        {en:"We don't care what people say",ja:"人々が何を言おうと俺たちは気にしない",ann:null},
        {en:"This is for my niggas outside all winter",ja:"これは冬中外にいる仲間のためだ",ann:null},
        {en:"'Cause this summer, they ain't finna say, \"Next summer, I'm finna\"",ja:"なぜなら今年の夏、彼らは「来年の夏には〜するつもり」とは言わないから",ann:null},
        {en:"Sittin' in the hood like community colleges",ja:"コミュニティカレッジみたいにゲットーに座ってる",ann:"Community College（コミュニティカレッジ）：アメリカの2年制公立大学。学費が低く入学要件も緩やか。前進できずにいる状況を皮肉る比喩。"},
        {en:"This dope money here is Lil' Trey's scholarship",ja:"この麻薬マネーがリル・トレイの奨学金だ",ann:null},
        {en:"'Cause ain't no tuition for having no ambition",ja:"なぜなら野心がないことへの学費はないから",ann:null},
        {en:"And ain't no loans for sittin' your ass at home",ja:"家でぶらぶらしてることへのローンもない",ann:null},
        {en:"So we forced to sell crack, rap, and get a job",ja:"だからクラックを売るか、ラップするか、仕事を得るしかない",ann:null},
        {en:"You gotta do somethin', man, your ass is grown",ja:"何かしなきゃならない、お前はもう大人だ",ann:null}
      ]},
      {label:"[Chorus: Kanye West with Choir]",note:null,lines:[
        {en:"Drug dealin' just to get by",ja:"なんとか生き残るために麻薬を売る",ann:null},
        {en:"Stack your money 'til it get sky high",ja:"金を空まで積み上げろ",ann:null},
        {en:"Kids, sing! Kids, sing!",ja:"子供たちよ、歌え！",ann:null},
        {en:"We wasn't s'posed to make it past twenty-five",ja:"俺たちは25を越えられないはずだった",ann:null},
        {en:"Joke's on you, we still alive",ja:"お前への皮肉だ、俺たちはまだ生きてる",ann:null},
        {en:"Throw your hands up in the sky and say",ja:"両手を空に上げて言え",ann:null},
        {en:"\"We don't care what people say\"",ja:"「人々が何を言おうと俺たちは気にしない」",ann:null}
      ]},
      {label:"[Verse 2]",note:null,lines:[
        {en:"This second verse is for my dogs working nine to five that still hustle",ja:"この2番は、9時から5時まで働きながらまだ頑張ってる仲間のためだ",ann:null},
        {en:"'Cause a nigga can't shine off $6.55",ja:"なぜなら6ドル55セントじゃ輝けないから",ann:"$6.55は当時のイリノイ州の最低賃金（時給）。低賃金労働では生活が成り立たない現実を示す。"},
        {en:"And everybody sellin' makeup, Jacob's",ja:"みんなメイクアップを売ったり、ジェイコブに行ったり",ann:"Jacob's＝Jacob & Co.（ジェイコブ・アンド・コー）。ヒップホップ界御用達のニューヨークの高級宝石商。"},
        {en:"And bootleg tapes just to get they cake up",ja:"ブートレグテープを売ったりして金を稼ごうとしてる",ann:null},
        {en:"We put shit on layaway, then come back",ja:"ものを後払いで予約して、また取りに来る",ann:"Layaway（後払い予約）：代金を分割払いで支払い終えた後に商品を受け取れる購入方式。クレジットカードが使えない低所得層が利用した。"},
        {en:"We claim other people kids on our income tax",ja:"他人の子供を自分の確定申告に申告する",ann:"貧困コミュニティでは課税控除を最大化するため、親族の子供を扶養申告するケースが存在した社会的現実。"},
        {en:"We take that money, cop work, then push packs to get paid",ja:"その金を取って、商品を仕入れて、小分けにして売る",ann:null},
        {en:"And we don't care what people say",ja:"そして人々が何を言おうと俺たちは気にしない",ann:null},
        {en:"Mama say she wanna move South",ja:"ママは南部に引っ越したいと言う",ann:null},
        {en:"Scratching lottery tickets, eyes on a new house",ja:"宝くじをこすりながら、新しい家を見つめてる",ann:null}
      ]},
      {label:"[Chorus: Kanye West & Choir]",note:null,lines:[
        {en:"Drug dealin' just to get by",ja:"なんとか生き残るために麻薬を売る",ann:null},

        {en:"Kids, sing! Kids, sing!",ja:"子供たちよ、歌え！",ann:null},
        {en:"We wasn't s'posed to make it past twenty-five",ja:"俺たちは25を越えられないはずだった",ann:null},
        {en:"Joke's on you, we still alive",ja:"お前への皮肉だ、俺たちはまだ生きてる",ann:null},
        {en:"Throw your hands up in the sky and say",ja:"両手を空に上げて言え",ann:null},
        {en:"\"We don't care what people say\"",ja:"「人々が何を言おうと俺たちは気にしない」",ann:null}
      ]},
      {label:"[Verse 3]",note:null,lines:[
        {en:"You know the kids gon' act a fool",ja:"子供たちが馬鹿な行動をするのはわかってる",ann:null},
        {en:"When you stop the programs for after school",ja:"放課後のプログラムをなくしたら",ann:null},
        {en:"And they DCFS, some of 'em dyslexic",ja:"DCFSの管轄で、一部は識字障害がある",ann:"DCFS（Illinois Department of Children and Family Services）：イリノイ州の児童家庭サービス局。貧困・虐待家庭の子供を管理・保護する機関。"},
        {en:"They favorite 50 Cent song \"12 Questions\"",ja:"彼らのお気に入りの50 Centの曲は「12 Questions」",ann:"50 Cent（フィフティ・セント）：ニューヨーク出身のラッパー。2003年「In Da Club」で大ブレイク。「12 Questions」は架空のタイトル。"},
        {en:"We scream: \"Rocks, blows, weed, park,\" see, now we smart",ja:"「ロックス、ブロウ、ウィード、パーク」と叫ぶ、そうだ、俺たちは賢い",ann:"rocks（クラック）、blows（コカイン）、weed（大麻）など、子供たちが学校の勉強より先にドラッグの隠語を覚えてしまう環境への皮肉。"},
        {en:"We ain't retards the way teachers thought",ja:"先生が思ってたような知恵おくれじゃない",ann:null},
        {en:"Hold up, hold fast, we make more cash",ja:"ちょっと待て、持ちこたえろ、俺たちはもっと稼ぐ",ann:null},
        {en:"Now, tell my mama I belong in that slow class",ja:"ママに言ってみろ、俺が特別支援クラスに属してるって",ann:null},
        {en:"It's bad enough we on welfare",ja:"福祉を受けてるだけで十分つらいのに",ann:null},
        {en:"You tryna put me on the school bus with the space for the wheelchair",ja:"車椅子スペースのあるスクールバスに乗せようとしてる",ann:null},
        {en:"I'm tryna get the car with the chromey wheels here",ja:"俺はクロームのホイールがついた車を手に入れようとしてる",ann:null},
        {en:"You tryna cut our lights out like we don't live here",ja:"俺たちがここに住んでないみたいに電気を切ろうとしてる",ann:null},
        {en:"Look what was handed us, fathers abandoned us",ja:"俺たちに与えられたものを見ろ、父親たちは俺たちを捨てた",ann:null},
        {en:"When we get them hammers, go on, call the ambulance",ja:"俺たちが銃を手にしたら、どうぞ、救急車を呼べ",ann:"hammersは銃のスラング。"},
        {en:"Sometimes, I feel no one in this world understands us",ja:"時々、この世で俺たちを理解してる人は誰もいないと感じる",ann:null},
        {en:"But we don't care what people say",ja:"でも人々が何を言おうと俺たちは気にしない",ann:null}
      ]},
      {label:"[Chorus: Kanye West & Choir]",note:null,lines:[
        {en:"Drug dealin' just to get by",ja:"なんとか生き残るために麻薬を売る",ann:null},

      ]}

  }},
  {num:"03",title:"Graduation Day",feat:"feat. John Legend",hasLyrics:true,data:{
    num:"03",title:"Graduation Day",feat:"feat. John Legend",
    producer:"Kanye West",sample:null,sampleSources:[],whosampledUrl:null,
    artwork:"../1. The College Dropout/College Dropout artwork.jpg",
    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"We Don't Careの後に続くスキット＋ミニトラック。DeRay Davis演じる先生がKanyeに激怒してキャンパスから追い出し、続いてJohn Legendが「もっといいものがある、誰にも言うな」と歌う。学歴社会への反抗とドロップアウトの解放感を対比した構成。",
    sections:[
      {label:"[Spoken: DeRay]",note:null,lines:[
        {en:"What in the fuck was that, Kanye?",ja:"カニエ、あれは一体何だったんだ？",ann:null},
        {en:"I told you to do some shit for the kids",ja:"子供たちのために何かやれと言ったんだ",ann:null},
        {en:"You can give me your muthafuckin' graduation ticket right now",ja:"今すぐ卒業式のチケットを渡せ",ann:null},
        {en:"You give me this muthafuckin' robe before you catch some senioritis",ja:"お前が卒業前症候群にかかる前にこのガウンを返せ",ann:"Senioritis（シニアアイティス）：卒業が近づいた学生が無気力になる現象を指すアメリカの口語表現。"},
        {en:"You will not walk 'cross that stage, you won't slide across that stage",ja:"あのステージを歩かせない、滑らせもしない",ann:null},
        {en:"I'm tryna get you out here with these white people and this how you're gon' do me?",ja:"俺はここで白人たちと一緒にお前を卒業させようとしてたのに、こんなことするのか？",ann:null},
        {en:"You know what, you's a nigga, and I don't mean that in no nice way",ja:"わかったか、お前はニガーだ、褒め言葉じゃない",ann:null},
        {en:"'Cause, you getting the fuck out of this campus",ja:"なぜなら、お前はこのキャンパスから出て行くんだから",ann:null},
        {en:"What the fuck you gon' do now?",ja:"お前はこれからどうするんだ？",ann:null}
      ]},
      {label:"[Verse: John Legend]",note:null,lines:[
        {en:"I'm no longer confused, but, don't tell anybody",ja:"もう迷っていない、でも誰にも言うな",ann:"John Legend（ジョン・レジェンド、本名John Roger Stephens、1978〜）：オハイオ州出身のR&Bシンガー・ピアニスト。この時点ではまだソロデビュー前。後にEGOT（Emmy・Grammy・Oscar・Tony全受賞）を達成した最初の黒人アーティスト。"},
        {en:"I'm about to break the rules, but, don't tell anybody",ja:"ルールを破ろうとしている、でも誰にも言うな",ann:null},
        {en:"I got something better than school, so don't tell anybody",ja:"学校より良いものがある、だから誰にも言うな",ann:null},
        {en:"My momma would kill me, so, don't tell anybody",ja:"ママに殺されちゃうから、誰にも言うな",ann:null},
        {en:"She wants me to get a good-ass job, just like everybody",ja:"ママは俺にも皆と同じように良い仕事に就いてほしいと思ってる",ann:null},
        {en:"She ain't walked in my shoes, I'm just not everybody",ja:"ママは俺の立場にはなれない、俺はみんなと同じじゃない",ann:null}
      ]}
    ]
  }},
  {num:"04",title:"All Falls Down",feat:"feat. Syleena Johnson",hasLyrics:true,data:{
    num:"04",title:"All Falls Down",feat:"feat. Syleena Johnson",
    producer:"Kanye West",
    sample:"Lauryn Hill「Mystery of Iniquity」(2002)",
    sampleSources:[
      {artist:"Lauryn Hill",title:"Mystery of Iniquity",year:2002,album:"MTV Unplugged No. 2.0",url:"#"}
    ],
    whosampledUrl:null,
    artwork:"../1. The College Dropout/College Dropout artwork.jpg",
    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"物質主義・自己嫌悪・インセキュリティに支配される若い黒人女性と、最後に自分自身も同じ問題を抱えていると告白するKanyeを描いた曲。Lauryn Hillのクリアランスが下りなかったため、Syleena Johnsonが代わりにそのメロディを歌っている。",
    sections:[
      {label:"[Chorus: Syleena Johnson & Kanye West]",note:null,lines:[
        {en:"Oh, when it all, it all falls down",ja:"ああ、全てが、全てが崩れ落ちるとき",ann:null},
        {en:"I'm tellin' you all, it all falls down",ja:"みんなに言う、全ては崩れ落ちる",ann:null}
      ]},
      {label:"[Verse 1: Kanye West]",note:null,lines:[
        {en:"Man, I promise, she's so self-conscious",ja:"約束するが、彼女は本当に自意識過剰だ",ann:null},
        {en:"She has no idea what she doin' in college",ja:"大学で何をしているのか自分でもわかっていない",ann:null},
        {en:"That major that she majored in don't make no money",ja:"彼女が専攻した学科では金にならない",ann:null},
        {en:"But she won't drop out, her parents'll look at her funny",ja:"でも中退できない——親に変な目で見られるから",ann:null},
        {en:"Couldn't afford a car, so she named her daughter Alexis",ja:"車が買えないから、娘をアレクシスと名付けた",ann:"「Alexis（アレクシス）」：レクサス高級セダン「LS」の愛称に近い発音。車が買えないため娘に高級車の名前をつけるという皮肉。"},
        {en:"She had hair so long that it looked like weave",ja:"ウィッグに見えるほど長い髪があった",ann:null},
        {en:"Then she cut it all off, now she look like Eve",ja:"全部切ってしまって、今はイヴのように見える",ann:"Eve（イヴ）：フィラデルフィア出身のラッパー。2000年代初頭のヒップホップシーンを代表する女性MC。スキンヘッドで知られる。"},
        {en:"Single black female addicted to retail and well",ja:"小売り依存症の独身黒人女性、そして",ann:null}
      ]},
      {label:"[Verse 2: Kanye West]",note:null,lines:[
        {en:"Man, I promise, I'm so self-conscious",ja:"約束するが、俺は本当に自意識過剰だ",ann:null},
        {en:"That's why you always see me with at least one of my watches",ja:"だから俺はいつも少なくとも一つ時計を着けているのが見える",ann:null},
        {en:"Rollies and Pashas done drove me crazy",ja:"ロレックスとカルティエのパシャが俺を狂わせた",ann:"Rollie（ロリー）：ロレックスの愛称。Pasha（パシャ）：カルティエの時計シリーズ。どちらも高級時計ブランドのアイコン。"},
        {en:"I can't even pronounce nothing, pass that Ver-say-cee",ja:"何も発音できない、そのヴェルサーチをよこせ",ann:null},
        {en:"We shine because they hate us, floss 'cause they degrade us",ja:"憎まれるから輝く、見下されるから見せびらかす",ann:null},
        {en:"We tryna buy back our forty acres",ja:"俺たちは40エーカーを買い戻そうとしている",ann:"南北戦争終結後の1865年、解放された黒人奴隷に土地（40エーカーとラバ1頭）を与えるという政府の約束が果たされなかった史実への言及。"},
        {en:"Even if you in a Benz, you still a nigga in a coupe",ja:"ベンツに乗っていても、クーペに乗ったニガーにすぎない",ann:null}
      ]},
      {label:"[Verse 3: Kanye West]",note:null,lines:[
        {en:"We buy our way out of jail, but we can't buy freedom",ja:"刑務所からは金で出られるが、自由は買えない",ann:null},
        {en:"Things we buy to cover up what's inside",ja:"内側にあるものを隠すために買うもの",ann:null},
        {en:"'Cause they made us hate ourself and love they wealth",ja:"彼らが俺たちに自分を憎ませ、彼らの富を愛させたから",ann:null},
        {en:"Drug dealer buy Jordan, crackhead buy crack",ja:"麻薬売人はジョーダンを買い、クラックヘッドはクラックを買う",ann:null},
        {en:"And the white man get paid off of all of that",ja:"そして白人はその全てから利益を得ている",ann:null},
        {en:"'Cause fuck it, I went to Jacob with twenty-five thou'",ja:"だってクソ、俺も25000ドルを持ってジェイコブのところへ行ったから",ann:"Jacob the Jeweler（ジェイコブ・ザ・ジュエラー）：ニューヨークのダイヤモンドジュエラー、Jacob Arabo。ヒップホップアーティストが高額ジュエリーを購入する象徴的な場所。"},
        {en:"'Cause I wanna be on 106 & Park, pushin' a Benz",ja:"106 & Parkに出てベンツを乗り回したいから",ann:"106 & Park：BET（Black Entertainment Television）の人気音楽番組。2000年代の黒人音楽の主要なプロモーション媒体。"},
        {en:"We all self-conscious, I'm just the first to admit it",ja:"俺たちは皆自意識過剰だ、俺はただ最初にそれを認めただけ",ann:null}
      ]},
      {label:"[Outro: DeRay]",note:null,lines:[
        {en:"I just can't keep workin' like this",ja:"もうこんな風には働き続けられない",ann:null},
        {en:"This grave shifts is like a slave ship",ja:"このグレイブシフト（深夜シフト）は奴隷船みたいだ",ann:"grave shift（グレイブシフト）：深夜勤務（graveyardシフト）を指す俗語。「奴隷船」との言葉遊びで低賃金労働の搾取的な性質を表している。"}
      ]}
    ]
  }},
  {num:"05",title:"I'll Fly Away",feat:"feat. Tony Williams & DeRay Davis",hasLyrics:true,data:{
    num:"05",title:"I'll Fly Away",feat:"feat. Tony Williams & DeRay Davis",
    producer:"Kanye West",sample:null,sampleSources:[],whosampledUrl:null,
    artwork:"../1. The College Dropout/College Dropout artwork.jpg",
    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"1929年作の伝統的なアメリカのゴスペル讃美歌をカバーしたインタールード。アルバム全体を貫く信仰・救済のテーマを体現し、前曲All Falls Downの重苦しさから解放感を与える役割を果たしている。",
    sections:[
      {label:"[Verse: Tony Williams & DeRay Davis]",note:null,lines:[
        {en:"One glad morning, when this life is over, I'll fly away",ja:"嬉しい朝が来て、この人生が終わったとき、私は飛び立つ",ann:"「I'll Fly Away」：1929年にAlbert E. Brumleyが作曲したゴスペル讃美歌。南部の白人プロテスタント教会で生まれたが、のちに黒人ゴスペルでも広く歌われるようになった。2000年の映画「O Brother, Where Art Thou?」でも使われ広く知られる。"},
        {en:"To a land where joy shall never end, oh, I'll fly away",ja:"喜びが終わることのない土地へ、ああ、私は飛び立つ",ann:null}
      ]},
      {label:"[Chorus: Tony Williams & DeRay Davis]",note:null,lines:[
        {en:"Oh, I'll fly away, oh, glory",ja:"ああ、飛び立つ、ああ栄光よ",ann:null},
        {en:"I'll fly away",ja:"私は飛び立つ",ann:null},
        {en:"When I die, Hallelujah, bye and bye",ja:"私が死んだとき、ハレルヤ、そのうちに",ann:null},
        {en:"I'll fly away",ja:"私は飛び立つ",ann:null}
      ]}
    ]
  }},
  {num:"06",title:"Spaceship",feat:"feat. GLC & Consequence",hasLyrics:true,data:{
    num:"06",title:"Spaceship",feat:"feat. GLC & Consequence",
    producer:"Kanye West",
    sample:"Marvin Gaye「Distant Lover」(1973)",
    sampleSources:[{artist:"Marvin Gaye",title:"Distant Lover",year:1973,album:"Let's Get It On",url:"#"}],
    whosampledUrl:null,
    artwork:"../1. The College Dropout/College Dropout artwork.jpg",
    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"Kanyeが音楽の夢を追いながらGapでアルバイトをしていた時期の実体験を描いた曲。黒人スタッフへの差別的な扱い、閉塞感、夢への渇望を「宇宙船で飛び立ちたい」という比喩で表現する。GLC、Consequenceがそれぞれの苦境を語るヴァースも加わる。",
    sections:[
      {label:"[Chorus]",note:null,lines:[
        {en:"I've been working this grave-shift / And I ain't made shit",ja:"俺はずっとグレイブシフトで働いてきた / 何も稼げなかった",ann:null},
        {en:"I wish I could buy me a spaceship and fly / Past the sky, oh",ja:"宇宙船を買って飛んでいきたい / 空の向こうへ、ああ",ann:null}
      ]},
      {label:"[Verse 1: Kanye West]",note:null,lines:[
        {en:"Let's go back, back to the Gap",ja:"ギャップに戻ろう",ann:"Gap（ギャップ）：アメリカ最大手の衣料品チェーン。Kanyeは音楽デビュー前に実際にGapでアルバイトをしていた。"},
        {en:"Look at my check—wasn't no scratch",ja:"俺の給料を見ろ——何もなかった",ann:null},
        {en:"They take me to the back and pat me / Asking me about some khakis",ja:"俺を奥に連れて行ってパットダウン（所持品検査）される / カーキパンツのことを聞かれる",ann:null},
        {en:"But let some Black people walk in",ja:"でも黒人のお客が入ってくると",ann:null},
        {en:"I bet you they show off their token blackie",ja:"トークン・ブラッキー（免罪符の黒人）として俺を前に出してくるに違いない",ann:"token blackie（トークン・ブラッキー）：企業が多様性を見せるために形式的に置く黒人従業員を指す皮肉的な表現。"},
        {en:"Lock yourself in a room / Doing five beats a day for three summers",ja:"部屋に閉じこもれ / 3年の夏、毎日5つのビートを作れ",ann:null},
        {en:"That's A Different World like Cree Summer's",ja:"それがCree SummerのA Different Worldだ",ann:"A Different World（ア・ディファレント・ワールド）：黒人大学（HBCU）を舞台にしたNBCのシットコム（1987〜1993年）。Cree Summerはその出演女優。"},
        {en:"I deserve to do these numbers",ja:"俺はこれだけの数字を出す資格がある",ann:null},
        {en:"\"The kid that made that deserves that Maybach!\"",ja:"「あれを作った子はマイバッハを受け取る資格がある！」",ann:"Maybach（マイバッハ）：ドイツの超高級自動車ブランド。成功した証として受け取るべき報酬の象徴。"}
      ]},
      {label:"[Verse 2: GLC]",note:null,lines:[
        {en:"Thirsty on the grind, Chi state of mind",ja:"ハングリーに動き続け、シカゴの精神で",ann:"GLC（本名Gregory L. Collins）：シカゴ南部出身のラッパー、Kanyeの幼馴染。"},
        {en:"Lost my mama, lost my mind",ja:"ママを失い、正気も失った",ann:null},
        {en:"\"Why you ain't signed?\" Wasn't my time",ja:"「なぜサインされてないんだ？」まだ俺の時じゃなかった",ann:null}
      ]},
      {label:"[Verse 3: Consequence]",note:null,lines:[
        {en:"\"Yo, you look just like this kid I seen in an old Busta Rhymes video\"",ja:"「お前、古いバスタ・ライムスのビデオに出てた子に似てるな」",ann:"Consequence（コンシクエンス）：クイーンズ出身のラッパー。A Tribe Called QuestのQ-TipがKanyeに紹介した。"},
        {en:"That all had got snatched from me, A&Rs and they faculties",ja:"全てが奪われた、A&Rたちと彼らのスタッフに",ann:"A&R（エー・アンド・アール）：Artists and Repertoire。レコードレーベルでアーティストの発掘・契約を担当する部門。"},
        {en:"So I won't be taking no days off 'til my spaceship takes off, blaow!",ja:"宇宙船が飛び立つまで一日も休まない、ブラウ！",ann:null}
      ]},
      {label:"[Outro: Tony Williams]",note:null,lines:[
        {en:"I wanna fly / I said I want my chariot to pick me up / And take a brother for a ride",ja:"飛びたい / 戦車が迎えに来てくれることを願う / 兄弟を乗せて走ってほしい",ann:null}
      ]}
    ]
  }},
  {num:"07",title:"Jesus Walks",feat:null,hasLyrics:true,data:{
    num:"07",title:"Jesus Walks",feat:null,
    producer:"Kanye West, Che Smith",
    sample:"ARC Choir「Walk with Me」",
    sampleSources:[
      {artist:"ARC Choir",title:"Walk with Me",year:null,album:null,url:"#"}
    ],
    whosampledUrl:null,
    artwork:"../1. The College Dropout/College Dropout artwork.jpg",
    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"Kanyeの代表曲の一つ。ラジオ局に「宗教的すぎてかけられない」と3度拒否されながら、3つの異なるMVを制作し最終的にグラミー賞最優秀ラップソングを受賞。ギャングスター、ドラッグ中毒者、ストリッパーなど社会から排除されたすべての人々と「ジーザスが歩む」というメッセージを込めている。",
    sections:[
      {label:"[Spoken Intro]",note:null,lines:[
        {en:"We at war",ja:"俺たちは戦争中だ",ann:null},
        {en:"We at war with terrorism, racism",ja:"テロリズムと人種差別と戦っている",ann:"2001年9月11日のアメリカ同時多発テロ後、アメリカ社会は「テロとの戦争」を宣言した。Kanyeはその言説を内省的な問いかけへと転換している。"},
        {en:"But most of all, we at war with ourselves",ja:"でも何より、俺たち自身と戦っている",ann:null}
      ]},
      {label:"[Chorus]",note:null,lines:[
        {en:"(Jesus, walk)",ja:"（ジーザス、歩め）",ann:null},
        {en:"God, show me the way because the Devil's tryna break me down",ja:"神よ、道を示してくれ、悪魔が俺を壊そうとしているから",ann:null},
        {en:"(Jesus, walk with me)",ja:"（ジーザス、俺と共に歩め）",ann:null}
      ]},
      {label:"[Verse 1]",note:null,lines:[
        {en:"You know what the Midwest is? Young and restless",ja:"中西部とは何か知ってるか？ 若くて落ち着きのない場所だ",ann:null},
        {en:"I walk through the valley of the Chi where death is",ja:"俺は死が溢れるシカゴの谷を歩く",ann:"「Valley of the Chi」：詩篇23篇「死の陰の谷を歩む」のパロディ。シカゴ（Chi）の危険な地域を死の谷に見立てている。"},
        {en:"They be askin' us questions, harass and arrest us",ja:"俺たちに質問して、ハラスメントして逮捕する",ann:null},
        {en:"A trunk full of coke, rental car from Avis",ja:"コカインで満杯のトランク、エイビスのレンタカー",ann:"Avis（エイビス）：アメリカ大手レンタカー会社。麻薬運搬に使われるレンタカーとして言及される。"},
        {en:"My mama used to say only Jesus can save us",ja:"ママはいつもジーザスだけが俺たちを救えると言っていた",ann:null},
        {en:"But I'll be gone 'til November, I got packs to move, I hope",ja:"でも11月まで俺はいなくなる、動かさなきゃならないパック（麻薬）がある",ann:null}
      ]},
      {label:"[Chorus (extended)]",note:null,lines:[
        {en:"God, show me the way because the Devil's tryna break me down",ja:"神よ、道を示してくれ、悪魔が俺を壊そうとしているから",ann:null},
        {en:"The only thing that I pray is that my feet don't fail me now",ja:"俺が祈るのはただ一つ、足が今ここで俺を裏切らないように",ann:null},
        {en:"And I don't think there's nothin' I can do now to right my wrongs",ja:"今さら俺の過ちを正すためにできることはないと思う",ann:null},
        {en:"I wanna talk to God but I'm afraid 'cause we ain't spoke in so long",ja:"神と話したいが怖い、もうずっと話してないから",ann:null}
      ]},
      {label:"[Verse 2]",note:null,lines:[
        {en:"To the hustlers, killers, murderers, drug dealers, even the scrippers",ja:"ハスラー、殺し屋、殺人犯、麻薬売人、そしてストリッパーたちへ",ann:null},
        {en:"(Jesus walks with them)",ja:"（ジーザスは彼らと共に歩む）",ann:null},
        {en:"To the victims of welfare, feel we livin' in Hell here, hell yeah",ja:"福祉の犠牲者たち、ここが地獄だと感じている、まさに地獄だ",ann:null},
        {en:"We rappers is role models, we rap, we don't think",ja:"俺たちラッパーはロールモデルだ、ラップするが考えない",ann:null},
        {en:"The way Kathie Lee needed Regis, that's the way I need Jesus",ja:"キャシー・リーがリージスを必要としたように、俺はジーザスを必要としている",ann:"「Live! with Regis and Kathie Lee」（1985〜2000年）というABCの朝の情報番組での名コンビ関係。なくてはならないパートナー関係の比喩。"},
        {en:"They say you can rap about anything except for Jesus",ja:"何についてでもラップできると言う、でもジーザス以外は",ann:null},
        {en:"That means guns, sex, lies, videotape",ja:"つまり銃、セックス、嘘、ビデオテープについては",ann:"「sex, lies and videotape（セックスと嘘とビデオテープ）」：スティーヴン・ソダーバーグ監督の1989年の映画タイトルをもじったライン。"},
        {en:"But if I talk about God, my record won't get played, huh?",ja:"でも神について話したら、俺のレコードはかけてもらえない？",ann:"グラミー賞：Jesus Walksは第47回グラミー賞（2005年）で最優秀ラップソング部門を受賞。"},
        {en:"Then I hope it take away from my sins",ja:"それで俺の罪が消えてくれることを願う",ann:null}
      ]}
    ]
  }},
  {num:"08",title:"Never Let Me Down",feat:"feat. Jay-Z & J. Ivy",hasLyrics:true,data:{
    num:"08",title:"Never Let Me Down",feat:"feat. Jay-Z & J. Ivy",
    producer:"Kanye West",
    sample:"Tracie Spencer「I'm Ready for You」/ Tarrey Torae",
    sampleSources:[{artist:"Tracie Spencer",title:"I'm Ready for You",year:1992,album:"Make My Wish Come True",url:"#"}],
    whosampledUrl:null,
    artwork:"../1. The College Dropout/College Dropout artwork.jpg",
    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"Jay-ZとKanyeの信頼関係、Kanyeの家族の公民権運動への参加、シカゴのスポークンワードアーティストJ. Ivyの詩を組み合わせた曲。「決して俺を裏切るな」というタイトルは神への祈りであり、盟友への誓いでもある。",
    sections:[
      {label:"[Chorus]",note:null,lines:[
        {en:"When it comes to being true, at least true to me / One thing I've found",ja:"真実であることについて、少なくとも自分に正直に / 一つのことを見つけた",ann:null},
        {en:"Oh, no, you'll never let me down",ja:"ああ、お前は決して俺を裏切らない",ann:null}
      ]},
      {label:"[Verse 1: JAY-Z]",note:null,lines:[
        {en:"Ayo, first, I snatched the streets, then I snatched the charts",ja:"まずストリートを制し、それからチャートを制した",ann:"Jay-Z（ジェイ・ジー、本名Shawn Corey Carter、1969〜）：ブルックリン出身のラッパー・経営者。Roc-A-Fella Records創業者。本曲録音当時は8枚目「The Black Album」（2003年）をリリースしたばかりの絶頂期。"},
        {en:"Rappers came and went. I've been here from the start",ja:"ラッパーたちは来ては去った、俺は最初からここにいる",ann:null},
        {en:"It's Hov tradition, Jeff Gordon of rap / I'm back to claim pole position",ja:"ホヴの伝統、ラップのジェフ・ゴードン / ポールポジションを取り戻しに来た",ann:"Hov（ホヴ）：Jay-Zの愛称。ジェホバ（神の名）をもじったもの。Jeff Gordon（ジェフ・ゴードン）：NASCARの伝説的ドライバーでポールポジション（最前列スタート）の王者。Cristal（クリスタル）：フランスのシャンパン「ルイ・ロデレール・クリスタル」。2000年代ヒップホップにおける成功の象徴。"}
      ]},
      {label:"[Verse 2: Kanye West]",note:null,lines:[
        {en:"I get down for my grandfather, who took my momma / Made her sit in that seat where white folks ain't want us to eat",ja:"俺が頑張るのは祖父のためだ / 白人が俺たちに食わせたくなかった席に座らせた人",ann:"シット・イン（座り込み抗議）：1950〜60年代の公民権運動で行われた非暴力抗議。黒人が白人専用のカウンターに座り込み抗議した。KanyeはThis is a true story—母Dondaが6歳の時、祖父Portwood Williamsと共に参加し逮捕された。"},
        {en:"At the tender age of 6, she was arrested for the sit-ins / And with that in my blood, I was born to be different",ja:"6歳という幼い年齢で、彼女はシット・インで逮捕された / その血が流れているから、俺は違う人間として生まれてきた",ann:null},
        {en:"Racism still alive, they just be concealin' it",ja:"人種差別はまだ生きてる、ただ隠しているだけ",ann:null},
        {en:"They even made me show ID to get inside of Sam's Club",ja:"サムズクラブに入るのにIDを見せさせられた",ann:"Sam's Club（サムズクラブ）：ウォルマート系列の会員制倉庫型スーパー。黒人男性が入店時にIDを求められる体験は、日常的なレイシャル・プロファイリング（人種的偏見に基づく取り締まり）の例として語られている。"},
        {en:"But look what an accident did to Left Eye / First Aaliyah, now Romeo must die",ja:"事故がLeft Eyeに何をしたかを見れば / まずアリーヤ、次にロミオ・マスト・ダイ",ann:"Left Eye（レフト・アイ）：R&BグループTLCのメンバー、Lisa Lopes（1971〜2002年）のニックネーム。2002年4月にホンジュラスで自動車事故死。Aaliyah（アリーヤ、1979〜2001年）：R&Bシンガー。2001年8月にバハマで自家用機墜落事故により22歳で死去。主演映画「Romeo Must Die」（2000年）と重ねて詠んでいる。Kanyeも2002年10月に自動車事故で顎を骨折しており、両者の死を念頭に置いている。"}
      ]},
      {label:"[Verse 3: J. Ivy]",note:null,lines:[
        {en:"We are all here for a reason on a particular path",ja:"俺たちは皆、特定の道で理由があってここにいる",ann:"J. Ivy（ジェイ・アイビー）：シカゴ出身のスポークンワードアーティスト。2003年グラミー賞スポークンワード部門特別賞受賞。Def Poetry Jamに出演。Kanye加入前からその才能を認めた人物の一人。"},
        {en:"My spirit is a part of this, that's why I get spiritual / But I get my hymns from Him",ja:"俺の精神はこれの一部だ、だから俺はスピリチュアルになる / でも讃美歌は彼（神）から得る",ann:null},
        {en:"I'm not a miracle. I'm a Heaven-sent instrument",ja:"俺は奇跡じゃない、天から送られた楽器だ",ann:null},
        {en:"If I were on the highest cliff, on the highest riff / And you slipped off the side / I would never, ever let you down",ja:"最も高い崖の上にいたとしても / お前が端から滑り落ちても / 絶対に、決してお前を放さない",ann:null}
      ]}
    ]
  }},
  {num:"09",title:"Get Em High",feat:"feat. Talib Kweli & Common",hasLyrics:true,data:{
    num:"09",title:"Get Em High",feat:"feat. Talib Kweli & Common",
    producer:"Kanye West",
    sample:null,
    sampleSources:[],
    whosampledUrl:null,
    artwork:"../1. The College Dropout/College Dropout artwork.jpg",
    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"KanyeがTalib Kweli、CommonというNYとシカゴの意識系リリシストたちと競い合うパーティートラック。大学中退後の自己証明と「俺たちは嫌な奴だから仲良い」という仲間意識を軽妙に語る。",
    sections:[
      {label:"[Chorus: Kanye West]",note:null,lines:[
        {en:"N-now, th-th-throw your motherfuckin' hands / Get 'em high",ja:"さあ、両手を上げろ / 高く",ann:null},
        {en:"All the girls pass the weed to your motherfuckin' man / Get 'em high",ja:"ガールズよ、大麻を彼氏に回せ / ハイになれ",ann:null}
      ]},
      {label:"[Verse 1: Kanye West]",note:null,lines:[
        {en:"My freshman year, I was going through hella problems / 'Till I built up the nerve to drop my ass up out of college",ja:"大学1年の時、ヤバい問題を抱えてた / 大学から出る勇気をためるまで",ann:null},
        {en:"Why you think me and Dame cool? We assholes",ja:"なぜ俺とデイムが仲良しだと思う？俺たちは嫌な奴だから",ann:"Dame（デイム）：Damon Dash（デイモン・ダッシュ）。Roc-A-Fella RecordsをJay-Zと共同設立。KanyeはDameに才能を認められRoc-A-Fellaと契約した。"},
        {en:"That's why we hear your music and fast forward / 'Cause we don't wanna hear that weak shit no mo'",ja:"だから俺たちはお前の音楽を聴いて早送りする / そんな弱いものはもう聞きたくないから",ann:null}
      ]},
      {label:"[Verse 2: Kanye West & Talib Kweli]",note:null,lines:[
        {en:"Now who the hell is this? Emailing me at 11:26",ja:"一体誰だこれは？11時26分にメールしてくる",ann:null},
        {en:"You know how girls on Black Planet be when they get bubbly",ja:"ブラック・プラネットの女の子たちがノリノリになった時どうなるかわかるだろ",ann:"BlackPlanet.com（ブラック・プラネット）：2000年代前半に人気を博した黒人向けSNS。主に黒人コミュニティのメッセージングに使われた（Twitterの開始は2006年）。"},
        {en:"Yo, Kwe, she don't believe me, please pick up the line",ja:"クウェ、彼女は俺を信じない、電話に出てくれ",ann:"Talib Kweli（タリブ・クウェリ）：ブルックリン出身のラッパー。Mos Defとのユニット「Black Star」（1998年）で名を上げたコンシャス系MC。Kanyeのデビュー前のツアーに同行したこともあり、初期キャリアに貢献した。"}
      ]},
      {label:"[Verse 3: Talib Kweli & Common]",note:null,lines:[
        {en:"I can't believe this nigga use my name for pickin' up dimes",ja:"こいつが女を口説くのに俺の名前を使うとは信じられない",ann:null}
      ]},
      {label:"[Verse 4: Common]",note:null,lines:[
        {en:"Rock clubs like Tiger Woods in the hood",ja:"タイガー・ウッズのようにゲットーでロッククラブ（ゴルフクラブ）を振る",ann:"Tiger Woods（タイガー・ウッズ）：アフリカ系アメリカ人として初めてゴルフ界を制したスーパースター。ゲットーでゴルフクラブを振る＝場違いな場所で圧倒的な支配力を発揮するという比喩。"},
        {en:"They say hip-hop is dead, I'm here to resurrect me",ja:"ヒップホップは死んでると言う、俺がよみがえらせる",ann:"Common（コモン、本名Lonnie Rashid Lynn Jr.）：シカゴ出身のラッパー・俳優。Kanyeとの縁は深く、後に「Finding Forever」（2007年）をKanyeのプロデュースで制作。このラインは後年Nasがリリースする「Hip Hop Is Dead」（2006年）を先取りしている。"},
        {en:"So when the industry crash, I survive like Kanye / Spittin' through wires and fires",ja:"業界が崩壊したとき、俺はカニエのように生き残る / ワイヤーと炎を通して吐き出す",ann:"Kanyeのデビュー前の自動車事故（2002年10月）とそれを経てリリースした「Through the Wire」（顎を骨折した状態で録音）への言及。"}
      ]}
    ]
  }},
  {num:"10",title:"Workout Plan",feat:null,hasLyrics:true,data:{
    num:"10",title:"Workout Plan",feat:null,

    sampleSources:[],
    whosampledUrl:null,
    artwork:"../1. The College Dropout/College Dropout artwork.jpg",
    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"次の「The New Workout Plan」への導入スキット。テレビ通販番組風に、ワークアウトで体型を整えてNBAプレイヤーや「baller」を捕まえた女性たちの会話を演じる風刺的な小品。",
    sections:[
      {label:"[Skit: Girl #1, Girl #2, Girl #3]",note:null,lines:[
        {en:"Ayy, you know I finally got my shit together / Been watchin' that workout plan, girl!",ja:"ついに自分のことを整えたのよ / あのワークアウトプランを見てるの！",ann:null},
        {en:"My nigga, I'm tired of puttin' 1-8-7 in my nigga's pager / That shit ain't workin' no more",ja:"もう彼氏のポケベルに1-8-7って打つのも嫌になった / もう効果ないし",ann:"187（1-8-7）：カリフォルニア州刑法第187条、殺人を意味するスラング。ポケベル（pager）が普及していた時代に、脅しとして相手のポケベルに打ち込む行為を指す。"},
        {en:"Girl, you know I'ma video ho-ffesional now / Rollin' in Lexus, Acuras, everything, girl",ja:"私今はビデオ・ホーフェッショナルよ / レクサスやアキュラとかいろんな車に乗ってるのよ",ann:"video ho-ffesional：「ビデオ・ガール（ヒップホップMVに登場する女性）」と「professional（専門家）」を組み合わせた造語。"},
        {en:"Girl, I'll give it to you for Free.99 / FREE.99?!",ja:"タダで渡すわ / タダ？！",ann:"Free.99（フリー・ドット・ナインティーナイン）：「無料」を価格表示風にギャグにした表現。$0.99の代わりに「Free.99」と言って実質タダを示す。"},
        {en:"Broke Phi Broke",ja:"ブローク・ファイ・ブローク",ann:"Broke Phi Broke：「Broke（金欠）」に黒人大学の友愛会・親愛会のギリシャ文字名称スタイルを組み合わせた造語。"}
      ]}
    ]
  }},
  {num:"11",title:"The New Workout Plan",feat:"feat. GLC & Bosko",hasLyrics:true,data:{
    num:"11",title:"The New Workout Plan",feat:"feat. GLC & Bosko",
    producer:"Kanye West",
    sample:null,
    sampleSources:[],
    whosampledUrl:null,
    artwork:"../1. The College Dropout/College Dropout artwork.jpg",
    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"前スキット「Workout Plan」を受けて展開するナンバー。テレビの「ワークアウト番組」のパロディとして、ダイエットよりも「金持ちの男を捕まえるためのテクニック」を指南する内容。後半にはKanyeのワークアウトプランでNBA選手をゲットした女性たちの証言が挿入される。",
    sections:[
      {label:"[Intro: Kanye West]",note:null,lines:[
        {en:"You just popped in the Kanye West: Get Right for the Summer workout tape",ja:"カニエ・ウェスト「夏に向けて体を整えろ」ワークアウトテープを入れたところ",ann:null},
        {en:"Ladies, if you follow these instructions exactly / You might be able to pull you a rapper, a NBA player / Man, at least a dude with a car",ja:"レディースよ、これらの指示を正確に守れば / ラッパーやNBAプレイヤーをゲットできるかも / 少なくとも車を持った男くらいは",ann:null}
      ]},
      {label:"[Verse 1: Kanye West]",note:null,lines:[
        {en:"One, and two, and three, and four, and get them sit ups right",ja:"1、2、3、4、腹筋をしっかりやって",ann:null},
        {en:"It's a party tonight and ooh, she's so excited",ja:"今夜はパーティーがある、ああ、彼女はとても興奮してる",ann:null}
      ]},
      {label:"[Verse 2: Kanye West]",note:null,lines:[
        {en:"My name Kanye from the Jigga set, Twista said, \"Get It Wet\"",ja:"俺の名前はカニエ、ジガ（Jay-Z）のセットから",ann:"Jigga set：Jay-ZとRoc-A-Fellaレーベルを指す。"},
        {en:"Cover your mouth up like you got SARS",ja:"SARSにかかったかのように口を覆え",ann:"SARS（サーズ）：重症急性呼吸器症候群。2002〜2003年に流行した感染症。"},
        {en:"We ain't sweating to the oldies, we juking to a cold beat",ja:"オールディーズで汗をかくんじゃない、クールなビートでジュークするんだ",ann:"Juking（ジューキング）：シカゴ独自のダンス文化。ハウスミュージック系のパーティーで親密なスタイルで踊る行為。"}
      ]},
      {label:"[Interlude 1: Jill]",note:null,lines:[
        {en:"I was able to pull a NBA player / Now I shop every day on Rodeo Drive",ja:"NBAプレイヤーをゲットできたの / 今はロデオ・ドライブで毎日ショッピングしてる",ann:"Rodeo Drive（ロデオ・ドライブ）：ビバリーヒルズの超高級ショッピング街。ヴェルサーチ、グッチなど一流ブランドが並ぶ。"}
      ]},
      {label:"[Interlude 2: Lasandra]",note:null,lines:[
        {en:"I was able to get a free trip to Cancun / I ain't gotta fuck with Ray-Ray's broke ass no mo'",ja:"カンクンへの無料旅行もゲットした / もうレイレイの貧乏な奴と関わらなくていい",ann:"Cancun（カンクン）：メキシコのリゾート地。Ray-Ray：黒人コミュニティでよく使われる男性のニックネーム。"}
      ]},
      {label:"[Interlude 3: Ella-May]",note:null,lines:[
        {en:"I been able to date outside the family / I got a double wide, and I rode a plane",ja:"家族以外の人と付き合えるようになった / ダブルワイドを手に入れて、飛行機にも乗った",ann:"Double wide（ダブルワイド）：2つのユニットを並べたトレーラーハウス。アメリカ南部低所得層の象徴的な住居形態。「date outside the family」という南部の田舎のステレオタイプのパロディ。"}
      ]},
      {label:"[Bridge & Refrain]",note:null,lines:[
        {en:"Thanks to Kanye's workout plan / I pulled me a baller man / And I ain't gotta work at the mall again",ja:"カニエのワークアウトプランのおかげで / バラー（金持ち）の男をゲットした / もうモールで働かなくていい",ann:null},
        {en:"Eat your salad, no dessert / Get that man you deserve",ja:"サラダを食べて、デザートなし / 相応しい男をゲットしろ",ann:null}
      ]}
    ]
  }},

    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"The College Dropoutの収録曲だが、Twista名義のシングルとして先行リリースされビルボードHot 100で1位を獲得。Kanyeにとって初のチャート1位曲。Jamie Foxxがルーサー・ヴァンドロスをモチーフにしたナレーターを演じ、1970〜80年代の黒人R&Bアーティストへのオマージュを捧げながらスロウジャムの系譜を讃える。",
    sections:[
      {label:"[Intro: Jamie Foxx & Luther Vandross]",note:null,lines:[
        {en:"Kanye, it-it's Foxx, man",ja:"カニエ、フォックスだよ",ann:"Jamie Foxx（ジェイミー・フォックス）：コメディアン・俳優・シンガー。アカデミー賞受賞作「Ray」（2004年）と本曲が同年にリリースされ知名度が急上昇した。"},
        {en:"We don't put enough emphasis on the ladies sometimes",ja:"俺たち、時々女性のことを十分に考えてないんだ",ann:null}
      ]},
      {label:"[Chorus: Jamie Foxx, Luther Vandross & Kanye West]",note:null,lines:[
        {en:"She said she want some Marvin Gaye, some Luther Vandross",ja:"彼女はマーヴィン・ゲイが聴きたいって、ルーサー・ヴァンドロスも",ann:"Luther Vandross（ルーサー・ヴァンドロス、1951〜2005年）：ニューヨーク出身のR&Bシンガー。「A House Is Not a Home」などで知られるソウル・バラードの大家。2003年に脳卒中で倒れた。"},
        {en:"A little Anita will definitely set this party off right",ja:"アニータを少し流せば絶対パーティーが盛り上がる",ann:null},
        {en:"She said she want some Ready for the World, some New Edition",ja:"レディー・フォー・ザ・ワールドが聴きたいって、ニュー・エディションも",ann:null},
        {en:"Some Minnie Riperton will definitely set this party off right",ja:"ミニー・リパートンを流せば絶対パーティーが盛り上がる",ann:null}
      ]},
      {label:"[Verse 1: Kanye West]",note:null,lines:[
        {en:"I told her to drive over in yo' new whip",ja:"新しい車で来いと言った",ann:null},
        {en:"She be grabbin', callin' me Biggie like Shyne, hom'",ja:"彼女は俺をつかんで、シャインみたいにビギーって呼ぶんだ",ann:"Shyne（シャイン）：本名Jamal Barrow。Notorious B.I.G.（ビギー）の声に似たスタイルで2000年代初頭に注目されたラッパー。"},
        {en:"She got a light-skinned friend, look like Michael Jackson",ja:"肌の明るい友達がいて、マイケル・ジャクソンに似てる",ann:null},
        {en:"Got a dark-skinned friend, look like Michael Jackson",ja:"肌の暗い友達がいて、こっちもマイケル・ジャクソンに似てる",ann:null},

      {label:"[Bridge: Jamie Foxx & Luther Vandross]",note:null,lines:[

        {en:"Freddie Jackson, everything, everything",ja:"フレディ・ジャクソン、すべて、すべて",ann:null},

      {label:"[Interlude]",note:null,lines:[

      {label:"[Verse 2: Twista & Luther Vandross]",note:null,lines:[

  {num:"13",title:"Breathe In Breathe Out",feat:"feat. Ludacris",hasLyrics:true,data:{
    num:"13",title:"Breathe In Breathe Out",feat:"feat. Ludacris",
    producer:"Kanye West",
    sample:null,
    sampleSources:[],
    whosampledUrl:null,
    artwork:"../1. The College Dropout/College Dropout artwork.jpg",
    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"「重要なことをラップすると言っていたのに、金・女・リムの話をしてしまっている」と自己批評しながらそのまま続ける自己矛盾の曲。コンシャスラップの代表格であるMos DefとTalib Kweliへの謝罪を挟みつつ、全力で物質主義ラップをやりきる。",
    sections:[
      {label:"[Chorus: Ludacris]",note:null,lines:[
        {en:"Breathe in, breathe out / If you're iced up, pull your sleeves out",ja:"吸って、吐いて / アイスアップしてるなら袖を出して",ann:"Ludacris（ルーダクリス、本名Christopher Brian Bridges）：アトランタ出身のラッパー。パンチラインとユーモアに定評のあるMC。"},
        {en:"If a nigga act up, pull a Desert E's out",ja:"ニガーが暴れたらデザートイーグルを出して",ann:"Desert Eagle（デザートイーグル）：大型の半自動拳銃。ヒップホップで「銃」の象徴として頻繁に登場する。"}
      ]},
      {label:"[Verse 1: Kanye West]",note:null,lines:[
        {en:"Golly, more of that bullshit ice rap / I gotta 'pologize to Mos and Kweli",ja:"やれやれ、またあのクソみたいなアイスラップだ / モスとクウェリに謝らないといけない",ann:"Mos and Kweli（モスとクウェリ）：Mos Def（モス・デフ）とTalib Kweli（タリブ・クウェリ）。コンシャス（意識高い）ヒップホップの代表格。"},
        {en:"But is it cool to rap about gold / If I told the world I copped it from Ghana and Mali?",ja:"でも金についてラップするのはいいのか / 世界にガーナとマリから買ったと言ったら？",ann:"Ghana and Mali（ガーナとマリ）：西アフリカの国々。歴史的に金の産地として有名。"},
        {en:"Always said, \"If I rapped, I'd say somethin' significant\" / But now, I'm rapping 'bout money, hoes, and rims again",ja:"いつも言ってた、「ラップするなら重要なことを言う」と / でも今は金と女とリムの話をしてる",ann:null},
        {en:"And it's still about the Benjamins",ja:"それでもまだベンジャミン（100ドル札）の話",ann:"Benjamins（ベンジャミンズ）：100ドル札の俗称。ベンジャミン・フランクリンの肖像が印刷されていることから。Puff Daddyの曲「It's All About the Benjamins」（1997年）への言及。"},
        {en:"Strippers named \"Cinnamon,\" more chips than Pentium",ja:"「シナモン」という名前のストリッパー、ペンティアムよりも多いチップ",ann:"Pentium（ペンティアム）：Intelのプロセッサーブランド。「Chips」はコンピュータチップと金のダブルミーニング。"}
      ]},
      {label:"[Verse 3: Kanye West]",note:null,lines:[
        {en:"All of which is legal in Amsterdam / So, say my name like Candyman",ja:"すべてアムステルダムでは合法 / キャンディマンのように俺の名前を呼んでくれ",ann:"Amsterdam（アムステルダム）：オランダの首都。マリファナとセックスが合法で、アメリカとの対比で使われる。Candyman（キャンディマン）：1992年のホラー映画の主人公。鏡に向かって名前を5回唱えると現れる。"},
        {en:"You can't take that all at one time—you gotta breathe!",ja:"一度にすべてはできない——深呼吸しろ！",ann:null}
      ]},
      {label:"[Outro: Kanye West]",note:null,lines:[
        {en:"And you say, \"Chi-city\"",ja:"「シカゴ！」と言え",ann:null}
      ]}
    ]
  }},
  {num:"14",title:"School Spirit Skit 1",feat:null,hasLyrics:true,data:{
    num:"14",title:"School Spirit Skit 1",feat:null,
    producer:"Kanye West",
    sample:null,
    sampleSources:[],
    whosampledUrl:null,
    artwork:"../1. The College Dropout/College Dropout artwork.jpg",
    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"DeRay Davisによる風刺スキット。「大学を卒業すれば幸せになれる」という神話を誇張しながら解体する。年収2万5千ドルの仕事、Gap勤務、秘書の秘書という現実と「でも学歴がある」という虚しい満足感が笑いの核心。",
    sections:[
      {label:"[Skit: DeRay Davis]",note:"DeRay Davis（ディレイ・デイヴィス）：シカゴ出身のコメディアン・俳優。College Dropoutで「学歴社会のプレッシャーの声」を体現する語り手役を一貫して演じる。",lines:[
        {en:"Now you'll get that 25-thousand dollar job a year",ja:"さあ！年収2万5千ドルの仕事が手に入る",ann:"25-thousand dollar（2万5千ドル）：2004年当時のアメリカの低〜中程度の年収。大卒への期待値に対する現実の落差を表す数字。"},
        {en:"If you continue to work at the Gap / You'll come in at an entry-level position",ja:"Gapで働き続ければ / 入門職から始まる",ann:"Gap（ギャップ）：アメリカのカジュアルウェアチェーン。Kanyeが音楽デビュー前に実際にアルバイトをしていた店。学歴があっても小売業の入門職にしか就けないという皮肉のために選ばれている。"},
        {en:"Which is being the secretary's secretary",ja:"それが秘書の秘書になること",ann:null},
        {en:"She's actually the boss's niece!",ja:"実は社長の姪なんだ！",ann:null},
        {en:"No, I've never had sex / But you know what? My degree keeps me satisfied",ja:"そう、俺はセックスをしたことがない / でも俺の学位が満たしてくれる",ann:null}
      ]}
    ]
  }},
  {num:"15",title:"School Spirit",feat:null,hasLyrics:true,data:{
    num:"15",title:"School Spirit",feat:null,
    producer:"Kanye West",
    sample:"Aretha Franklin「Spirit in the Dark」",
    sampleSources:[{artist:"Aretha Franklin",title:"Spirit in the Dark",year:1970,album:"Spirit in the Dark",url:"#"}],
    whosampledUrl:null,
    artwork:"../1. The College Dropout/College Dropout artwork.jpg",
    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"HBCUのギリシャ文字組織（フラタニティ・ソロリティ）のステッピングを讃えるコーラスを持ちながら、本人は「大学を卒業したのではなく、自分が終わったと決断した」と宣言する曲。自動車事故での生還を力の証として語る。",
    sections:[
      {label:"[Chorus]",note:null,lines:[
        {en:"Alpha, step, Omega, step / Kappa, step, Sigma, step",ja:"アルファよ、ステップを踏め、オメガよ / カッパよ、シグマよ",ann:"Alpha（アルファ）、Omega（オメガ）、Kappa（カッパ）、Sigma（シグマ）、AKA、Delta（デルタ）、S.G. Rho、Zeta（ゼータ）：いずれも黒人大学（HBCU）の男女フラタニティ・ソロリティ組織名。Stepping（ステッピング）：これらの組織の伝統的なダンス。手拍子・足踏み・コールアンドレスポンスからなるパフォーマンス。最古の黒人フラタニティはAlpha Phi Alpha（1906年創設）。"},
        {en:"AKA, step, Delta, step / S.G. Rho, step, Zeta, step",ja:"AKAよ、ステップを踏め、デルタよ / SGローよ、ゼータよ",ann:null}
      ]},
      {label:"[Verse 1]",note:null,lines:[
        {en:"Told 'em I finished school and I started my own business",ja:"学校を終えて自分のビジネスを始めたと言った",ann:null},
        {en:"They say, \"Oh, you graduated?\" No, I decided I was finished",ja:"「卒業したの？」——いや、終わったと自分で決めたんだ",ann:null},
        {en:"This nigga graduated at the top of our class / I went to Cheesecake, he was a nigga waiter there",ja:"このニガーはクラスのトップで卒業した / チーズケーキファクトリーに行ったら、そこでウェイターをしてた",ann:null}
      ]},
      {label:"[Verse 2]",note:null,lines:[
        {en:"Roc-A-Fella chain, yeah, that's my rapper style / Rosary piece, yeah, that's my Catholic style",ja:"ロカフェラチェーン、それが俺のラッパースタイル / ロザリオのピース、それが俺のカトリックスタイル",ann:"Rosary piece（ロザリー・ピース）：ロザリオ（カトリックの祈祷具）を模したジュエリー。"},
        {en:"Red and white Ones, yeah, that's my Kappa style / And I ain't even pledge",ja:"赤と白のワンズ（エアフォース1）、それが俺のカッパスタイル / 誓約したこともないのに",ann:"Red and white Ones：Nike Air Force 1の赤×白カラーリング。Kappa Alpha Psiのカラー（クリムゾン＆クリーム）への言及。"},
        {en:"Crack my head on the steering wheel and I ain't even dead",ja:"ハンドルで頭を割っても俺は死ななかった",ann:"2002年10月のKanyeの自動車事故への言及。顎を骨折する重傷を負いながら生還したことを指す。この事故直後に「Through the Wire」を制作した。"},
        {en:"If I could go through all that and still be breathing / Nigga, bend over, I'm here for a reason",ja:"あれを全部経験してまだ息をしていられるなら / ニガー、かがめ、俺がここにいるのには理由がある",ann:null}
      ]}
    ]
  }},
  {num:"16",title:"School Spirit Skit 2",feat:null,hasLyrics:true,data:{
    num:"16",title:"School Spirit Skit 2",feat:null,
    producer:"Kanye West",
    sample:null,
    sampleSources:[],
    whosampledUrl:null,
    artwork:"../1. The College Dropout/College Dropout artwork.jpg",
    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"Skit 1の続き。52歳になっても学位を取り続けている人物を描く。「周りが稼いでいる中で、俺は賢くなるためにお金を使っている」「死ぬ時に温めてくれるのは学位だ」というオチで、学歴崇拝の滑稽な末路を描く。",
    sections:[
      {label:"[Skit: De'Ray Davis]",note:null,lines:[
        {en:"You get that associate's degree / Then bachelor's / Then masters / Then your masters' masters / Then your doctorate",ja:"準学士を取れ / 次に学士 / 次に修士 / 次に修士の修士 / 次に博士",ann:null},
        {en:"When everyone says \"you're not working, you're not making any money\" / You say, \"Yeah, I'm fifty-two, so what?\"",ja:"「お前は働いてない、お金を稼いでいない」と言われたら / 「そうだ、俺は52歳だ、それが何だ？」と言え",ann:null},
        {en:"All these guys out here making money all these ways / And I'm spending mine to be smart",ja:"ここにいる奴らは皆、いろいろな方法で金を稼いでいる / でも俺は賢くなるためにお金を使ってる",ann:null},
        {en:"'Cause when I die / You know what's gonna keep me warm? / That's right, those degrees",ja:"なぜなら俺が死ぬ時に / 何が俺を温めてくれるかわかるか？ / そうだ、あの学位だ",ann:null}
      ]}
    ]
  }},
  {num:"17",title:"Lil Jimmy Skit",feat:null,hasLyrics:true,data:{
    num:"17",title:"Lil Jimmy Skit",feat:null,
    producer:"Kanye West",
    sample:null,
    sampleSources:[],
    whosampledUrl:null,
    artwork:"../1. The College Dropout/College Dropout artwork.jpg",
    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"School Spirit Skit 2の「死ぬ時に温めてくれるのは学位だ」を受けたシュールな続編。父親が学位を集めすぎて息子の学位まで取ってしまったホームレスの「リル・ジミー」の話。他のホームレスが新聞を持っているのに、自分は「文書で証明された」学位を持っているというオチ。",
    sections:[
      {label:"[Spoken Word: The World Famous Tony Williams & DeRay]",note:"The World Famous Tony Williams：シカゴのDJ・コメディアン。アルバムの霊的・コメディ的な柱として機能する。",lines:[
        {en:"My Dad died, and, uh, he left me his degrees",ja:"お父さんが死んで、学位を残してくれたんだ",ann:null},
        {en:"He was so greedy with degrees, he took my degree",ja:"学位への欲が深すぎて、俺の学位まで取ってしまった",ann:null},
        {en:"All the regular homeless people have newspaper / And look what I have / These are documented",ja:"普通のホームレスの人たちは新聞を持ってる / でも俺が持ってるものを見てくれ / これは文書で証明されてる",ann:null},
        {en:"I'm gonna get super smart, so I, too, can die without money / But I'll be the smartest dead guy!",ja:"超賢くなって、俺も金なしで死ねる / でも俺は一番賢い死人になるぞ！",ann:null}
      ]}
    ]
  }},
  {num:"18",title:"Two Words",feat:"feat. Mos Def, Freeway & Harlem Boys Choir",hasLyrics:true,data:{
    num:"18",title:"Two Words",feat:"feat. Mos Def, Freeway & Harlem Boys Choir",
    producer:"Kanye West",
    sample:null,
    sampleSources:[],
    whosampledUrl:null,
    artwork:"../1. The College Dropout/College Dropout artwork.jpg",
    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"「二つの言葉」を繰り返すストラクチャーで構成された政治的・自己宣言的なトラック。Mos Def（ニューヨーク）、Kanye（シカゴ）、Freeway（フィラデルフィア）の三都市のMCが各バースを担当し、Harlem Boys Choirが壮大なコーラスを加える。",
    sections:[
      {label:"[Chorus: Kanye West]",note:null,lines:[
        {en:"It's only two places you end up: either dead or in jail / Still nowhere to go",ja:"行き着く場所は二つだけ：死か刑務所 / それでもどこにも行けない",ann:null}
      ]},
      {label:"[Verse 1: Mos Def]",note:null,lines:[
        {en:"Two words: United States, no love, no breaks / Low brow, high stakes. Crack smoke, Black folks",ja:"二つの言葉：合衆国、愛なし、休憩なし / 低俗、高リスク。クラックの煙、黒人たち",ann:"Mos Def（モス・デフ、本名Yasiin Bey、1973〜）：ブルックリン・ベッドスタイ出身。Talib Kweliとの「Black Star」（1998年）で名を上げたコンシャス系MC。"},
        {en:"Two words: B-K, N-Y, Bed-Stuy",ja:"二つの言葉：B-K（ブルックリン）、N-Y（ニューヨーク）、ベッドスタイ",ann:"Bed-Stuy（ベッドスタイ）：Bed-Ford Stuyvesant。ブルックリンの地区。Mos Defの出身地。"}
      ]},
      {label:"[Verse 2: Kanye West]",note:null,lines:[
        {en:"Two words: Chi-Town, Southside, worldwide",ja:"二つの言葉：シカゴ、サウスサイド、ワールドワイド",ann:null},
        {en:"I am limelight, Blueprint, five mics",ja:"俺はライムライト（注目の的）、ブループリント、5マイク",ann:"Blueprint：Jay-Zの2001年のアルバム（Kanyeがビートを提供）。five mics：The Source誌（ヒップホップ専門誌）の最高評価。"},
        {en:"Two words: Chi-Town raised me, crazy / So I live by two words: \"Fuck you, pay me\"",ja:"二つの言葉：シカゴが俺を育てた、クレイジーに / だから俺は二つの言葉で生きてる：「くそくらえ、金払え」",ann:null},
        {en:"I'm Kon, the Louis Vuitton Don / Bought my mom a purse, now she Louis Vuitton Mom",ja:"俺はコン、ルイ・ヴィトン・ドン / ママにバッグを買った、今や彼女はルイ・ヴィトン・マム",ann:"Louis Vuitton Don（ルイ・ヴィトン・ドン）：Kanyeの自称。「Don」はイタリア語で「ボス」を意味する。後に「Graduation」（2007年）の重要テーマになる。"},
        {en:"Mayonnaise-colored Benz, I push Miracle Whips",ja:"マヨネーズ色のベンツ、ミラクルウィップを走らせる",ann:"Miracle Whip（ミラクルウィップ）：アメリカの調味料ブランド。「Mayonnaise-colored Benz」の白さと「whip（運転する）」のダブルミーニング。"},
        {en:"Like Dame, Puffy, and Russell",ja:"デイム、パフィー、ラッセルのように",ann:"Dame（Damon Dash、Roc-A-Fella）、Puffy（Sean Combs、Bad Boy Records）、Russell（Russell Simmons、Def Jam）——黒人ヒップホップ業界の大物経営者3人。"}
      ]},
      {label:"[Verse 3: Freeway]",note:null,lines:[
        {en:"Two words: Freeway; two letters: A-R",ja:"二つの言葉：フリーウェイ。二つの文字：A-R（AR-15、突撃銃）",ann:"Freeway（フリーウェイ、本名Leslie Edward Pridgen）：フィラデルフィア出身のラッパー。Roc-A-Fella Records所属。"},
        {en:"With the beef in the pot, Jay sent for his dogs to brawl",ja:"牛肉が鍋に入ってる、ジェイは仲間を呼んで戦わせた",ann:null}
      ]},
      {label:"[Outro: Mos Def & Harlem Boys Choir]",note:null,lines:[
        {en:"Motherfuckers askin', \"Who is that?\" / You know it's the almighty Black Jack",ja:"誰だと聞いてくる奴らに / アルマイティ・ブラック・ジャックとわかるはずだ",ann:"Jack Johnson（ジャック・ジョンソン）：1908年に史上初の黒人ヘビー級世界チャンピオンとなったアフリカ系アメリカ人ボクサー。人種差別が激しい時代に白人選手を次々と倒し、黒人の誇りの象徴となった。"},
        {en:"Ghetto people, get this shit off your chest",ja:"ゲットーの人々よ、胸のつかえを吐き出せ",ann:"Harlem Boys Choir（ハーレム・ボーイズ・クワイア）：1968年創設のニューヨーク・ハーレムの名門少年合唱団。ポップやR&B、ヒップホップとの共演でも知られる。"}
      ]}
    ]
  }},
  {num:"19",title:"Through The Wire",feat:null,hasLyrics:true,data:{
    num:"19",title:"Through The Wire",feat:null,
    producer:"Kanye West",
    sample:"Chaka Khan「Through the Fire」(1984)",
    sampleSources:[
      {artist:"Chaka Khan",title:"Through the Fire",year:1984,album:"I Feel for You",url:"#"}
    ],
    whosampledUrl:null,
    artwork:"../1. The College Dropout/College Dropout artwork.jpg",
    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"Kanyeの最初のソロシングル（2003年）。2002年10月23日、ロサンゼルスでの交通事故で顎の骨を骨折したKanyeが、顎をワイヤーで固定したままスタジオに入り録音した曲。「顎を通してラップする（through the wire）」というタイトルは文字通りの意味。",
    sections:[
      {label:"[Intro]",note:null,lines:[
        {en:"Yo, Gee, they can't stop me from rappin', can they?",ja:"ジー、奴らは俺がラップするのを止められないよな？",ann:null}
      ]},
      {label:"[Chorus: Chaka Khan]",note:"Chaka Khan（チャカ・カーン、本名Yvette Marie Stevens、1953〜）：シカゴ出身のR&B・ソウルシンガー。「I Feel for You」「Ain't Nobody」などで知られる。",lines:[
        {en:"Through the fire, to the limit, to the wall",ja:"炎の中を、限界まで、壁まで",ann:null},
        {en:"For a chance to be with you, I'd gladly risk it all",ja:"お前と一緒にいるチャンスのためなら、喜んですべてをかける",ann:null},
        {en:"Through the fire, through whatever, come what may",ja:"炎の中を、何があっても、どんな事態が来ても",ann:null},
        {en:"Right down to the wire, even through the fire",ja:"ワイヤーを通してでも、炎の中でも",ann:null}
      ]},
      {label:"[Post-Chorus: Kanye West]",note:null,lines:[
        {en:"I spit it through the wire, man",ja:"ワイヤー越しにラップしてるんだ",ann:null},
        {en:"They got my mouth wired shut",ja:"口をワイヤーで固定されてるんだ",ann:null},
        {en:"Chi-Town, what's goin' on?",ja:"シカゴ、調子どうだ？",ann:null}
      ]},
      {label:"[Verse 1: Kanye West]",note:null,lines:[
        {en:"I drink a Boost for breakfast, an Ensure for dessert",ja:"朝食にブーストを飲んで、デザートにエンシュアを飲む",ann:"Boost / Ensure（ブースト/エンシュア）：経口栄養補助飲料のブランド。顎を固定されて噛むことができない状態でも飲める飲み物として言及される。"},
        {en:"How do you console my mom, or give her light support",ja:"どうすれば俺のお母さんを慰められる、軽いサポートを与えられる",ann:null},
        {en:"Tellin' her her son's on life support?",ja:"息子が生命維持装置につながれてると伝えて？",ann:null},
        {en:"On the plane scared as hell that her guy look like Emmett Till",ja:"飛行機に乗りながら怯えてた、彼氏の顔がエメット・ティルに見えると",ann:"Emmett Till（エメット・ティル、1941〜1955年）：14歳で白人女性への口笛を疑われミシシッピ州で惨殺された黒人少年。遺体は顔面が損壊しており、公開葬儀が公民権運動の火付け役となった。"},
        {en:"She a Delta, so she been throwin' that Dynasty sign",ja:"彼女はデルタ（ソロリティ）なんだ、だからダイナスティサインを出してた",ann:"Delta：Delta Sigma Theta（黒人女性ソロリティ）。「ダイナスティサイン」はJay-ZのRoc-A-Fellaレーベルのハンドサイン。"},
        {en:"In the same hospital where Biggie Smalls died",ja:"ビギー・スモールズが死んだ同じ病院で",ann:"Biggie Smalls（ビギー・スモールズ）：Notorious B.I.G.（本名Christopher Wallace、1972〜1997年）。1997年に射殺された。病院はCedars-Sinai Medical Center（ロサンゼルス）。"},
        {en:"Story on MTV and I ain't tryna make Da Band",ja:"MTVに話が流れたが、俺はダ・バンドを作ろうとしてるんじゃない",ann:"Da Band（ダ・バンド）：P. Diddyが2002〜2003年にMTVのリアリティ番組「Making the Band」で結成したグループ。"},
        {en:"I swear, this, right here, history in the makin', man",ja:"誓う、これは歴史が作られてる瞬間だ",ann:null}
      ]},
      {label:"[Verse 2: Kanye West]",note:null,lines:[
        {en:"If you could feel how my face felt",ja:"俺の顔がどんな感触だったか感じてみたら",ann:null},
        {en:"You would know how Mase felt (Mason Betha!)",ja:"メイスの気持ちがわかるはずだ",ann:"Mase（メイス、本名Mason Betha）：Harlem出身のラッパー。Bad Boy Records時代に活躍。顎への損傷という文脈での言及。"},
        {en:"Thank God I ain't too cool for the safe belt",ja:"シートベルトをしてた自分に感謝する",ann:null},
        {en:"I looked like Tom Cruise in Vanilla Sky, it was televised",ja:"バニラ・スカイのトム・クルーズみたいな顔で、テレビに流れた",ann:"Vanilla Sky（バニラ・スカイ）：2001年のサイコスリラー映画。主人公の顔面が損傷するシーンがある。"},
        {en:"They thought I was burnt up like Pepsi did Michael",ja:"ペプシがマイケルにしたように燃えたと思われた",ann:"1984年にMichael Jacksonがペプシのプロモーション撮影中に爆発事故で頭部に火傷を負った事件。"},
        {en:"Unbreakable, what you thought, they call me Mr. Glass?",ja:"壊れない——ミスター・グラスとでも思ったか？",ann:"Mr. Glass（ミスター・グラス）：映画「アンブレイカブル」（2000年）のヴィラン。骨が極めて脆い人物。逆説的な強さの表明。"},
        {en:"Look back on my life like the Ghost of Christmas Past",ja:"過去のクリスマスの幽霊のように自分の人生を振り返る",ann:"チャールズ・ディケンズ「クリスマス・キャロル」に登場する過去を見せる亡霊への言及。"},
        {en:"But I'm a champion, so I turned tragedy to triumph",ja:"でも俺はチャンピオンだから、悲劇を勝利に変えた",ann:null},
        {en:"Make music that's fire, spit my soul through the wire",ja:"炎のような音楽を作って、ワイヤー越しに魂を吐き出す",ann:null}
      ]}
    ]
  }},
  {num:"20",title:"Family Business",feat:null,hasLyrics:true,data:{
    num:"20",title:"Family Business",feat:null,
    producer:"Kanye West",
    sample:"The O'Jays「Family Reunion」",
    sampleSources:[
      {artist:"The O'Jays",title:"Family Reunion",year:1975,album:"Family Reunion",url:"#"}
    ],
    whosampledUrl:null,
    artwork:"../1. The College Dropout/College Dropout artwork.jpg",
    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"The College Dropoutの最も内省的な曲の一つ。家族の集まり、刑務所にいる従兄弟、亡くなった祖母、家族の喧嘩——それらすべてを「家族のことは家族の中だけで解決しろ」という言葉でまとめる。アルバムの物質主義批評の中で「本当に大切なもの」として提示されるトラック。",
    sections:[
      {label:"[Intro]",note:null,lines:[
        {en:"How's your son? He made the team this year?",ja:"息子さんはどう？ 今年チームに入った？",ann:null},
        {en:"Ma', we here, we gon' cook this Sunday, okay? So come by",ja:"ママ、俺たちここにいる、今度の日曜は料理するから来て",ann:null},
        {en:"Damn, that's your new girlfriend?",ja:"くそ、それがお前の新しい彼女か？",ann:null}
      ]},
      {label:"[Verse 1]",note:null,lines:[
        {en:"This is family business",ja:"これは家族の話",ann:null},
        {en:"And this is for my cousin locked down, know the answer's in us",ja:"刑務所に入ってる従兄弟のために、答えは俺たちの中にあるとわかってる",ann:null},
        {en:"Yo, you heard the track I did, man? \"This Can't Be Life\"",ja:"ねえ、俺が作った曲聴いたか？「ディス・キャント・ビー・ライフ」",ann:"「This Can't Be Life」：Jay-ZのアルバムThe Dynasty: Roc La Familia（2000年）収録曲。Kanye West制作。この曲のビートメイクがJay-Zに認められ、Roc-A-Fellaとの関係が深まるきっかけになった。"},
        {en:"I even made you a plate, soul food, know how Granny do it",ja:"お前のためにプレートも作った、ソウルフード、グラニーのやり方で",ann:null},
        {en:"Monkey bread on the side, know how the family do it",ja:"サイドにモンキーブレッド、家族のやり方で",ann:null},
        {en:"When I brought it, why the guard had to look all through it?",ja:"持っていったのに、なんで看守は全部調べないといけないんだ？",ann:null},
        {en:"And look, you tell me you ain't did it, then you ain't did it",ja:"聞いてくれ、お前がやってないと言うならやってない",ann:null},
        {en:"And if you did, then that's family business",ja:"やったとしても、それは家族の話だ",ann:null}
      ]},
      {label:"[Verse 2]",note:null,lines:[
        {en:"Come on, let's take a family Grammy picture",ja:"さあ、家族のグラミー写真を撮ろう",ann:null},
        {en:"Abi, remember when they ain't believe in me?",ja:"アビ、奴らが俺を信じなかった時を覚えてるか？",ann:null},
        {en:"Now she like, \"See! That's my cousin on TV!\"",ja:"今は「見て！ テレビに従兄弟が出てる！」と言ってる",ann:null},
        {en:"When we get together, be Electric Slidin'",ja:"集まったら、エレクトリック・スライドをやる",ann:"Electric Slide（エレクトリック・スライド）：1976年のMarcia Griffithsのヒット曲に合わせたライン・ダンス。家族の集まりやウェディングパーティーで踊られる定番ダンス。"},
        {en:"I got a Aunt Ruth that can't remember your name",ja:"名前を思い出せないルース叔母さんがいる",ann:null},
        {en:"But I bet them Polaroids'll send her down memory lane",ja:"でもポラロイド写真を見れば記憶が蘇るはずだ",ann:null},
        {en:"But you ain't have to tell my girl I used to pee in the bed",ja:"でも俺が昔おねしょしてたことを彼女に言わなくていい",ann:null}
      ]},
      {label:"[Verse 3]",note:null,lines:[
        {en:"I woke up early this morning with a new state of mind",ja:"今朝は新しい気持ちで目が覚めた",ann:null},
        {en:"Keep your nose out the sky, keep your heart to God",ja:"鼻を空に向けるな、心を神に向けろ",ann:null},
        {en:"All my niggas from the Chi' is my family, dawg",ja:"シカゴの仲間は全員俺の家族だ",ann:null},
        {en:"Sittin' here, grillin' people like George Foreman",ja:"ジョージ・フォアマンのように人を睨みつけてる",ann:"George Foreman（ジョージ・フォアマン）：ヘビー級ボクシングチャンピオン。ジョージ・フォアマン・グリルという家庭用電気グリルのCMでも有名。「grillin'（グリルする）」＝睨みつけるというダブルミーニング。"},

  {num:"21",title:"Last Call",feat:"feat. JAY-Z",hasLyrics:true,data:{
    num:"21",title:"Last Call",feat:"feat. JAY-Z",
    producer:"Evidence & Kanye West",
    sample:null,
    sampleSources:[],
    whosampledUrl:null,
    artwork:"../1. The College Dropout/College Dropout artwork.jpg",
    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"The College Dropoutのクロージングトラック。前半約4分はラップ、後半約8分のスポークンワードでKanyeがRoc-A-Fellaと契約するまでの自伝的経緯を語る。「最後の呼びかけ」というタイトルは、バーが閉まる前の最後の注文の合図。Jay-Zのトーストで始まり、Kanyeの独白で終わる。",
    sections:[
      {label:"[Intro: JAY-Z & Kanye West]",note:null,lines:[
        {en:"Yo, fuck you Kanye, first and foremost for making me do this shit / I'd like to propose a toast",ja:"カニエ、まずはじめに、こんなことをやらせる貴様はくそくらえ / 乾杯の挨拶を提案したい",ann:null}
      ]},
      {label:"[Verse 1: Kanye West]",note:null,lines:[
        {en:"The all around the world Digital Underground Pac / The Rudolph the red-nosed reindeer of the Roc",ja:"世界中のデジタル・アンダーグラウンド・パックのような存在 / ロックの赤鼻のトナカイ・ルドルフ",ann:"Digital Underground（デジタル・アンダーグラウンド）：オークランド出身のヒップホップグループ。2Pac（トゥパック・シャクール）はここから出た。Rudolph：仲間外れにされながらも最終的に認められた赤鼻のトナカイ。Kanyeが業界での自分の立場を重ねた比喩。"},
        {en:"My money was thinner than Sean Paul's goatee hair / Now Jean Paul Gaultier cologne fill the air",ja:"俺のお金はショーン・ポールの山羊ひげより薄かった / 今はジャン・ポール・ゴルチエのコロンが漂う",ann:"Sean Paul：ジャマイカのレゲトンシンガー。薄い山羊ひげで知られる。Jean Paul Gaultier（ジャン・ポール・ゴルチエ）：フランスの高級ファッションブランド。経済的成功の象徴。"},
        {en:"'Til the night I almost killed myself in Lexus",ja:"レクサスで死にかけた夜まで",ann:"2002年10月の自動車事故への言及。顎を骨折する重傷を負いながらも生還し、その翌朝「Through the Wire」を録音した。"}
      ]},
      {label:"[Verse 2: Kanye West]",note:null,lines:[
        {en:"Though the fans want the feeling of A Tribe Called Quest / But all they got left is this guy called West",ja:"ファンはア・トライブ・コールド・クエストの感覚を求めてるが / 残されたのはウェストと呼ばれるこの男だけ",ann:"A Tribe Called Quest（ア・トライブ・コールド・クエスト）：ニューヨーク出身のヒップホップグループ。Q-Tip、Phife Dawg等。1990年代のリリシストヒップホップの象徴として言及される。"},
        {en:"I'm the Gap like Banana Republic and Old Navy",ja:"バナナ・リパブリックとオールドネイビーのようなギャップだ",ann:"Gap（ギャップ）、Banana Republic（バナナ・リパブリック）、Old Navy（オールド・ネイビー）はいずれも同じGap Inc.傘下のブランド。Kanyeがそれらをつなぐ「ギャップ（橋渡し）」だという意味。"},
        {en:"I'm Kon, the Louis Vuitton Don / Bought my mom a purse, now she Louis Vuitton Mom",ja:"俺はコン、ルイ・ヴィトン・ドン / ママにバッグを買った、今や彼女はルイ・ヴィトン・マム",ann:"Louis Vuitton Don（ルイ・ヴィトン・ドン）：Kanyeの自称の初出。「Don」はイタリア語で「ボス」を意味する。後に「Graduation」（2007年）のツアーで定着するアイコン的ニックネーム。"},
        {en:"\"Oh my god, is that a black card?\" / \"But I prefer the term African American Express\"",ja:"「えっ、それってブラックカード？」 / 「でも私はアフリカン・アメリカン・エクスプレスという言葉を好む」",ann:"African American Express（アフリカン・アメリカン・エクスプレス）：American Express Centurion（ブラックカード）のパロディ。人種の呼称をめぐるユーモア。"},
        {en:"Mayonnaise-colored Benz, I push Miracle Whips",ja:"マヨネーズ色のベンツ、ミラクルウィップを走らせる",ann:"このラインをJay-Zに聴かせたことがRoc-A-Fella契約のきっかけの一つになったとKanyeはOutroで語っている。"},
        {en:"Like Dame, Puffy, and Russell",ja:"デイム、パフィー、ラッセルのように",ann:"Damon Dash（Roc-A-Fella）、Sean Combs（Bad Boy Records）、Russell Simmons（Def Jam）——黒人ヒップホップ業界の大物経営者3人。"}
      ]},
      {label:"[Outro（スポークンワード）：Kanye West]",note:"アルバムの終盤約8分間、KanyeがRoc-A-Fellaとの契約を勝ち取るまでの経緯を語る自伝的独白。",lines:[
        {en:"So this A&R over at Roc-A-Fella, named Hip Hop picked the \"Truth\" beat for Beanie. And I was in the session with him.",ja:"ロカフェラのA&Rのヒップ・ホップという男がビーニー（シーガル）のために「Truth」のビートを選んだ、俺はそのセッションにいた",ann:"Hip Hop（本名John Davis）：Roc-A-FellaのA&R担当。Kanyeを発掘した人物。No ID（ノー・アイディー）：シカゴのプロデューサーでKanyeのメンター。CommonやJay-Zの作品でも知られる。"},
        {en:"I made this one beat where I sped up this Harold Melvin sample... \"This Can't Be Life\"",ja:"ハロルド・メルヴィンのサンプルを速めたビートを作った……「ディス・キャント・ビー・ライフ」",ann:"Harold Melvin（ハロルド・メルヴィン）：「Harold Melvin & The Blue Notes」のソウルシンガー。Kanyeが初期サンプリングに使用した。「This Can't Be Life」：Jay-Zのアルバム「The Dynasty」収録曲。KanyeがJay-Zに提供した最初のメジャーな曲。ドラムはDr. Dreの「Xxplosive」（Chronic 2001）からサンプリングしたと語っている。"},
        {en:"The first beat I made was \"Heart of the City.\"",ja:"最初に作ったビートが「ハート・オブ・ジ・シティ」だ",ann:"「Heart of the City」：Jay-Zの「The Blueprint」収録曲。KanyeがニュージャージーのアパートでIKEAのベッドを組み立てた翌日に制作したと語っている。"},
        {en:"...and I said 'yo Jay I could rap.' And I spit this rap... \"Mayonnaise colored Benz, I push miracle whips.\" And I saw his eyes light up when I said that line.",ja:"「ジェイ、俺はラップできる」と言って……「マヨネーズ色のベンツ、ミラクルウィップを走らせる」というラップを吐いた。そのラインを言った時、彼の目が輝くのを見た",ann:null},
        {en:"Everybody out there listen here: I played them \"Jesus Walks\" and they didn't sign me.",ja:"聞いてくれ：「ジーザス・ウォークス」を聴かせたのに誰もサインしなかった",ann:null}
      ]}
    ]
  }},
