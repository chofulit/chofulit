function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function applyGlossary(text) {
  let r = esc(text||'');
  Object.keys(GLOSSARY).sort((a,b)=>b.length-a.length).forEach(term => {
    const e = term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    r = r.replace(new RegExp(`(?<![\\w>])(${e})(?![\\w<])`,'g'),
      `<span class="gl-term" data-term="${term.replace(/"/g,'&quot;')}">$1</span>`);
  });
  return r;
}

    const active = view === `cd-track:${t.num}`;
    return `<button class="track-btn no-lyrics${active?' active':''}" data-view="cd-track:${t.num}">

      </span>

  }).join('');

  nav.innerHTML = `
    <div class="album-item">
      <button class="album-toggle${cdOpen?' open':''}" data-album="cd">
        <span class="album-chevron">▶</span>
        <span class="album-info">
          <div class="album-name">The College Dropout</div>
          <div class="album-year">2004 · 21曲（全曲和訳済）</div>
        </span>
      </button>
      <div class="album-tracks${cdOpen?' open':''}">
        <button class="track-btn${view==='cd-overview'?' active':''}" data-view="cd-overview" style="padding-left:22px;font-size:10px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;">
          <span></span><span>アルバム概要</span>
        </button>
        ${cdTrackHTML}
      </div>
    </div>
    <div class="album-item">
      <button class="album-toggle${lrOpen?' open':''}" data-album="lr">
        <span class="album-chevron">▶</span>
        <span class="album-info">
          <div class="album-name">Late Registration</div>
          <div class="album-year">2005 · 21曲（全曲和訳済）</div>
        </span>
      </button>
      <div class="album-tracks${lrOpen?' open':''}">
        <button class="track-btn${view==='lr-overview'?' active':''}" data-view="lr-overview" style="padding-left:22px;font-size:10px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;">
          <span></span><span>アルバム概要</span>
        </button>
        ${lrTrackHTML}
      </div>
    </div>
    ${renderOtherAlbumsSidebar()}`;

  // Album toggle
  nav.querySelectorAll('.album-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const album = btn.dataset.album;
      const willOpen = !albumOpen[album];
      Object.keys(albumOpen).forEach(k => { albumOpen[k] = false; });
      albumOpen[album] = willOpen;
      renderSidebar();
    });
  });
  // Track / overview buttons
  nav.querySelectorAll('[data-view]').forEach(btn => {
    btn.addEventListener('click', () => {
      view = btn.dataset.view;
      // Auto-open the relevant album
      if (view.startsWith('lr-')) albumOpen.lr = true;
      if (view.startsWith('cd-')) albumOpen.cd = true;
      if (view.startsWith('other-')) {
        const _id = view.split(':')[1];
        if (_id in albumOpen) albumOpen[_id] = true;
      }
      renderSidebar();
      renderContent();
      window.scrollTo(0,0);
    });
  });
}

function renderContent() {
  const c = document.getElementById('content');
  if (view === 'home') { c.innerHTML = renderHome(); }
  else if (view === 'lr-overview') { c.innerHTML = renderLROverview(); }
  else if (view.startsWith('lr-song:')) {
    const id = view.replace('lr-song:','');
    const song = LR_SONGS.find(s=>s.id===id);
    c.innerHTML = song ? renderSong(song,'Late Registration','2. Late Registration') : '';
  }
  else if (view.startsWith('lr-track:')) {
    const num = view.replace('lr-track:','');
    const track = LR_ALL_TRACKS.find(t=>t.num===num);
    c.innerHTML = track ? `
      <div class="song-hdr">
        <div class="hdr-track">Track ${esc(track.num)} — Late Registration</div>

      </div>` : '';
    applyTermPopListeners(); return;
  }
  else if (view === 'cd-overview') { c.innerHTML = renderCDOverview(); }
  else if (view.startsWith('other-overview:')) {
    const _oid = view.replace('other-overview:','');
    const _alb = OTHER_ALBUMS.find(a=>a.id===_oid);
    c.innerHTML = _alb ? renderOtherAlbumOverview(_alb) : '';
  }
  else if (view.startsWith('other-track:')) {
    const _parts = view.replace('other-track:','').split(':');
    const _oid = _parts[0], _num = _parts[1];
    const _alb = OTHER_ALBUMS.find(a=>a.id===_oid);
    const _track = _alb ? _alb.tracks.find(t=>t.num===_num) : null;
    c.innerHTML = _track ? `
      <div class="song-hdr">
        <div class="hdr-track">Track ${esc(_track.num)} — ${esc(_alb.title)}</div>
        <h1 class="hdr-title">${esc(_track.title)}</h1>
        ${_track.feat?`<div class="hdr-feat">${esc(_track.feat)}</div>`:''}

          <div class="hdr-meta-item"><b>アルバム</b>${esc(_alb.title)}</div>
          <div class="hdr-meta-item"><b>リリース</b>${_alb.year}年</div>
        </div>
      </div>
      <div class="coming-soon-wrap">
        <div class="cs-rule"></div>
        <div class="cs-title">和訳・注釈制作中</div>
        <div class="cs-body">このトラックの和訳・注釈はまだ準備中です。完成次第このページに追加されます。</div>
      </div>` : '';
    applyTermPopListeners(); return;
  }
  else if (view.startsWith('cd-track:')) {
    const num = view.replace('cd-track:','');
    const track = CD_TRACKS.find(t=>t.num===num);

              ${t.feat?`<div class="cs-feat-sm">${esc(t.feat)}</div>`:''}
            </span>
          </div>`).join('')}
      </div>
    </div>`;
}

function renderCDTrack(track) {
  if (track.hasLyrics && track.data) {
    return renderSong(track.data, 'The College Dropout', '');
  }
  return `
    <div class="song-hdr">
      <div class="hdr-track">Track ${esc(track.num)} — The College Dropout</div>
      <h1 class="hdr-title">${esc(track.title)}</h1>
      ${track.feat?`<div class="hdr-feat">${esc(track.feat)}</div>`:''}
      <div class="hdr-meta">
        <div class="hdr-meta-item"><b>アルバム</b>The College Dropout</div>
        <div class="hdr-meta-item"><b>リリース</b>2004年</div>
      </div>
    </div>
    <div class="coming-soon-wrap">
      <div class="cs-rule"></div>
      <div class="cs-title">和訳・注釈制作中</div>
      <div class="cs-body">このトラックの和訳・注釈はまだ準備中です。完成次第このページに追加されます。</div>
    </div>`;
}

function ytId(url) {
  if (!url) return null;
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/))([\w-]{11})/);
  return m ? m[1] : null;
}
function ytEmbed(url, title, embedId, startSec) {
  const id = ytId(url);
  if (!id) return '';
  const start = startSec ? ('?start=' + startSec) : '';
  return '<div class="sample-embed"><iframe id="' + esc(embedId) + '" data-vid="' + id + '" src="https://www.youtube.com/embed/' + id + start +
    '" title="' + esc(title||'') + '" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen loading="lazy"></iframe></div>';
}
function sampleJump(embedId, sec) {
  const f = document.getElementById(embedId);
  if (!f) return;
  f.src = 'https://www.youtube.com/embed/' + f.dataset.vid + '?start=' + sec + '&autoplay=1';
}
function fmtTime(sec) {
  if (sec == null) return '';
  const m = Math.floor(sec / 60), s = sec % 60;
  return m + ':' + (s < 10 ? '0' : '') + s;
}

function renderSong(song, albumName, albumFolder) {
  let html = `
    <div class="song-hdr">
      <div class="hdr-track">Track ${esc(song.num)} — ${esc(albumName)}</div>
      <h1 class="hdr-title">${esc(song.title)}</h1>
      ${song.feat?`<div class="hdr-feat">${esc(song.feat)}</div>`:''}
      <div class="hdr-meta">
        <div class="hdr-meta-item"><b>プロデューサー</b>${esc(song.producer)}</div>
        <div class="hdr-meta-item"><b>アルバム</b>${esc(albumName)}</div>
        <div class="hdr-meta-item"><b>レーベル</b>${esc(song.label||'Roc-A-Fella / Def Jam')}</div>
        <div class="hdr-meta-item"><b>リリース</b>${esc(song.year||'2005年')}</div>
        ${song.sample?`<div class="hdr-meta-item"><b>サンプル</b>${esc(song.sample)}</div>`:''}
      </div>
      <div class="hdr-desc">${esc(song.desc)}</div>
    </div>`;

  if (song.sampleSources && song.sampleSources.length > 0) {
    html += `
      <div class="sample-section${song.youtubeUrl?' open':''}">
        <button class="sample-toggle" onclick="this.closest('.sample-section').classList.toggle('open')">
          <span class="sample-toggle-label">サンプル元</span>
          <span class="sample-toggle-chevron">▶</span>
        </button>
        <div class="sample-body">
          ${song.sampleSources.map((src, i) => {
            const useId = 'emb-use-' + i, srcId = 'emb-src-' + i;
            const multi = song.sampleSources.length > 1;
            return `
            <div class="sample-item">
              ${multi?`<div class="sample-item-hdr"><span class="sample-item-num">${i+1}</span>サンプル ${i+1} / ${song.sampleSources.length}${src.relation?'　<span class="sample-item-rel">'+esc(src.relation)+'</span>':''}</div>`:''}
              <div class="sample-tracks">
                <div class="sample-track">
                  <div class="sample-role">使用曲</div>
                  ${song.youtubeUrl?ytEmbed(song.youtubeUrl, song.title, useId, src.useTime):''}
                  <div class="sample-track-info">
                    ${song.youtubeUrl?'':`<img class="sample-art" src="${esc(song.artwork||'late-registration-artwork.jpg')}" alt="${esc(albumName)}" onerror="this.style.display='none'">`}
                    <div class="sample-meta">
                      <div class="sample-track-name">${esc(song.title)}</div>
                      <div class="sample-artist">Kanye West${song.feat?' '+esc(song.feat):''}</div>
                      <div class="sample-album">${(song.year||'2005年').replace(/年?$/,'年')}</div>
                    </div>
                  </div>
                  ${(song.youtubeUrl && src.useTimes)?`<div class="sample-ts">
                    <span class="sample-ts-label">サンプル登場</span>
                    <span class="sample-ts-time">${src.useTimes.map(fmtTime).join('〜')}${src.useNote?' '+esc(src.useNote):''}</span>
                    <button class="sample-ts-link" onclick="sampleJump('${useId}',${src.useTimes[0]})">▶ サンプル箇所へ</button>
                  </div>`:''}
                </div>
                <div class="sample-connector"><div class="sample-arrow">←</div></div>
                <div class="sample-track">
                  <div class="sample-role">サンプル元${song.sampleSources.length>1?' ('+(i+1)+'/'+song.sampleSources.length+')':''}</div>
                  ${src.youtubeUrl?ytEmbed(src.youtubeUrl, src.title, srcId, src.srcTime):''}
                  <div class="sample-track-info">
                    ${src.youtubeUrl?'':'<div class="sample-art-ph">ORIG</div>'}
                    <div class="sample-meta">
                      <div class="sample-track-name">${esc(src.title)}</div>
                      <div class="sample-artist">${esc(src.artist)}</div>
                      <div class="sample-album">${src.year?src.year+'年':''}</div>
                    </div>
                  </div>
                  ${(src.youtubeUrl && src.srcTimes)?`<div class="sample-ts">
                    <span class="sample-ts-label">サンプル登場</span>
                    <span class="sample-ts-time">${src.srcTimes.map(fmtTime).join('〜')}${src.srcNote?' '+esc(src.srcNote):''}</span>
                    <button class="sample-ts-link" onclick="sampleJump('${srcId}',${src.srcTimes[0]})">▶ サンプル箇所へ</button>
                  </div>`:''}
                </div>
              </div>
            </div>`;}).join('')}
        </div>
      </div>`;
  }

  if (song.wayakuUrl) {
    html += `
      <div class="wayaku-section">
        <div class="wayaku-label">和訳動画</div>
        ${ytEmbed(song.wayakuUrl, song.title + ' 和訳', 'wayaku-emb')}
      </div>`;
  }

  html += `<div class="lyrics-wrap">`;
  song.sections.forEach(sec => {
    html += `<div class="sec-header"><div class="sec-rule"></div><div class="sec-label-text">${esc(sec.label)}</div><div class="sec-rule"></div></div>`;
    if (sec.note) html += `<div class="sec-note">${esc(sec.note)}</div>`;
    sec.lines.forEach(line => {
      html += `<div class="lyric-block">
        <div class="en-line">${applyGlossary(line.en)}</div>
        ${line.ja?`<div class="ja-line">${esc(line.ja)}</div>`:''}
        ${line.ann?`<div class="ann-line"><span class="ann-star">＊</span>${esc(line.ann)}</div>`:''}
      </div><div class="spacer"></div>`;
    });
  });
  html += `</div>`;
  return html;
}

function applyTermPopListeners() {
  const pop = document.getElementById('term-pop');
  document.querySelectorAll('.gl-term').forEach(el => {
    el.addEventListener('click', e => {
      const g = GLOSSARY[el.dataset.term];
      if (!g) return;
      pop.innerHTML = `<div class="tp-type">${esc(g.type)}</div><div class="tp-name">${esc(el.dataset.term)}</div>${esc(g.desc)}`;
      pop.style.display = 'block';
      const rect = el.getBoundingClientRect();
      let left = rect.left + window.scrollX;
      if (left + 290 > window.innerWidth) left = window.innerWidth - 300;
      pop.style.top = (rect.bottom + 8 + window.scrollY) + 'px';
      pop.style.left = left + 'px';
      e.stopPropagation();
    });
  });
  document.addEventListener('click', () => { pop.style.display = 'none'; });
}

// ── home-row buttons (rendered via innerHTML, so use delegation) ──
document.getElementById('content').addEventListener('click', e => {
  const btn = e.target.closest('[data-view]');
  if (btn && !btn.closest('#album-nav')) {
    navigate(btn.dataset.view);
  }
});

  cd:     { accent:'#b5803a', annBg:'#fdf7ee', annText:'#8a5e18' },
  lr:     { accent:'#c0392b', annBg:'#fdf6f5', annText:'#a04030' },
  grad:   { accent:'#4a7fd4', annBg:'#f0f4fc', annText:'#2a4a8a' },
  s808:   { accent:'#5b9cc4', annBg:'#f0f6fc', annText:'#1f5a80' },
  mbdtf:  { accent:'#8c1919', annBg:'#fdf0f0', annText:'#6a1010' },
  wtt:    { accent:'#b8922e', annBg:'#fdf8ec', annText:'#7a600e' },
  yeezus: { accent:'#6e5e4e', annBg:'#f8f6f4', annText:'#4e3e2e' },
  tlop:   { accent:'#c96a1a', annBg:'#fdf4ec', annText:'#8a4008' },
  ye:     { accent:'#4a7240', annBg:'#f0f5f0', annText:'#2a5020' },
  ksg:    { accent:'#7a3ac8', annBg:'#f4f0fc', annText:'#4a1a8a' },
  jik:    { accent:'#b88c18', annBg:'#fdf8e4', annText:'#7a5c08' },
  donda:  { accent:'#646464', annBg:'#f5f5f5', annText:'#404040' },
  v1:     { accent:'#1e5aa0', annBg:'#eef2fa', annText:'#0e3a70' },
  v2:     { accent:'#5a2e8c', annBg:'#f4f0fc', annText:'#3a1a6a' },
  donda2: { accent:'#3a3a8c', annBg:'#eeeefa', annText:'#1a1a6a' },
  bully:  { accent:'#8c3a1a', annBg:'#faf0ee', annText:'#5e1a06' },
};

function applyAlbumTheme(albumId) {
  const c = ALBUM_COLORS[albumId] || ALBUM_COLORS.lr;
  const r = document.documentElement.style;
  r.setProperty('--red', c.accent);
  r.setProperty('--ann-bg', c.annBg);
  r.setProperty('--ann-text', c.annText);
}

function navigate(v) {
  view = v;
  if (view.startsWith('lr-')) { albumOpen.lr = true; applyAlbumTheme('lr'); }
  else if (view.startsWith('cd-')) { albumOpen.cd = true; applyAlbumTheme('cd'); }
  else if (view.startsWith('other-')) {
    const _id = view.split(':')[1];
    if (_id in albumOpen) albumOpen[_id] = true;
    applyAlbumTheme(_id);
  } else {
    applyAlbumTheme('lr');
  }
  renderSidebar();
  renderContent();
  window.scrollTo(0,0);
}
