        {en:"What you know about the Isley Brothers?",ja:"アイズレー・ブラザーズのこと何か知ってるか？",ann:null}
      ]},
      {label:"[Interlude: Aisha Tyler, Jamie Foxx, Kanye West & Luther Vandross]",note:null,lines:[
        {en:"Now, now, Kanye, I know I told you to slow it down, baby",ja:"ねえカニエ、ゆっくりやれって言ったじゃない",ann:null},
        {en:"But now I need you to do it faster, baby",ja:"でも今は速くやってほしい",ann:null},
        {en:"Can you please? Do it faster, baby, do it faster",ja:"お願い、速くやって、もっと速く",ann:null},
        {en:"Damn, baby, I can't do it that fast",ja:"まじで、そんなに速くはできないよ",ann:null},

      {label:"[Verse 2: Twista & Luther Vandross]",note:null,lines:[
        {en:"Got you lookin' at the glist on my hands and wrist",ja:"俺の手と手首の輝きを見てるだろ",ann:null},

        {en:"While I smoke a B, you can preferably find that I'm a G",ja:"大麻を吸いながら、俺がGであることがわかるだろ",ann:null},
        {en:"Come wit' me and sip on some Evelyn Champagne",ja:"俺と一緒にエヴリン・シャンパンを飲もう",ann:"Evelyn \"Champagne\" King（エヴリン・シャンパン・キング）：ディスコ／R&Bシンガー。シャンパンとの掛け言葉。"},
        {en:"You ain't know Twista could work it like the Whispers?",ja:"ツイスタがウィスパーズみたいにやれること知らなかった？",ann:null},
        {en:"Hit the stop light, move it to some Isleys",ja:"信号待ちで、アイズレーズを流して体を動かす",ann:null},
        {en:"Rims still movin' so I bump a lil' Spinners",ja:"ホイールがまだ回ってる間、スピナーズをかける",ann:null},
        {en:"While I'm smoking on a B, dippin' through the streets",ja:"大麻を吸いながら街を走り抜ける",ann:null},
        {en:"Bumpin' R&B and I got the heat on them 23s",ja:"R&Bをかけて、23インチのホイールで走る",ann:null},
        {en:"With my earth in the wind smokin' fire",ja:"アース・ウィンド・アンド・ファイアーのように燃えながら",ann:"Earth, Wind & Fire（アース・ウィンド・アンド・ファイアー）を文に溶け込ませた言葉遊び。"},
        {en:"Let me get your sheets wet listenin' to Keith Sweat",ja:"キース・スウェットを聴きながらシーツを濡らそう",ann:"Keith Sweat（キース・スウェット）と「sheets wet」の韻＆掛け言葉。"},

        {en:"You ready for the world, girl? Come on, go wit' me",ja:"ワールドの準備ができてるか、ガール？ 一緒に来いよ",ann:null},
        {en:"I touch you all over your body, baby, don't say no to me",ja:"お前の体の隅々まで触れる、断るな",ann:null},
        {en:"And every moment be controlling me",ja:"すべての瞬間が俺を支配する",ann:null},
        {en:"I'm lovin' the way you be holdin' me when I be listenin' to Jodeci",ja:"ジョデシィを聴く時に抱きしめてくれる、それが好きだ",ann:null},

        {en:"I done hit it from the back, to the melody and rode it slow",ja:"メロディーに乗せて後ろから攻めて、ゆっくり動いた",ann:null},
        {en:"Now I got to go up in it fast, but I'ma finish last",ja:"今は速くしなきゃいけないが、最後まで続ける",ann:null},
        {en:"No matter how much of a thug you see",ja:"どれだけタフに見えても",ann:null},
        {en:"I still spit it like it's R&B, come to the club with me",ja:"俺はまだR&Bみたいに吐き出す、クラブに来い",ann:null},
        {en:"And when some Luther come on, I hope you feelin' me",ja:"ルーサーがかかった時、俺を感じてくれよ",ann:null},
        {en:"And still will be in love with me, so let's Chi ride",ja:"それでもまだ俺に恋してる、シカゴ流で走ろう",ann:null}
      ]},
      {label:"[Bridge: Jamie Foxx, Tracie Spencer & Luther Vandross]",note:null,lines:[
        {en:"Sly and the Family Stone",ja:"スライ・アンド・ザ・ファミリー・ストーン",ann:null},

        {en:"let's really set this party off",ja:"このパーティーを本当に盛り上げよう",ann:null}
      ]},
      {label:"[Chorus: Jamie Foxx & Luther Vandross]",note:null,lines:[

  {num:"13",title:"Breathe In Breathe Out",feat:"feat. Ludacris",hasLyrics:true,data:{
    num:"13",title:"Breathe In Breathe Out",feat:"feat. Ludacris",
    producer:"Kanye West",
    youtubeUrl:"https://www.youtube.com/watch?v=E3dWKq3s6u0",
    wayakuUrl:"https://www.youtube.com/watch?v=v3xwJGmHaY8",
    sample:null,
    sampleSources:[],
    whosampledUrl:null,
    artwork:"1. The College Dropout/College Dropout artwork.jpg",
    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"自己矛盾を笑いに変えた曲。Kanyeは「重要なことをラップすると言っていたのに、結局は金・女・リムの話をしてしまっている」と自分でも認めながらそのまま続ける。Ludacrisが繰り返すコーラスは動的な命令形。物質主義ラップを自己批評しながらも全力でやっている、という矛盾がそのままテーマ。",
    sections:[
      {label:"[Chorus: Ludacris]",note:"Ludacris（本名Christopher Brian Bridges、1977〜）：アトランタ出身のラッパー。ユーモアとパンチラインに定評のあるMC。",lines:[
        {en:"Yeah! Breathe in, breathe out",ja:"はい！ 吸って、吐いて",ann:null},
        {en:"If you're iced up, pull your sleeves out",ja:"アイスアップしてるなら袖を出して",ann:"iced up：ダイヤモンドのジュエリーで着飾った状態。"},
        {en:"Push a big truck, pull your keys out",ja:"デカいトラックに乗るなら鍵を出して",ann:null},
        {en:"Girls go wild and pull your D's out",ja:"ガールズが暴れたらDカップを出して",ann:null},
        {en:"Breathe in, breathe out",ja:"吸って、吐いて",ann:null},
        {en:"Let them hoes fight, pull a weave out",ja:"ホーたちが喧嘩したらウィッグを引っこ抜いて",ann:null},
        {en:"If a nigga act up, pull a Desert E's out",ja:"ニガーが暴れたらデザートイーグルを出して",ann:"Desert Eagle（デザートイーグル）：大型の半自動拳銃。"},
        {en:"When I pull the piece out, niggas like, \"Peace out!\"",ja:"銃を出したら、みんな「平和！（ピース）」って逃げる",ann:"piece（銃）とpeace（平和）の掛け言葉。"}
      ]},
      {label:"[Verse 1: Kanye West, Ludacris]",note:null,lines:[
        {en:"Golly, more of that bullshit ice rap",ja:"やれやれ、またあのクソみたいなアイスラップだ",ann:null},
        {en:"I gotta 'pologize to Mos and Kweli",ja:"モスとクウェリに謝らないといけない",ann:"Mos Def（モス・デフ）とTalib Kweli（タリブ・クウェリ）。コンシャス（意識高い）ヒップホップの代表格。自分の俗物ラップを彼らに謝るユーモア。"},
        {en:"But is it cool to rap about gold",ja:"でも金についてラップするのはいいのか",ann:null},
        {en:"If I told the world I copped it from Ghana and Mali?",ja:"世界にガーナとマリから買ったと言ったら？",ann:"Ghana and Mali（ガーナとマリ）：西アフリカの国々。歴史的に金の産地として有名。"},
        {en:"First nigga with a Benz and a backpack",ja:"ベンツとバックパックを持った最初のニガー",ann:"高級車（成功）とバックパック（学生・コンシャス系の象徴）を併せ持つ存在＝Kanyeの自己像。"},
        {en:"Ice chain, Carti' lens, and a knapsack",ja:"アイスチェーン、カルティエのレンズ、ナップサック",ann:null},
        {en:"Always said, \"If I rapped, I'd say somethin' significant\"",ja:"いつも言ってた、「ラップするなら重要なことを言う」と",ann:null},
        {en:"But now, I'm rapping 'bout money, hoes, and rims again",ja:"でも今は金と女とリムの話をしてる",ann:null},
        {en:"And it's still about the Benjamins",ja:"それでもまだベンジャミン（100ドル札）の話",ann:"Benjamins：100ドル札の俗称。Puff Daddy「It's All About the Benjamins」(1997)への言及。"},
        {en:"Big-face hundreds and whatever other synonyms",ja:"大きな顔の100ドル札と、他の同義語たち",ann:null},
        {en:"Strippers named \"Cinnamon,\" more chips than Pentium",ja:"「シナモン」という名前のストリッパー、ペンティアムよりも多いチップ",ann:"Pentium（ペンティアム）：Intelのプロセッサー。「chips」はコンピュータチップと金（チップ）のダブルミーニング。"},
        {en:"\"What you gon' buy next?\" Whatever new trend it is",ja:"「次は何買うの？」最新トレンドのものなんでも",ann:null},
        {en:"I'm tryna spend my stacks, and I'm so broke",ja:"スタック（束）を使いきろうとしてるのに、超貧乏",ann:null},
        {en:"I look back, like, \"Damn, was I on crack?\"",ja:"振り返ると「くそ、クラックやってたか？」という気持ち",ann:null},
        {en:"I mean, twelve platinum chains—was I on that?",ja:"12本のプラチナチェーン——本当にあんなことやってたか？",ann:null},
        {en:"What the hell was wrong with me, dawg?",ja:"一体俺はどうかしてたんだ、ダウグ？",ann:null}
      ]},
      {label:"[Verse 2: Kanye West]",note:null,lines:[
        {en:"Now, even though I went to college and dropped out of school quick",ja:"大学に行ってすぐ中退したけど",ann:null},
        {en:"I always had a Ph.D: a pretty huge dick",ja:"いつも持っていた学位がある：かなりデカいやつ",ann:"Ph.D（博士号）を「pretty huge dick」の頭字語に読み替えた下ネタの言葉遊び。"},
        {en:"Ladies tired of getting ripped off by guys like this",ja:"こういう男たちに騙されるのに疲れた女性へ",ann:null},
        {en:"And giving head is like a whale that's using a toothpick",ja:"フェラチオはクジラが爪楊枝を使うようなもの",ann:null},
        {en:"Well, I'm in the club for a limited time",ja:"クラブに限定時間いる",ann:null},
        {en:"Act now and get some action for a free-ninety-nine",ja:"今動けばタダで楽しめる",ann:"free-ninety-nine（フリー・ナインティナイン）：「無料」を価格表示風にしたギャグ。"},
        {en:"Later on, I might charge for ménage",ja:"後でメナージュ（3P）の料金が発生するかもしれない",ann:null},
        {en:"Heard her man was the boss of the floss",ja:"彼女の彼氏はフロス（見せびらかし）のボスだと聞いた",ann:null},
        {en:"But she still want to toss me the drawers",ja:"でも彼女はまだ俺にパンツを投げてくれる",ann:null},
        {en:"And it ain't gon' cost me because",ja:"俺は払わなくていいわけで",ann:null},
        {en:"She my caddy 'cause she grab my golf balls in the club",ja:"クラブで俺のゴルフボールを掴むから彼女がキャディーだ",ann:null},
        {en:"And I'm still acting calm than a muh'",ja:"それでも俺は落ち着いてる",ann:null},
        {en:"She asked, \"Can you drive me in the hundreds where my Altima was?\"",ja:"「私のアルティマがある方向に連れてって？」と聞いてきた",ann:null},
        {en:"While we drive, she tellin' me 'bout problems with her man",ja:"ドライブ中、彼女は彼氏の問題を話してくれる",ann:null},
        {en:"Baby, I fully understand; let me help you with a plan",ja:"ベイビー、完全にわかる、プランを考えよう",ann:null},
        {en:"While he tricking off, don't get no rich nigga",ja:"彼が金を使いながら、お金持ちのニガーは要らない",ann:null},
        {en:"Give me some head—that'll really piss him off",ja:"フェラをくれ——それが彼を本当に怒らせる",ann:null}
      ]},
      {label:"[Verse 3: Kanye West]",note:null,lines:[
        {en:"I blow past low-class niggas with no cash",ja:"現金なしの低レベルなニガーたちを追い越す",ann:null},
        {en:"In a four-dash-six, bitch, you can go ask",ja:"4-6（車種）で、ビッチ、聞いてみな",ann:null},
        {en:"So when I go fast, po-po just laugh",ja:"速く走れば、警察は笑うだけ",ann:null},
        {en:"Right until I run out of gas or 'til I go crash",ja:"ガス欠か事故を起こすまで",ann:null},
        {en:"Whatever come first, I'm prepared for the worst",ja:"どちらが先に来ても、最悪に備えてる",ann:null},
        {en:"Whatever come second, I'll be there with my weapon",ja:"どちらが後に来ても、武器を持ってそこにいる",ann:null},
        {en:"Pulling up in the Lexuses, one on both hand",ja:"両手にレクサス、一台ずつ",ann:null},
        {en:"So I guess them GSeses was ambidextrious",ja:"両利きだったんだな、GS（レクサスのモデル）",ann:null},
        {en:"Could've sworn her breast-eses was sending me messages",ja:"彼女のバストがメッセージを送ってきてると思った",ann:null},
        {en:"\"K, I need a free hand-mammogram",ja:"「ケー、無料のハンドマンモグラムが必要なの」",ann:null},
        {en:"I got weed, drink, and a Handicam",ja:"大麻、飲み物、ハンディカムを持ってる」",ann:null},
        {en:"All of which is legal in Amsterdam",ja:"すべてアムステルダムでは合法",ann:"Amsterdam（アムステルダム）：マリファナが合法のオランダの首都。アメリカとの対比。"},
        {en:"So, say my name like Candyman",ja:"キャンディマンのように俺の名前を呼んでくれ",ann:"Candyman（キャンディマン）：1992年のホラー映画。鏡に名前を5回唱えると現れる都市伝説。"},
        {en:"And I'ma come and fix you up like the handyman",ja:"ハンディマン（職人）のように来て直してあげる",ann:null},
        {en:"But if you don't need a fix, girl, you gotta leave",ja:"でも修理が必要ないなら、ガール、立ち去れ",ann:null},
        {en:"You can't take that all at one time—you gotta breathe!",ja:"一度にすべてはできない——深呼吸しろ！",ann:null}
      ]},
      {label:"[Outro: Kanye West]",note:null,lines:[
        {en:"Yeah-ugh, ugh-ugh, ugh-ugh",ja:"イェーウ、ウウ、ウウ",ann:null},
        {en:"And you say, \"Chi-city\"",ja:"「シカゴ！」と言え",ann:"Chi-city：シカゴの愛称。Kanyeの地元への誇りを示す締めのコール&レスポンス。"},
        {en:"Chi-city, Chi-city, Chi-city, Chi-city",ja:"シカゴ！ シカゴ！ シカゴ！ シカゴ！",ann:null}
      ]}
    ]
  }},
  {num:"14",title:"School Spirit Skit 1",feat:null,hasLyrics:true,data:{
    num:"14",title:"School Spirit Skit 1",feat:null,
    producer:"Kanye West",
    wayakuUrl:"https://www.youtube.com/watch?v=gN4lglFzfos",
    sample:null,
    sampleSources:[],
    whosampledUrl:null,
    artwork:"1. The College Dropout/College Dropout artwork.jpg",
    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"DeRay Davisによる風刺スキット。「大学を卒業して就職したら幸せになれる」という物語を誇張しながら解体する。年収2万5千ドルの仕事、Gap勤務、秘書の秘書という現実と「でも学歴がある」という虚しい満足感が笑いのポイント。Kanyeのアルバム全体のテーマ「学歴崇拝の欺瞞」を体現するスキット。",
    sections:[
      {label:"[Skit: DeRay Davis]",note:"DeRay Davis（ディレイ・デイヴィス）：シカゴ出身のスタンドアップコメディアン・俳優。College Dropoutで複数のスキットに登場し、アルバムの風刺的な語り手役を担う。",lines:[
        {en:"Now beat that!",ja:"さあ、どうぞ！",ann:null},
        {en:"And your mother's saying \"Go to college\"",ja:"お母さんは「大学に行きなさい」と言う",ann:null},
        {en:"So you finish college and it's wonderful",ja:"そうやって大学を卒業して、素晴らしい",ann:null},
        {en:"You feel so good",ja:"とても気分がいい",ann:null},
        {en:"And after all the partying and craziness",ja:"パーティーと騒ぎが全部終わって",ann:null},
        {en:"And don't forget about that drug habit you picked up at school being around your peers",ja:"学校で仲間たちに囲まれてついた薬物習慣も忘れるな",ann:null},
        {en:"Hey! Now you'll get that 25-thousand dollar job a year",ja:"さあ！ 年収2万5千ドルの仕事が手に入る",ann:"25-thousand dollar（2万5千ドル）：2004年当時のアメリカの平均的な低〜中程度の年収。大卒の期待値に対する現実の落差を表す数字。"},
        {en:"And you'll spend all your money on crack cocaine",ja:"そしてそのお金は全部クラックコカインに消える",ann:null},
        {en:"But, it'll be your money",ja:"でも、それはお前自身のお金だ",ann:null},
        {en:"No more borrowing from mom for my high!",ja:"ハイになるためにお母さんから借りなくていい！",ann:null},
        {en:"So now you get your degree tattooed on your back",ja:"というわけで今度は背中に学位のタトゥーを入れる",ann:null},
        {en:"You're so excited about it",ja:"それをとても誇りに思う",ann:null},
        {en:"If you continue to work at the Gap, after several interviews, oh my God",ja:"Gapで働き続けて、何度か面接を受けた後、ああ",ann:"Gap（ギャップ）：アメリカのカジュアルウェアブランド。学歴があっても小売業の入門職にしか就けないという皮肉のために選ばれた店。"},
        {en:"You'll come in at a entry-level position",ja:"入門職から始まる",ann:null},
        {en:"And when you do that, if you kiss enough ass",ja:"そこで十分ごまをすれば",ann:null},
        {en:"You'll move up to the next level",ja:"次のレベルに上がれる",ann:null},
        {en:"Which is being the secretary's secretary",ja:"それが秘書の秘書になること",ann:null},
        {en:"And boy, is that great",ja:"いや、それは素晴らしい",ann:null},
        {en:"You get to take messages for the secretary",ja:"秘書へのメッセージを受け取れる",ann:null},
        {en:"Who NEVER went to college",ja:"その秘書は大学なんか一度も行ったことがない",ann:null},
        {en:"She's actually the boss's niece!",ja:"実は社長の姪なんだ！",ann:null},
        {en:"So now you're part of the family",ja:"これでファミリーの一員になった",ann:null},
        {en:"You know what college does for you?",ja:"大学がお前に何をしてくれるかわかるか？",ann:null},
        {en:"It makes you really smart, man",ja:"本当に頭が良くなるんだ",ann:null},
        {en:"All you kids wanted to talk in the back of the class",ja:"クラスの後ろで喋りたがってたお前たちとは違って",ann:null},
        {en:"Not me, I listened",ja:"俺は聞いていた",ann:null},
        {en:"Okay? I was a hall monitor",ja:"わかったか？ 俺は廊下監視員だった",ann:null},
        {en:"This was meant to be",ja:"これは運命だった",ann:null},
        {en:"You know how many classes I took?",ja:"俺がどれだけ授業を取ったかわかるか？",ann:null},
        {en:"Extra classes, extra classes",ja:"追加授業、また追加授業",ann:null},
        {en:"No, I've never had sex",ja:"そう、俺はセックスをしたことがない",ann:null},
        {en:"But you know what? My degree keeps me satisfied",ja:"でもわかるか？ 俺の学位が満たしてくれる",ann:null},
        {en:"When a lady walks up to me and says \"Hey, you know what's sexy?\"",ja:"女性が近づいてきて「ねえ、何がセクシーか知ってる？」と言ったら",ann:null},
        {en:"I said, \"No, I don't know what it is",ja:"俺は言う、「いや、わからない",ann:null},
        {en:"But I bet I can add up all the change in your purse, very fast\"",ja:"でも、お前の財布の小銭を全部、すごく速く足し算できると思うよ」",ann:null}
      ]}
    ]
  }},

        {en:"I'ma, I'ma put **** down",ja:"やってみせる",ann:null},
        {en:"I'ma make sure these light-skinned ****",ja:"肌の明るい****たちを",ann:null},
        {en:"Never, ever, never come back in style",ja:"絶対、絶対、二度とトレンドに戻ってこないようにしてやる",ann:null}
      ]},
      {label:"[Verse 1]",note:null,lines:[
        {en:"Told 'em I finished school and I started my own business",ja:"学校を終えて自分のビジネスを始めたと言った",ann:null},
        {en:"They say, \"Oh, you graduated?\" No, I decided I was finished",ja:"「卒業したの？」——いや、終わったと自分で決めたんだ",ann:"graduate（卒業する）ではなく finished（終わらせた）と言い換え、大学を「修了」ではなく自分の意志で「見切った」と主張する。アルバムタイトルの核心。"},
        {en:"Chasing y'all dreams and what you've got planned",ja:"お前らの夢とお前らの計画を追いかけることを",ann:null},
        {en:"Now I spit it so hot, you got tanned",ja:"今の俺はそれほど熱いラップをする、お前が日焼けするくらい",ann:null},
        {en:"Back to school and I hate it there, I hate it there",ja:"学校に戻れ——俺はそこが嫌いだ、本当に嫌いだ",ann:null},

        {en:"This **** graduated at the top of our class",ja:"この****はクラスのトップで卒業した",ann:null},
        {en:"I went to Cheesecake, he was a **** waiter there",ja:"チーズケーキファクトリーに行ったら、そこでウェイターをしてた",ann:"Cheesecake Factory（チーズケーキファクトリー）：アメリカの大手レストランチェーン。トップで卒業した同級生が結局ウェイターをしている＝学歴が成功を保証しないという皮肉。"}
      ]},
      {label:"[Verse 2]",note:null,lines:[
        {en:"I got a Jones like Norah for your soror",ja:"ノラ（・ジョーンズ）のようにお前のソロリティに夢中だ",ann:"Norah Jones（ノラ・ジョーンズ）と「Jones（〜に夢中）」、soror（ソロリティの女性メンバー）の言葉遊び。"},
        {en:"Bring more of them girls, I've seen in The Aurora",ja:"オーロラで見たあの子たちをもっと連れてきて",ann:null},
        {en:"Tammy, Becky, and Laura, or a Shirley",ja:"タミー、ベッキー、ローラ、またはシャーリー",ann:null},
        {en:"I'm trying to hit it early, like I'm in a hurry",ja:"急いでるかのように早く口説こうとしてる",ann:null},
        {en:"See, that's how dude became the young Pootie Tang: \"tippy tow\"",ja:"そういうわけでそいつは若いプーティー・タンになった：「ティッピー・トー」",ann:"Pootie Tang（プーティー・タン）：2001年のコメディ映画の主人公。独自のスラングを使う謎の黒人ヒーロー。"},
        {en:"Roc-A-Fella chain, yeah, that's my rapper style",ja:"ロカフェラチェーン、それが俺のラッパースタイル",ann:"Roc-A-Fella chain：Jay-ZとDamon DashのRoc-A-Fella Recordsのチェーン。"},

        {en:"Crack my head on the steering wheel and I ain't even dead",ja:"ハンドルで頭を割っても俺は死ななかった",ann:"2002年10月のKanyeの自動車事故への言及。顎の骨折という重傷を負いながら生還し、その状態で「Through the Wire」を録音した。"},

    artwork:"1. The College Dropout/College Dropout artwork.jpg",
    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"Skit 1の続き。大学の学位を取り続けることへの執着を52歳になっても続けているという状況を描く。「周りが稼いでいる中で、俺は自分のお金を使って賢くなっている」「死ぬ時に温めてくれるのは学位だ」というオチが、学歴崇拝の滑稽な末路を描く。",
    sections:[
      {label:"[Skit: De'Ray Davis]",note:null,lines:[
        {en:"You keep it going, man, you keep those books rolling",ja:"お前は続けろ、本を読み続けろ",ann:null},
        {en:"You pick up all those books that you're gonna read and not remember and you roll, man",ja:"読んでも覚えられない本を全部拾い上げて、続けろ",ann:null},
        {en:"You get that associate's degree, okay?",ja:"準学士を取れ、いいか？",ann:null},
        {en:"Then you get your bachelor's",ja:"次に学士を取れ",ann:null},
        {en:"Then you get your masters",ja:"次に修士を取れ",ann:null},
        {en:"Then you get your masters' masters",ja:"次に修士の修士を取れ",ann:null},
        {en:"Then you get your doctorate",ja:"次に博士を取れ",ann:null},
        {en:"You go, man",ja:"行け、頑張れ",ann:null},
        {en:"And then, when everybody says quit, you show them those degrees, man",ja:"そして皆が「やめろ」と言ったら、学位を見せてやれ",ann:null},
        {en:"When everyone says, \"Hey, you're not working, you're not making any money\"",ja:"「お前は働いてない、お金を稼いでいない」と言われたら",ann:null},
        {en:"You say, \"You look at my degrees, and you look at my life",ja:"「俺の学位を見ろ、俺の人生を見ろ",ann:null},
        {en:"Yeah, I'm fifty-two, so what?",ja:"そうだ、俺は52歳だ、それが何だ？",ann:null},
        {en:"Hate all you want, but I'm smart, I'm so smart",ja:"好きなだけ憎め、でも俺は賢い、本当に賢い",ann:null},
        {en:"And, and I'm in school",ja:"そして、俺は学校にいる",ann:null},
        {en:"All these guys out here, uh, making money all these ways",ja:"ここにいる奴らは皆、いろいろな方法で金を稼いでいる",ann:null},
        {en:"And I'm spending mine to be smart",ja:"でも俺は賢くなるためにお金を使ってる",ann:null},
        {en:"You know why?",ja:"なぜかわかるか？",ann:null},
        {en:"'Cause when I die, buddy",ja:"なぜなら俺が死ぬ時に、バディ",ann:null},
        {en:"You know what's gonna keep me warm?",ja:"何が俺を温めてくれるかわかるか？",ann:null},
        {en:"That's right, those degrees\"",ja:"そうだ、あの学位だ」",ann:null}
      ]}
    ]
  }},
  {num:"17",title:"Lil Jimmy Skit",feat:null,hasLyrics:true,data:{
    num:"17",title:"Lil Jimmy Skit",feat:null,
    producer:"Kanye West",
    wayakuUrl:"https://www.youtube.com/watch?v=FW-Wsb8_sXo",
    sample:null,
    sampleSources:[],
    whosampledUrl:null,
    artwork:"1. The College Dropout/College Dropout artwork.jpg",
    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"School Spirit Skit 2の「死ぬ時に温めてくれるのは学位だ」というオチを受けたシュールな続編。父親が学位を集めすぎて、息子の学位まで取ってしまったホームレスの「リル・ジミー」の話。他のホームレスが新聞を持っているのに、自分は「書類で証明された」学位を持っているという対比がパンチライン。",
    sections:[
      {label:"[Spoken Word: The World Famous Tony Williams & DeRay]",note:"The World Famous Tony Williams：シカゴのDJ・コメディアン。本スキットでジミーの父の行方を尋ねるナレーター役。",lines:[
        {en:"Hey Jimmy, where you going?",ja:"ジミー、どこ行くんだ？",ann:null},
        {en:"I don't know where I'm going",ja:"どこに行くかわからない",ann:null},
        {en:"My Dad died, and, uh, he left me his degrees",ja:"お父さんが死んで、学位を残してくれたんだ",ann:null},
        {en:"My mom would always say, \"Dad, why don't you work?\"",ja:"ママはいつも言ってた、「お父さん、なんで働かないの？」",ann:null},
        {en:"But he just kept learning, hmm",ja:"でもお父さんはただ学び続けた、うん",ann:null},
        {en:"All the other kids' parents were working and saving up money for school",ja:"他の子の親は働いて学校のためにお金を貯めてた",ann:null},
        {en:"And I was actually in school all while my dad was in school!",ja:"そして俺は父が学校にいる間ずっと、自分も学校にいた！",ann:null},
        {en:"Even, he was so greedy with degrees, he took my degree",ja:"しかも、学位への欲が深すぎて、俺の学位まで取ってしまった",ann:null},
        {en:"And now, I'm just glad he left me these",ja:"今は、これを残してくれてよかった",ann:null},
        {en:"Because all the regular homeless people have newspaper, and look what I have",ja:"普通のホームレスの人たちは新聞を持ってる、でも俺が持ってるものを見てくれ",ann:null},
        {en:"These are documented, my father left them to me",ja:"これは文書で証明されてる、父が俺に残してくれた",ann:null},
        {en:"And I'm going to leave them to my kids",ja:"俺も子供たちに残すつもりだ",ann:null},
        {en:"I'm gonna learn too",ja:"俺も学ぶつもり",ann:null},
        {en:"I'm gonna get super smart, so I, too, can die without money",ja:"超賢くなって、俺も金なしで死ねる",ann:null},
        {en:"But I'll be the smartest dead guy!",ja:"でも俺は一番賢い死人になるぞ！",ann:null},
        {en:"Who has that?",ja:"そんなやつが誰かいるか？",ann:null}
      ]}
    ]
  }},
  {num:"18",title:"Two Words",feat:"feat. Mos Def, Freeway & Harlem Boys Choir",hasLyrics:true,data:{
    num:"18",title:"Two Words",feat:"feat. Mos Def, Freeway & Harlem Boys Choir",

       url:"https://www.whosampled.com/sample/324/Kanye-West-Mos-Def-Freeway-The-Harlem-Boys-Choir-Two-Words-Mandrill-Peace-and-Love-(Amani-Na-Mapenzi)%3A-Movement-IV-(Encounter)/",

    whosampledUrl:"https://www.whosampled.com/Kanye-West/Two-Words/",
    artwork:"1. The College Dropout/College Dropout artwork.jpg",
    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"「二つの言葉」を繰り返すストラクチャーで構成された、政治的かつ自己宣言的なトラック。Mos Def（ニューヨーク）、Freeway（フィラデルフィア）、Kanye（シカゴ）の三都市のMCが各バースを担当し、Harlem Boys Choirが壮大なコーラスを加える。ストリートの現実、Kanyeのキャリアの歩み、そして「どこへも行けない（nowhere to go）」という閉塞感と「上しか行き場がない」という覚悟が混在する。",
    sections:[
      {label:"[Chorus: Kanye West]",note:null,lines:[
        {en:"We're in the streets, player, get your mail",ja:"俺たちはストリートにいる、プレイヤー、稼いでこい",ann:null},
        {en:"It's only two places you end up: either dead or in jail",ja:"行き着く場所は二つだけ：死か刑務所",ann:null},
        {en:"Still nowhere to go",ja:"それでもどこにも行けない",ann:null},
        {en:"Now, throw your hands up, hustlers, busters, boosters, hoes",ja:"手を上げろ、ハスラー、バスター、ブースター、ホー",ann:null},
        {en:"Everybody, fuck that",ja:"みんな、くそくらえ",ann:null},
        {en:"Still nowhere to go",ja:"それでもどこにも行けない",ann:null}
      ]},
      {label:"[Verse 1: Mos Def]",note:"Mos Def（本名Yasiin Bey、1973〜）：ブルックリン・ベッドスタイ（Bed-Stuy）出身のラッパー・俳優。Talib Kweliとの「Black Star」(1998)で知られる意識系MC。",lines:[
        {en:"Two words: United States, no love, no breaks",ja:"二つの言葉：合衆国、愛なし、休憩なし",ann:null},
        {en:"Low brow, high stakes. Crack smoke, Black folks",ja:"低俗、高リスク。クラックの煙、黒人たち",ann:null},
        {en:"Big Macs, fat folks. Ecstasy capsules",ja:"ビッグマック、太った人たち。エクスタシーのカプセル",ann:null},
        {en:"Presidential scandals—everybody, move",ja:"大統領スキャンダル——みんな、動け",ann:null},
        {en:"Two words: Mos Def, K. West, hot shit",ja:"二つの言葉：モス・デフ、K.ウェスト、ホットなやつ",ann:null},
        {en:"Calm down, get back. Ghetto people got this",ja:"落ち着け、下がれ。ゲットーの人々が持ってる",ann:null},
        {en:"Game 'pon lock shit. Gun 'pon cock shit",ja:"ゲームをロックするやつ、銃をコックするやつ",ann:null},
        {en:"We won't stop shit—everybody, move",ja:"俺たちは止まらない——みんな、動け",ann:null},
        {en:"Two words: B-K, N-Y, Bed-Stuy",ja:"二つの言葉：B-K（ブルックリン）、N-Y（ニューヨーク）、ベッドスタイ",ann:"Bed-Stuy（ベッドスタイ）：Bedford-Stuyvesant。ブルックリンの地区。Mos Defの出身地。"},
        {en:"Too harsh, too hungry, too many, that's why",ja:"厳しすぎる、腹ペコすぎる、多すぎる、だからこそ",ann:null},
        {en:"These streets know game. Can't ball? Don't play",ja:"このストリートはゲームを知ってる。プレーできないなら参加するな",ann:null},
        {en:"Heavy traffic, one lane—everybody, move",ja:"渋滞、一車線——みんな、動け",ann:null}
      ]},
      {label:"[Verse 2: Kanye West]",note:null,lines:[
        {en:"Two words: Chi-Town, Southside, worldwide",ja:"二つの言葉：シカゴ、サウスサイド、ワールドワイド",ann:null},
        {en:"'Cause I rep that 'til I fuckin' die",ja:"死ぬまでそれを代表するから",ann:null},
        {en:"One neck, two chains. One waist, two gats",ja:"首一本にチェーン二本。腰一本に銃二丁",ann:null},
        {en:"One wall, twenty plaques, dues paid, gimme that",ja:"壁一枚にプラチナ二十枚、会費払い済み、それをくれ",ann:null},
        {en:"I am limelight, Blueprint, five mics",ja:"俺はライムライト（注目の的）、ブループリント（Jay-Zのアルバム）、5マイク（最高評価）",ann:"Blueprint：Jay-Zの2001年のアルバム（Kanyeがビートを提供）。five mics：The Source誌の最高評価。"},
        {en:"Go-Getters rhyme like should've been signed twice",ja:"ゴーゲッターのライムは二回サインされるべきだったくらい",ann:null},
        {en:"Most imitated, Grammy nominated",ja:"最も模倣された、グラミーノミネート",ann:null},
        {en:"Hotel accommodated, cheerleader prom-dated",ja:"ホテルに泊まって、チアリーダーとプロムに行った",ann:null},
        {en:"Barbershop player-hated, mom and pop bootlegged it",ja:"バーバーショップで妬まれ、パパとママはブートレグを売った",ann:null},
        {en:"Felt like it rained 'til the roof caved in",ja:"屋根が落ちるまで雨が降り続けたような感じ",ann:null},
        {en:"Two words: Chi-Town raised me, crazy",ja:"二つの言葉：シカゴが俺を育てた、クレイジーに",ann:null},
        {en:"So I live by two words: \"Fuck you, pay me\"",ja:"だから俺は二つの言葉で生きてる：「くそくらえ、金払え」",ann:null},
        {en:"Screaming, \"Jesus, save me\"",ja:"「ジーザス、助けてくれ」と叫びながら",ann:null},
        {en:"You know how the game be, I can't let 'em change me",ja:"ゲームがどんなものか知ってる、変えさせるわけにはいかない",ann:null},
        {en:"'Cause on judgment day, you gon' blame me",ja:"審判の日にはお前に責められるから",ann:null},
        {en:"Look, God—it's the same me",ja:"見てくれ、神よ——これが変わらぬ俺だ",ann:null},
        {en:"And I basically know now, we get racially profiled",ja:"今はわかってる、俺たちは人種プロファイリングにかけられる",ann:null},
        {en:"'Cuffed up and hosed down, pimped up and ho'd down",ja:"手錠をかけられ水をかけられ、搾取されて使い回される",ann:null},
        {en:"Plus, I got a whole city to hold down",ja:"しかも俺は一つの街全体を背負っている",ann:null},
        {en:"From the bottom, so the top's the only place to go now",ja:"底から来たから、今は上しか行き場がない",ann:null}
      ]},
      {label:"[Verse 3: Freeway]",note:"Freeway（本名Leslie Edward Pridgen、1978〜）：フィラデルフィア出身のラッパー。Roc-A-Fella Records所属。",lines:[
        {en:"Two words: Freeway; two letters: A-R",ja:"二つの言葉：フリーウェイ。二つの文字：A-R（AR-15、突撃銃）",ann:null},
        {en:"Turn y'all rap niggas to two words: fast runners",ja:"お前らラップニガーを二つの言葉に変えてやる：逃げ足が速い",ann:null},
        {en:"Like Jackie Joyner, you better sleep with your burner",ja:"ジャッキー・ジョイナーみたいに、銃と一緒に寝ろ",ann:"Jackie Joyner-Kersee（ジャッキー・ジョイナー＝カーシー）：陸上競技の伝説的女性選手。「逃げ足が速い」の比喩。"},
        {en:"The heat skeet, blow a reef through your car, my God",ja:"熱い一発、お前の車を吹き飛ばす",ann:null},
        {en:"Two words: no guns, break arms",ja:"二つの言葉：銃なし、腕を折る",ann:null},
        {en:"Break necks, break backs, Steven Seagal",ja:"首を折る、背中を折る、スティーブン・セガール",ann:"Steven Seagal（スティーブン・セガール）：合気道を使うアクション映画スター。"},
        {en:"Free young boss, freshman of the Roc",ja:"フリーはヤングボス、ロックの新人",ann:null},
        {en:"With the beef in the pot, Jay sent for his dogs to brawl",ja:"牛肉が鍋に入ってる、ジェイは仲間を呼んで戦わせた",ann:null},
        {en:"Forget your squad, better 'fend for yourself",ja:"仲間を忘れろ、自分で身を守れ",ann:null},
        {en:"Have you screamin' out four words: \"Send for the law,\" ugh",ja:"四つの言葉を叫ばせてやる：「警察を呼べ」",ann:null},
        {en:"Two words: Freeway, slightly retarded",ja:"二つの言葉：フリーウェイ、ちょっとおかしい",ann:null},
        {en:"Fuck around, throw a clip in your artist. Leave with his broad",ja:"ふざけるな、お前のアーティストにクリップをブチ込む。彼女も連れていく",ann:null}
      ]},
      {label:"[Outro: Mos Def & Harlem Boys Choir]",note:"Harlem Boys Choir（ハーレム・ボーイズ・クワイア）：1968年創設のニューヨーク・ハーレムの名門少年合唱団。",lines:[
        {en:"Red, white, blue, black, calm down, move back",ja:"赤、白、青、黒、落ち着け、下がれ",ann:null},
        {en:"Motherfuckers askin', \"Who is that?\"",ja:"誰だと聞いてくる奴らに",ann:null},
        {en:"You know it's the almighty Black Jack",ja:"アルマイティ・ブラック・ジャックとわかるはずだ",ann:null},
        {en:"Mos Def, K. West",ja:"モス・デフ、K.ウェスト",ann:null},
        {en:"Ghetto people, get this shit off your chest",ja:"ゲットーの人々よ、胸のつかえを吐き出せ",ann:null},
        {en:"North to the south, to the east, to the west",ja:"北から南へ、東から西へ",ann:null},
        {en:"Black Jack Johnson, it's no contest",ja:"ブラック・ジャック・ジョンソン、勝負にならない",ann:"Jack Johnson（ジャック・ジョンソン）：1908年に史上初の黒人ヘビー級世界チャンピオンとなったボクサー。人種差別の激しい時代に白人選手を次々と倒し、黒人の誇りの象徴となった。"}
      ]}
    ]
  }},
  {num:"19",title:"Through The Wire",feat:null,hasLyrics:true,data:{
    num:"19",title:"Through The Wire",feat:null,
    producer:"Kanye West",
    youtubeUrl:"https://www.youtube.com/watch?v=AE8y25CcE6s",
    wayakuUrl:"https://www.youtube.com/watch?v=knDu0lfaDvk",
    sample:"Chaka Khan「Through the Fire」(1984)",
    sampleSources:[
      {artist:"Chaka Khan",title:"Through the Fire",year:1984,
       url:"https://www.whosampled.com/sample/346/Kanye-West-Through-the-Wire-Chaka-Khan-Through-the-Fire/",
       youtubeUrl:"https://www.youtube.com/watch?v=EUk1XmLUHV4",
       useTimes:[0,155], useNote:"他", srcTimes:[191,242]}
    ],
    whosampledUrl:"https://www.whosampled.com/Kanye-West/Through-the-Wire/",
    artwork:"1. The College Dropout/College Dropout artwork.jpg",
    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"Kanyeの最初のソロシングル（2003年）。2002年10月23日、ロサンゼルスでの交通事故で顎の骨を骨折したKanyeが、顎をワイヤーで固定したままスタジオに入り、そのまま録音した曲。「顎を通してラップする（through the wire）」というタイトルは文字通りの意味。Chaka Khanの「Through the Fire」をサンプリングし、「逆境を越えて」というメッセージを重ねた。",
    sections:[
      {label:"[Intro: Kanye West & Chaka Khan]",note:null,lines:[
        {en:"(Through the test of time)",ja:"（時の試練を乗り越えて）",ann:null},
        {en:"Yo, Gee, they can't stop me from rappin', can they?",ja:"ジー、奴らは俺がラップするのを止められないよな？",ann:null},
        {en:"Can they, Hop?",ja:"止められるか、ホップ？",ann:null}
      ]},
      {label:"[Chorus: Chaka Khan]",note:"Chaka Khan（本名Yvette Marie Stevens、1953〜）：シカゴ出身のR&B・ソウルシンガー。「I Feel for You」「Ain't Nobody」などで知られる。「Through the Fire」(1984)のサンプルを使用。",lines:[
        {en:"Through the fire, to the limit, to the wall",ja:"炎の中を、限界まで、壁まで",ann:null},
        {en:"For a chance to be with you, I'd gladly risk it all",ja:"お前と一緒にいるチャンスのためなら、喜んですべてをかける",ann:null},
        {en:"Through the fire, through whatever, come what may",ja:"炎の中を、何があっても、どんな事態が来ても",ann:null},
        {en:"For a chance at loving you, I'd take it all the way",ja:"お前を愛するチャンスのためなら、最後まで行く",ann:null},
        {en:"Right down to the wire, even through the fire",ja:"ワイヤーを通してでも、炎の中でも",ann:null}
      ]},
      {label:"[Post-Chorus: Kanye West]",note:null,lines:[
        {en:"I spit it through the wire, man",ja:"ワイヤー越しにラップしてるんだ",ann:null},
        {en:"There's too much stuff on my heart right now, man",ja:"今は心にたくさんのことが詰まってる",ann:null},
        {en:"I'd gladly risk it all right now",ja:"今すぐすべてをかける",ann:null},
        {en:"It's a life-or-death situation, man",ja:"これは生死の問題だ",ann:null},
        {en:"Y'all, y'all don't really understand how I feel right now, man",ja:"お前ら、今の俺の気持ちはわかってないと思う",ann:null},
        {en:"It's your boy, Kanye To The…",ja:"お前らのボーイ、カニエ……",ann:null},
        {en:"Chi-Town, what's goin' on?",ja:"シカゴ、調子どうだ？",ann:null}
      ]},
      {label:"[Verse 1: Kanye West]",note:null,lines:[
        {en:"I drink a Boost for breakfast, an Ensure for dessert",ja:"朝食にブーストを飲んで、デザートにエンシュアを飲む",ann:"Boost / Ensure：経口栄養補助飲料のブランド。顎を固定されて噛めない状態でも飲める飲み物として言及。"},
        {en:"Somebody order pancakes, I'll just sip the sizzurp",ja:"誰かがパンケーキを注文してる、俺はシズラップをすするだけ",ann:"sizzurp（シズラップ）：コデイン入り咳止めシロップを使った飲み物。ここでは流動食しか摂れない状況とも掛かる。"},
        {en:"That right there could drive a sane man berserk",ja:"それは正気な人間を狂わせる",ann:null},
        {en:"Not to worry, Mr. H-to-the-izz-O's back to w-izz-ork",ja:"心配するな、エイチ・トゥ・ジ・イゾー（Jay-Z）が仕事に戻る",ann:"Jay-Z「Izzo (H.O.V.A.)」のフロウを模した言い回し。"},
        {en:"How do you console my mom, or give her light support",ja:"どうすれば俺のお母さんを慰められる、軽いサポートを与えられる",ann:null},
        {en:"Tellin' her her son's on life support?",ja:"息子が生命維持装置につながれてると伝えて？",ann:null},
        {en:"And just imagine how my girl feel",ja:"彼女がどんな気持ちかを想像してみろ",ann:null},
        {en:"On the plane scared as hell that her guy look like Emmett Till",ja:"飛行機に乗りながら怯えてた、彼氏の顔がエメット・ティルに見えると",ann:"Emmett Till（1941〜1955年）：14歳で白人女性への口笛を疑われミシシッピ州で惨殺された黒人少年。遺体は顔面が損壊しており、公開葬儀が公民権運動の火付け役となった。Kanyeの顔の損傷の深刻さを伝える表現。"},
        {en:"She was with me before the deal, she'd been tryna be mine",ja:"彼女は契約前から俺と一緒にいた、俺のものになろうとしてた",ann:null},
        {en:"She a Delta, so she been throwin' that Dynasty sign",ja:"彼女はデルタ（ソロリティ）なんだ、だからダイナスティサインを出してた",ann:"Delta：Delta Sigma Theta（黒人女性ソロリティ）。「ダイナスティサイン」はJay-ZのRoc-A-Fellaのハンドサイン。"},
        {en:"No use in me tryna be lyin', I've been tryna be signed",ja:"嘘をついても意味がない、ずっとサインを目指してた",ann:null},
        {en:"Tryin' to be a millionaire; ha–I used two lifelines",ja:"ミリオネアになろうとしてた、ハ——ライフラインを二つ使った",ann:"クイズ番組「Who Wants to Be a Millionaire」のライフライン（ヒント権）に掛けたジョーク。"},
        {en:"In the same hospital where Biggie Smalls died",ja:"ビギー・スモールズが死んだ同じ病院で",ann:"Biggie Smalls＝Notorious B.I.G.（1972〜1997年）。病院はCedars-Sinai Medical Center（ロサンゼルス）。"},
        {en:"The doctor said I had blood clots, but I ain't Jamaican, man",ja:"医者は血栓があると言った、でも俺はジャマイカ人じゃない",ann:"「clot」はジャマイカのパトワ語で「馬鹿者」を意味するスラングでもある掛け言葉。"},
        {en:"Story on MTV and I ain't tryna make Da Band",ja:"MTVに話が流れたが、俺はダ・バンドを作ろうとしてるんじゃない",ann:"Da Band：P. Diddyが2002〜2003年にMTV「Making the Band」で結成したグループ。"},
        {en:"I swear, this, right here, history in the makin', man",ja:"誓う、これは歴史が作られてる瞬間だ",ann:null}
      ]},
      {label:"[Verse 2: Kanye West]",note:null,lines:[
        {en:"What if somebody from the Chi' that was ill got a deal",ja:"シカゴ出身の才能ある人間が契約を取ったとしたら",ann:null},
        {en:"On the hottest rap label around?",ja:"一番ホットなラップレーベルで",ann:null},
        {en:"But he wasn't talkin' 'bout coke and birds",ja:"でも彼はコカインや鳥（コカイン）の話をしていない",ann:null},
        {en:"It was more like spoken word, 'cept he's really puttin' it down?",ja:"スポークンワードに近いが、本気でやっていた",ann:null},
        {en:"And he explained the story 'bout how Blacks came from glory",ja:"黒人がどこから来たかという栄光の物語を説明した",ann:null},
        {en:"And what we need to do in the game",ja:"ゲームの中で何をすべきかも",ann:null},
        {en:"Good dude, bad night, right place, wrong time",ja:"いい人間、悪い夜、正しい場所、間違った時間",ann:null},
        {en:"In the blink of a eye, his whole life changed",ja:"目を閉じた瞬間に、人生が全部変わった",ann:null},
        {en:"If you could feel how my face felt",ja:"俺の顔がどんな感触だったか感じてみたら",ann:null},
        {en:"You would know how Mase felt (Mason Betha!)",ja:"メイスの気持ちがわかるはずだ（メイソン・ベサ！）",ann:"Mase（本名Mason Betha）：Harlem出身のラッパー。"},
        {en:"Thank God I ain't too cool for the safe belt",ja:"シートベルトをしてた自分に感謝する",ann:null},
        {en:"I swear to God, driver two wanna sue",ja:"誓うが、もう一人の運転手は訴えようとした",ann:null},
        {en:"I got a lawyer for the case, to keep what's in my safe–safe",ja:"ケースのために弁護士を用意した、金庫の中のものを守るために",ann:null},
        {en:"My dawgs couldn't tell if I…",ja:"仲間は俺かどうかわからなかった",ann:null},
        {en:"I looked like Tom Cruise in Vanilla Sky, it was televised",ja:"バニラ・スカイのトム・クルーズみたいな顔で、テレビに流れた",ann:"Vanilla Sky（バニラ・スカイ）：2001年のサイコスリラー映画。主人公の顔面が損傷する。"},
        {en:"\"There's been an accident,\" like GEICO",ja:"「事故がありました」、GEICOのCMのように",ann:"GEICO：アメリカの自動車保険会社。"},
        {en:"They thought I was burnt up like Pepsi did Michael",ja:"ペプシがマイケルにしたように燃えたと思われた",ann:"1984年にMichael JacksonがペプシのCM撮影中に爆発事故で頭部に火傷を負った事件。"},
        {en:"I must got a angel, 'cause look how death missed his ass",ja:"天使がついてるに違いない、死が俺を見逃した",ann:null},
        {en:"Unbreakable, what you thought, they call me Mr. Glass?",ja:"壊れない——ミスター・グラスとでも思ったか？",ann:"Mr. Glass（ミスター・グラス）：映画「アンブレイカブル」(2000)のヴィラン。骨が極めて脆い人物への逆説的な言及。"},
        {en:"Look back on my life like the Ghost of Christmas Past",ja:"過去のクリスマスの幽霊のように自分の人生を振り返る",ann:"ディケンズ「クリスマス・キャロル」の過去を見せる亡霊。"},
        {en:"Toys \"R\" Us where I used to spend that Christmas cash",ja:"トイザらス、クリスマスのお金を使ってた場所",ann:null},
        {en:"And I still won't grow up, I'm a grown-ass kid",ja:"それでも成長しない、俺は大人の子供だ",ann:null},
        {en:"Swear I should be locked up for stupid shit that I did",ja:"馬鹿なことをしたから刑務所に入るべきだと思う",ann:null},
        {en:"But I'm a champion, so I turned tragedy to triumph",ja:"でも俺はチャンピオンだから、悲劇を勝利に変えた",ann:null},
        {en:"Make music that's fire, spit my soul through the wire",ja:"炎のような音楽を作って、ワイヤー越しに魂を吐き出す",ann:null}
      ]}
    ]
  }},
  {num:"20",title:"Family Business",feat:null,hasLyrics:true,data:{
    num:"20",title:"Family Business",feat:null,
    producer:"Kanye West",
    youtubeUrl:"https://www.youtube.com/watch?v=oNVbFQHf9L8",
    wayakuUrl:"https://www.youtube.com/watch?v=LStPsBg0dWE",
    sample:"The Dells「Fonky Thang, Diamon' Rang」(1972)",
    sampleSources:[
      {artist:"The Dells",title:"Fonky Thang, Diamon' Rang",year:1972,
       url:"https://www.whosampled.com/sample/15085/Kanye-West-Family-Business-The-Dells-Fonky-Thang,-Diamon%27-Rang/",
       youtubeUrl:"https://www.youtube.com/watch?v=T3oL-OwTqZY",
       useTimes:[10], useNote:"他", srcTimes:[16]}
    ],
    whosampledUrl:"https://www.whosampled.com/Kanye-West/Family-Business/",
    artwork:"1. The College Dropout/College Dropout artwork.jpg",
    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"The College Dropoutの最も内省的な曲の一つ。家族の集まり、刑務所にいる従兄弟、亡くなった祖母、家族の喧嘩、共に育った記憶——それらすべてをKanyeが「家族のことは家族の中だけで解決しろ」という言葉でまとめる。アルバム全体の物質主義・虚構批評の中で、「これが本当に大切なもの」として提示されるトラック。コーラスの「all that glitters is not gold」はThe Dells「Fonky Thang, Diamon' Rang」のサンプル。",
    sections:[
      {label:"[Intro]",note:null,lines:[
        {en:"How's your son?",ja:"息子さんはどう？",ann:null},
        {en:"He made the team this year?",ja:"今年チームに入った？",ann:null},
        {en:"Aight, they said he wasn't tall enough",ja:"そうか、背が足りないと言われてたのに",ann:null},
        {en:"Ma', we here, we gon' cook this Sunday, okay? So come by",ja:"ママ、俺たちここにいる、今度の日曜は料理するから来て",ann:null},
        {en:"Damn, that's your new girlfriend?",ja:"くそ、それがお前の新しい彼女か？",ann:null}
      ]},
      {label:"[Verse 1]",note:null,lines:[
        {en:"This is family business",ja:"これは家族の話",ann:null},
        {en:"And this is for the family that can't be with us",ja:"一緒にいられない家族のために",ann:null},
        {en:"And this is for my cousin locked down, know the answer's in us",ja:"刑務所に入ってる従兄弟のために、答えは俺たちの中にあるとわかってる",ann:null},
        {en:"This why I spit it in my songs so sweet, like a photo of your granny's picture",ja:"だからこんなに甘く曲に込める、祖母の写真のように",ann:null},
        {en:"Now that you're gone, it hit us",ja:"お前がいなくなって、本当に響いてくる",ann:null},
        {en:"Super hard on Thanksgiving and Christmas, this can't be right",ja:"感謝祭とクリスマスに特に辛い、これは正しくない",ann:null},
        {en:"Yo, you heard the track I did, man? \"This Can't Be Life\"",ja:"ねえ、俺が作った曲聴いたか？「ディス・キャント・ビー・ライフ」",ann:"「This Can't Be Life」：Jay-ZのアルバムThe Dynasty: Roc La Familia（2000年）収録曲。Kanye West制作。このビートがJay-Zに認められ、Roc-A-Fellaとの関係を深めるきっかけになった。"},
        {en:"Somebody please say grace, so I can save face",ja:"誰か感謝の祈りを言ってくれ、俺が体裁を保てるように",ann:null},
        {en:"And have a reason to cover my face",ja:"顔を覆う理由が欲しい",ann:null},
        {en:"I even made you a plate, soul food, know how Granny do it",ja:"お前のためにプレートも作った、ソウルフード、グラニーのやり方で",ann:null},
        {en:"Monkey bread on the side, know how the family do it",ja:"サイドにモンキーブレッド、家族のやり方で",ann:null},
        {en:"When I brought it, why the guard had to look all through it?",ja:"持っていったのに、なんで看守は全部調べないといけないんだ？",ann:null},
        {en:"As kids, we used to laugh, who knew that life would move this fast?",ja:"子供の頃は笑ってたのに、こんなに速く人生が進むとは",ann:null},
        {en:"Who knew I'd have to look at you through a glass?",ja:"ガラス越しにお前を見ることになるとは",ann:null},
        {en:"And look, you tell me you ain't did it, then you ain't did it",ja:"聞いてくれ、お前がやってないと言うならやってない",ann:null},
        {en:"And if you did, then that's family business",ja:"やったとしても、それは家族の話だ",ann:null}
      ]},
      {label:"[Chorus]",note:null,lines:[
        {en:"And I don't care about (diamond ring)",ja:"俺はこんなものはどうでもいい（ダイヤモンドの指輪）",ann:null},
        {en:"They don't mean a thing",ja:"そんなものは意味がない",ann:null},
        {en:"All these fancy things",ja:"こんな派手なもの全部",ann:null},
        {en:"I tell you that all is my weight in gold",ja:"俺にとってすべては金と同じ重さだと言う",ann:null},
        {en:"(All that glitters is not gold, all gold is not reality, real is what you lays on me)",ja:"（輝くものすべてが金ではない、金のすべてが現実ではない、本当のものは俺に与えてくれるもの）",ann:"このコーラスのフレーズがThe Dells「Fonky Thang, Diamon' Rang」のサンプル部分。"},
        {en:"Now, all I know, I know all these things",ja:"今、俺が知るのは、俺はこれらすべてを知っているということ",ann:null}
      ]},
      {label:"[Verse 2]",note:null,lines:[
        {en:"Yeah, this is family business",ja:"そうだ、これは家族の話",ann:null},
        {en:"And this is for everybody standing with us",ja:"俺たちと一緒に立ってくれる皆のために",ann:null},
        {en:"Come on, let's take a family Grammy picture",ja:"さあ、家族のグラミー写真を撮ろう",ann:null},
        {en:"Abi, remember when they ain't believe in me?",ja:"アビ、奴らが俺を信じなかった時を覚えてるか？",ann:null},
        {en:"Now she like, \"See! That's my cousin on TV!\"",ja:"今は「見て！ テレビに従兄弟が出てる！」と言ってる",ann:null},
        {en:"Now, we gettin' it and we gon' make it",ja:"今、俺たちはうまくやってる、成功するぞ",ann:null},
        {en:"And they gon' hate it, and I'm his favorite",ja:"奴らは嫌がるだろうが、俺はお前のお気に入りだ",ann:null},
        {en:"I can't deny it, I'm a straight rider",ja:"否定できない、俺はまっすぐなライダーだ",ann:null},
        {en:"But when we get together, be Electric Slidin'",ja:"でも集まったら、エレクトリック・スライドをやる",ann:"Electric Slide（エレクトリック・スライド）：1976年のMarcia Griffithsのヒット曲に合わせたライン・ダンス。家族の集まりで踊られる定番。"},
        {en:"Grandma, get 'em shook up",ja:"グランドマ、みんなを揺らしてくれ",ann:null},
        {en:"Aw, naw, don't open the photobook up",ja:"ああ、いや、フォトブックを開けないで",ann:null},
        {en:"I got a Aunt Ruth that can't remember your name",ja:"名前を思い出せないルース叔母さんがいる",ann:null},
        {en:"But I bet them Polaroids'll send her down memory lane",ja:"でもポラロイド写真を見れば記憶が蘇るはずだ",ann:null},
        {en:"You know that one auntie, you don't mean to be rude",ja:"失礼だとは思ってないんだけど、あのおばちゃんいるでしょ",ann:null},
        {en:"But every holiday, nobody eating her food",ja:"毎回の集まりで、誰も彼女の料理を食べない",ann:null},
        {en:"And you don't wanna stay there 'cause them your worst cousins",ja:"そこには泊まりたくない、最悪の従兄弟たちがいるから",ann:null},
        {en:"Got roaches at they crib like them your first cousins",ja:"アパートにゴキブリがいるような最初の従兄弟たちみたいに",ann:null},
        {en:"Act like you ain't took a bath with your cousin",ja:"従兄弟と一緒に風呂に入ったことがないような顔するな",ann:null},
        {en:"Fit three in the bed if it's six of y'all",ja:"6人なら一つのベッドに3人で寝る",ann:null},
        {en:"I'm talkin' 'bout three by the head and three by the leg",ja:"頭の方に3人、脚の方に3人",ann:null},
        {en:"But you ain't have to tell my girl I used to pee in the bed",ja:"でも俺が昔おねしょしてたことを彼女に言わなくていい",ann:null}
      ]},
      {label:"[Bridge]",note:null,lines:[
        {en:"Rain, rain, rain, go away",ja:"雨よ、雨よ、雨よ、行ってくれ",ann:"童謡「Rain Rain Go Away」（伝統的フォーク）の引用。"},
        {en:"Let the sun come out and all the children say",ja:"太陽が出てきて、子供たちが皆言う",ann:null}
      ]},
      {label:"[Verse 3]",note:null,lines:[
        {en:"I woke up early this morning with a new state of mind",ja:"今朝は新しい気持ちで目が覚めた",ann:null},
        {en:"A creative way to rhyme without using knives and guns",ja:"ナイフも銃も使わずライムするクリエイティブな方法",ann:null},
        {en:"Keep your nose out the sky, keep your heart to God",ja:"鼻を空に向けるな、心を神に向けろ",ann:null},
        {en:"And keep your face to the risin' sun",ja:"顔を昇る太陽に向けろ",ann:"黒人霊歌・公民権歌「Lift Every Voice and Sing」の一節を想起させる。"},
        {en:"All my niggas from the Chi' is my family, dawg",ja:"シカゴの仲間は全員俺の家族だ",ann:null},
        {en:"And my niggas ain't my guys, they my family, dawg",ja:"俺の仲間はただの友達じゃない、俺の家族だ",ann:null},
        {en:"I feel like, one day, you'll understand me, dawg",ja:"いつかお前は俺を理解できると感じてる",ann:null},
        {en:"You can still love your man and be manly, dawg",ja:"男を愛しながら男らしくいることもできる",ann:null},
        {en:"You ain't gotta get heated at every housewarmin'",ja:"引っ越し祝いのたびにキレなくていい",ann:null},
        {en:"Sittin' here, grillin' people like George Foreman",ja:"ジョージ・フォアマンのように人を睨みつけてる",ann:"George Foreman：ヘビー級ボクシングチャンピオン。ジョージ・フォアマン・グリル（家庭用電気グリル）のCMでも有名。「grillin'」＝睨みつけるとのダブルミーニング。"},
        {en:"Why Uncle Ray and Aunt Sheila always performin'?",ja:"なんでレイ叔父さんとシェイラ叔母さんはいつもパフォーマンスするんだ？",ann:null},
        {en:"Second she storm out, then he storm in",ja:"彼女が怒って出ると、彼が怒って入ってくる",ann:null},
        {en:"Y'all gon' sit down, have a good time this reunion",ja:"みんな座って、この同窓会を楽しもう",ann:null},
        {en:"And drink some wine like Communion",ja:"聖餐のようにワインを飲もう",ann:null},
        {en:"And act like everything fine and if it isn't",ja:"何事もうまくいってるふりをして、もしうまくいってなくても",ann:null},
        {en:"We ain't letting everybody in our family business, uh",ja:"家族の問題を皆には見せない",ann:null}
      ]},
      {label:"[Outro: Tarrey Torae]",note:null,lines:[
        {en:"All these things",ja:"これらすべてのことが",ann:null},
        {en:"CLK Mercedes Benz",ja:"CLKメルセデス・ベンツ",ann:"CLK Mercedes：メルセデス・ベンツCLKクラス。「家族の絆と比べると、こんな高級車なんて取るに足らない」という対比が完成する。"},
        {en:"A whole lotta money",ja:"たくさんのお金",ann:null},
        {en:"Mommy and Daddy, can you please stop fighting?",ja:"ママとパパ、お願いだから喧嘩をやめて",ann:null},
        {en:"Let's get Stevie out of jail",ja:"スティービーを刑務所から出そう",ann:"Stevie：アルバムに登場する「刑務所にいる従兄弟」を指すと考えられる。"}
      ]}
    ]
  }},

    year:"2004年",label:"Roc-A-Fella / Def Jam",
    desc:"The College Dropoutのクロージングトラック。前半約4分はラップパート、後半約8分は完全にスポークンワードでKanyeがRoc-A-Fellaとの契約を勝ち取るまでの経緯を語る独白。「ラストコール（最後の呼びかけ）」というタイトルは、バーが閉まる前の最後の注文の合図。Jay-Zを交えてのトーストで始まり、Kanyeの自伝的告白で終わる。コーラスの「(Mr. Rockefeller)」はBette Midler「Mr. Rockefeller」(1976)のサンプル。",
    sections:[
      {label:"[Intro: JAY-Z]",note:null,lines:[

      ]},

        {en:"And they ask me, they ask me, they ask me, I tell them (Mr. Rockefeller)",ja:"みんなが聞く、みんなが聞く、みんなが聞く、俺は答える（ミスター・ロックフェラー）",ann:null},
        {en:"Raise your glasses, your glasses, your glasses to the sky and (Here's to the Roc)",ja:"グラスを上げろ、空に向けて（ロックに乾杯）",ann:null},
        {en:"This is the last call for alcohol, for the (Mr. Rockefeller)",ja:"これは最後の酒の呼びかけだ（ミスター・ロックフェラー）",ann:null},
        {en:"So get your ass up off the wall",ja:"壁から尻を離せ",ann:null}
      ]},
      {label:"[Verse 1: Kanye West]",note:null,lines:[
        {en:"The all around the world Digital Underground Pac",ja:"世界中のデジタル・アンダーグラウンド・パック（2Pac）のような存在",ann:"Digital Underground（デジタル・アンダーグラウンド）：オークランド出身のヒップホップグループ。2Pac（トゥパック・シャクール）はここから出た。"},
        {en:"The Rudolph the red-nosed reindeer of the Roc",ja:"ロックの赤鼻のトナカイ・ルドルフ",ann:"Rudolph：仲間外れにされながらも最終的に認められた赤鼻のトナカイ。業界での自分の立場を重ねた比喩。"},
        {en:"I take my chain, my fifteen seconds of fame",ja:"俺のチェーンと15秒の名声を持って",ann:null},
        {en:"And come back next year with the whole fucking game",ja:"来年はゲーム全体を持って戻ってくる",ann:null},
        {en:"Ain't nobody expect Kanye to end up on top",ja:"カニエがトップになるとは誰も思ってなかった",ann:null},
        {en:"They expected that College Dropout to drop and then flop",ja:"大学中退者がアルバムを出して失敗すると思ってた",ann:null},
        {en:"Then maybe he stop savin' all the good beats for himself",ja:"そうすれば自分のために良いビートを溜め込むのをやめるだろうと",ann:null},
        {en:"Roc-A-Fella's only niggas that helped",ja:"助けてくれたのはロカフェラの仲間だけ",ann:null},
        {en:"My money was thinner than Sean Paul's goatee hair",ja:"俺のお金はショーン・ポールの山羊ひげより薄かった",ann:"Sean Paul：ジャマイカのレゲトンシンガー。薄い山羊ひげで知られる。"},
        {en:"Now Jean Paul Gaultier cologne fill the air, here",ja:"今はジャン・ポール・ゴルチエのコロンが漂う",ann:"Jean Paul Gaultier（ジャン・ポール・ゴルチエ）：フランスの高級ブランド。Sean Paul/Jean Paulの韻と経済的成功の象徴。"},
        {en:"They say he bougie, he big-headed",ja:"気取ってる、思い上がってると言われる",ann:null},
        {en:"Would you please stop talking 'bout how my dick head is?",ja:"俺のについてのコメントはやめてくれ？",ann:"big-headed（うぬぼれ）とdick headの下ネタ的言葉遊び。"},
        {en:"Flow infectious, give me ten seconds",ja:"フローは感染力がある、10秒くれ",ann:null},
        {en:"I'll have a buzz bigger than insects in Texas",ja:"テキサスの昆虫より大きなバズを起こす",ann:null},
        {en:"It's funny how wasn't nobody interested",ja:"誰も興味を持ってなかったのが面白い",ann:null},
        {en:"'Til the night I almost killed myself in Lexus",ja:"レクサスで死にかけた夜まで",ann:"2002年10月の自動車事故への言及。この事故を経て「Through the Wire」を録音し注目を集めた。"}
      ]},

      ]},
      {label:"[Verse 2: Kanye West]",note:null,lines:[
        {en:"Now was Kanye the most overlooked? Yes, sir",ja:"カニエは最も見過ごされてたか？ その通り",ann:null},
        {en:"Now is Kanye the most overbooked? Yes, sir",ja:"カニエは今最も予約が多いか？ その通り",ann:null},
        {en:"Though the fans want the feeling of A Tribe Called Quest",ja:"ファンはア・トライブ・コールド・クエストの感覚を求めてるが",ann:"A Tribe Called Quest：ニューヨーク出身のヒップホップグループ。1990年代のリリシスト・ヒップホップの象徴。"},
        {en:"But all they got left is this guy called West",ja:"残されたのはウェストと呼ばれるこの男だけ",ann:null},
        {en:"That'll take Freeway, throw him on tracks with Mos Def",ja:"フリーウェイを連れてきて、モス・デフとのトラックに載せる",ann:null},
        {en:"Call him Kwa-li or Kwe-li, I put him on songs with JAY-Z",ja:"クワーリかクウェリ（タリブ・クウェリ）、ジェイ・ジーと曲を作る",ann:null},
        {en:"I'm the Gap like Banana Republic and Old Navy, and oooh",ja:"バナナ・リパブリックとオールドネイビーのようなギャップだ、そして",ann:"Gap・Banana Republic・Old Navyはいずれも同じGap Inc.傘下。Kanyeがそれらをつなぐ「ギャップ（橋渡し）」だという意味。"},
        {en:"It come out sweeter than old Sadie",ja:"オールド・セイディより甘く出てくる",ann:"The Spinners「Sadie」への言及。"},
        {en:"Nice as Bun-B when I met him at the Source awards",ja:"ソース・アワーズでバン・ビーに会った時と同じくらいナイス",ann:"Bun-B（バン・ビー）：テキサス出身のラッパー、UGKのメンバー。"},
        {en:"Girl, he had with him, ass coulda won the horse awards",ja:"彼が連れてた女の子、馬の賞を取れるくらいの尻",ann:null},
        {en:"And I was almost famous, now everybody love Kanye",ja:"俺はほぼ有名だったが、今や皆がカニエを愛してる",ann:null},
        {en:"I'm almost Raymond",ja:"俺はほぼ「レイモンドはみんなに好かれる」",ann:"TVシットコム「Everybody Loves Raymond」への掛け言葉。"},
        {en:"Some say he arrogant, can y'all blame him?",ja:"傲慢だと言う人もいる、責められるか？",ann:null},
        {en:"It was straight embarrassing how y'all played him",ja:"お前らの扱いは本当に恥ずかしいものだった",ann:null},
        {en:"Last year shoppin' my demo, I was tryin' to shine",ja:"去年はデモを持ち込んで輝こうとしてた",ann:null},
        {en:"Every motherfucker told me that I couldn't rhyme",ja:"全員が俺にはラップできないと言った",ann:null},
        {en:"Now I could let these dream killers kill my self-esteem",ja:"ドリームキラーたちに自尊心を壊させることもできた",ann:null},
        {en:"Or use my arrogance as the steam to power my dreams",ja:"でも傲慢さを夢を動かすための蒸気として使えた",ann:null},
        {en:"I use it as my gas, so they say that I'm gassed",ja:"それを燃料として使う、だからガスがかかってると言われる",ann:null},
        {en:"But without it, I'd be last, so I ought to laugh",ja:"でもそれがなければ最下位だった、だから笑うしかない",ann:null},
        {en:"So I don't listen to the suits behind the desk no more",ja:"だからデスクの後ろのスーツ姿には耳を貸さない",ann:null},
        {en:"You niggas wear suits 'cause you can't dress no more",ja:"お前らがスーツを着るのは着こなせないからだ",ann:null},
        {en:"You can't say shit to Kanye West no more",ja:"もうカニエ・ウェストに何も言えない",ann:null},
        {en:"I rocked 20,000 people, I was just on tour, nigga",ja:"2万人の前でライブした、ツアー中のことだ",ann:null},
        {en:"I'm Kon, the Louis Vuitton Don",ja:"俺はコン、ルイ・ヴィトン・ドン",ann:"Louis Vuitton Don：Kanyeの自称の初出。後に「Graduation」(2007)で定着するアイコン的ニックネーム。"},
        {en:"Bought my mom a purse, now she Louis Vuitton Mom",ja:"ママにバッグを買った、今や彼女はルイ・ヴィトン・マム",ann:null},
        {en:"I ain't play the hand I was dealt, I changed my cards",ja:"配られた手は使わなかった、カードを変えた",ann:null},
        {en:"I prayed to the skies and I changed my stars",ja:"空に祈って、星を変えた",ann:null},
        {en:"I went to the malls and I balled too hard",ja:"モールに行って、使いすぎた",ann:null},
        {en:"\"Oh my god, is that a black card?\"",ja:"「えっ、それってブラックカード？」",ann:null},
        {en:"I turned around and replied, \"Why, yes",ja:"振り返って答えた、「そうだ",ann:null},
        {en:"But I prefer the term African American Express\"",ja:"でも私はアフリカン・アメリカン・エクスプレスという言葉を好む」",ann:"American Express Centurion（ブラックカード）のパロディ。人種の呼称をめぐるユーモア。"},
        {en:"Brains, power, and muscle",ja:"頭脳、力、筋肉",ann:null},
        {en:"Like Dame, Puffy, and Russell",ja:"デイム、パフィー、ラッセルのように",ann:"Damon Dash（Roc-A-Fella）、Sean Combs（Bad Boy）、Russell Simmons（Def Jam）——黒人ヒップホップ業界の大物経営者3人。"},
        {en:"Your boy back on his hustle",ja:"お前らのボーイは再びハッスル中",ann:null},
        {en:"You know what I've been up to",ja:"何をしてたかわかるだろ",ann:null},
        {en:"Killin y'all niggas on that lyrical shit",ja:"リリカルなやつでお前らニガーを殺してる",ann:null},
        {en:"Mayonnaise-colored Benz, I push Miracle Whips",ja:"マヨネーズ色のベンツ、ミラクルウィップを走らせる",ann:"このラインをJay-Zに聴かせたことがRoc-A-Fella契約のきっかけの一つになったとOutroで語られる。"}
      ]},
      {label:"[Outro: Kanye West（スポークンワード）]",note:"アルバム終盤の約8分間、KanyeがRoc-A-Fellaとの契約を勝ち取るまでの経緯を語る自伝的独白。[ ]内は会話の相手の発言。",lines:[
        {en:"So this A&R over at Roc-A-Fella, named Hip Hop picked the \"Truth\" beat for Beanie. And I was in the session with him. I had my demo with me. I play the songs, he's like \"Who that spittin'?\" I'm like \"It's me.\"",ja:"ロカフェラのA&Rのヒップ・ホップという男が、ビーニー（シーガル）のために「Truth」のビートを選んだ。俺はそのセッションにいた。デモを持ってた。曲をかけると、「誰がラップしてるんだ？」「俺だよ」という感じだった。",ann:"Hip Hop（本名John Davis）：Roc-A-FellaのA&R担当でKanyeを発掘した人物。"},
        {en:"He started talkin' to me on the phone... askin' me to send him beats, 'cause he had this other kid named Just Blaze he was messin' with",ja:"彼は俺に電話で話し始めた……ビートを送るよう頼まれた。ジャスト・ブレイズという別の男とも仕事してたから",ann:"Just Blaze（ジャスト・ブレイズ）：ニュージャージー出身のプロデューサー。Roc-A-Fella黄金期の制作を担った。"},
        {en:"He was friends with my mentor, No ID. And No ID told him, \"Look, man, you wanna mess with Kanye you need to tell him that you like the way he rap\"",ja:"彼は俺のメンター、ノー・アイディーと友達だった。ノー・アイディーは彼に言った、「カニエとやるなら、彼のラップスタイルが好きだと伝えないといけない」",ann:"No ID（ノー・アイディー）：シカゴのプロデューサー。Kanyeのメンターで、Common作品でも知られる。"},
        {en:"[Hiphop: \"I'll sign you as a producer and a rapper\"]",ja:"ヒップ・ホップ：「プロデューサーとラッパー両方でサインする」",ann:null},
        {en:"I made this one beat where I sped up this Harold Melvin sample... \"Oh, yo that shit is crazy Jay might want it for this compilation album he doin', called The Dynasty.\" I just bit the drums off \"Xxplosive\" and put it with a sped-up sample, and now it's kind of like my whole style, when he rapped on \"This Can't Be Life.\"",ja:"ハロルド・メルヴィンのサンプルを速めたビートを作った……「ジェイが『ダイナスティ』というコンピに使いたがるかも」と言われた。ドレーの「エクスプロシブ」のドラムをパクって速めたサンプルに合わせた。それが今の俺のスタイルの始まり、ジェイが「ディス・キャント・ビー・ライフ」でラップした時だ。",ann:"Harold Melvin（ハロルド・メルヴィン）：「Harold Melvin & The Blue Notes」のソウルシンガー。Kanyeが初期サンプリングに使用。ドラムはDr. Dre「Xxplosive」(Chronic 2001)から。これがソウル・サウンド復活のきっかけになったとKanyeは語る。"},
        {en:"That day, I came and I tracked the beat and I got to meet JAY-Z and he said... [JAY-Z: \"Oh, you a real soulful dude, man\"]",ja:"その日、ビートをトラックしに来てジェイ・ジーに会って、こう言われた……［ジェイ・ジー：「お前は本当にソウルフルなやつだな、マン」］",ann:null},
        {en:"My relationship with Kweli I think was one of the best ones to ever happen to my career as a rapper. Because, later he allowed me to go on tour with him. I love him for that.",ja:"クウェリとの関係は俺のラッパーとしてのキャリアで最も良かった関係の一つだと思う。後に彼は俺をツアーに連れてってくれた。愛してる。",ann:"Talib Kweli（タリブ・クウェリ）：Kanyeをデビュー前のツアーに同行させ、初期キャリアに貢献した。"},
        {en:"Everybody out there listen here: I played them \"Jesus Walks\" and they didn't sign me. It'd be somebody at the company that'll say, \"Naw.\"",ja:"聞いてくれ：「ジーザス・ウォークス」を聴かせたのに誰もサインしなかった。会社の上の人間が「ノー」と言ったんだ。",ann:null},
        {en:"[Jessica: \"Man, you niggas is stupid if y'all don't sign Kanye, for real.\"]",ja:"ジェシカ：「カニエをサインしないなら本当にバカだ」",ann:null},
        {en:"The person who actually kicked everything off was Joe 3H from Capitol Records. He wanted to sign me really bad [Joe: \"We gonna change the game, buddy.\"]",ja:"実際にすべてを始動させたのはキャピトル・レコードのジョー・スリー・エイチだった。彼は本当に俺をサインしたがってた［ジョー：「ゲームを変えるぞ、相棒」］",ann:null},
        {en:"Then I played a song called 'Wow.' \"I go to Jacob with 25 thou, you go with 25 hundred, wow / I got 11 plaques on my walls right now / You got your first gold single, damn, nigga, wow.\" [Dame: \"Oh shit it's not even wack.\"]",ja:"それから「ワウ」という曲をかけた。「俺はジェイコブに2万5千ドル持ってく、お前は2千5百ドル、ワウ／今俺の壁には11枚のプラークがある／お前は最初のゴールドシングルを取ったばかり、くそ、ニガー、ワウ」［デイム：「くそ、これクソじゃないじゃん」］",ann:"Dame（デイモン・ダッシュ）：Roc-A-Fella共同創業者。「Wow」は未発表のままの曲。"},
        {en:"Dame took me into the office: \"yo man, B, you don't want a brick... You gotta be under an umbrella, you'll get rained on.\" Even with that, I was still about to take the deal with Capitol because of my relationship with 3H. I'm a man of my word.",ja:"デイムは俺をオフィスに連れ込んで「リスクを取るな……傘の下にいないと雨に濡れる」と言った。それでも3Hとの関係があったから、キャピトルとの契約を取るつもりだった。男に二言はないから。",ann:null},
        {en:"Then people told 3H, \"oh he's just a producer-rapper.\" The day I planned out everything—picked out clothes, booked studio sessions, arranged my album—they had Mel call me [Mel: \"Yo, Capitol pulled out on the deal.\"]",ja:"誰かが3Hに「ただのプロデューサー・ラッパーだ」と言った。全部計画してた日——服を選び、スタジオを予約し、アルバムを組んでいた——メルが電話してきた［メル：「キャピトルが契約を引いた」］",ann:null},
        {en:"I called G, I said, \"man, you think we could still get that deal with Roc-A-Fella?\" So won't you raise your glass, won't you?",ja:"Gに電話した、「まだロカフェラと契約できると思うか？」と聞いた。だからグラスを上げてくれ",ann:"このオープンエンドな締めくくりが、Roc-A-Fellaとの契約＝The College Dropoutへと繋がっていく。"}
      ]}
    ]

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function applyGlossary(text) {
  let r = esc(text||'');
  Object.keys(GLOSSARY).sort((a,b)=>b.length-a.length).forEach(term => {
    const e = term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    r = r.replace(new RegExp(`(?<![\\w>])(${e})(?![\\w<])`,'g'),
      `<span class="gl-term" data-term="${term.replace(/"/g,'&quot;')}">$1</span>`);
  });
  return r;
}


// ══════════════════════════════════════════
// OTHER ALBUMS HELPERS
// ══════════════════════════════════════════
function renderOtherAlbumsSidebar() {
  return OTHER_ALBUMS.map(alb => {
    const aOpen = albumOpen[alb.id] || false;
    const ovView = 'other-overview:' + alb.id;
    const trackHTML = alb.tracks.map(t => {
      const vStr = 'other-track:' + alb.id + ':' + t.num;
      const act = view === vStr;
      return '<button class="track-btn no-lyrics' + (act?' active':'') + '" data-view="' + vStr + '">' +
        '<span class="track-num">' + esc(t.num) + '</span>' +
        '<span class="track-info"><div class="track-name">' + esc(t.title) + '</div>' +
        (t.feat ? '<div class="track-feat">' + esc(t.feat) + '</div>' : '') +
        '</span></button>';
    }).join('');
    return '<div class="album-item">' +
      '<button class="album-toggle' + (aOpen?' open':'') + '" data-album="' + alb.id + '">' +
        '<span class="album-chevron">▶</span>' +
        (ART_DATA[ovView]?'<img class="album-thumb" src="'+ART_DATA[ovView]+'" alt="">':'') +
        '<span class="album-info">' +
          '<div class="album-name">' + esc(alb.title) + '</div>' +
          '<div class="album-year">' + alb.year + ' · ' + alb.tracks.length + '曲（準備中）</div>' +
        '</span></button>' +
      '<div class="album-tracks' + (aOpen?' open':'') + '">' +
        '<button class="track-btn' + (view===ovView?' active':'') + '" data-view="' + ovView + '" style="padding-left:22px;font-size:10px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;">' +
          '<span></span><span>アルバム概要</span></button>' +
        trackHTML +
      '</div></div>';
  }).join('');
}

function renderOtherAlbumOverview(alb) {
  return `
    <div class="album-hdr-main">
      <div class="album-art">
        <div class="album-art-ph">${esc(alb.shortTitle)}</div>
      </div>
      <div class="album-body">
        <div class="hdr-track">${esc(alb.artist)} · ${esc(alb.label)} · ${alb.year}</div>
        <h1 class="hdr-title">${esc(alb.title)}</h1>
        <div class="hdr-meta">
          <div class="hdr-meta-item"><b>アーティスト</b>${esc(alb.artist)}</div>
          <div class="hdr-meta-item"><b>リリース</b>${esc(alb.releaseDate)}</div>
          <div class="hdr-meta-item"><b>収録曲</b>${alb.tracks.length}曲</div>
        </div>
        <div class="hdr-desc">${esc(alb.desc)}</div>
      </div>
    </div>
    <div class="coming-soon-wrap">
      <div class="cs-rule"></div>
      <div class="cs-title">収録曲（和訳・注釈制作中）</div>
      <div class="cs-tracklist">
        ${alb.tracks.map(t=>`
          <div class="cs-track" style="cursor:pointer" onclick="navigate('other-track:${alb.id}:${t.num}')">
            <span class="cs-num">${esc(t.num)}</span>
            <span>
              <div class="cs-name">${esc(t.title)}</div>
              ${t.feat?`<div class="cs-feat-sm">${esc(t.feat)}</div>`:''}
            </span>
          </div>`).join('')}
      </div>
    </div>`;
}

// ══════════════════════════════════════════
// SIDEBAR
// ══════════════════════════════════════════
function renderSidebar() {
  const nav = document.getElementById('album-nav');

  // Late Registration
  const lrActive = view.startsWith('lr-');
  const lrOpen = albumOpen.lr;
  const lrTrackHTML = LR_ALL_TRACKS.map(t => {
    const hasLyrics = !!t.hasLyrics;
    const viewStr = hasLyrics ? `lr-song:${t.songId}` : `lr-track:${t.num}`;
    const active = view === viewStr;
    return `<button class="track-btn${!hasLyrics?' no-lyrics':''}${active?' active':''}" data-view="${viewStr}">
      <span class="track-num">${esc(t.num)}</span>
      <span class="track-info">
        <div class="track-name">${esc(t.title)}</div>
        ${t.feat?`<div class="track-feat">${esc(t.feat)}</div>`:''}
      </span>
    </button>`;
  }).join('');

  // College Dropout
  const cdActive = view.startsWith('cd-');
  const cdOpen = albumOpen.cd;
  const cdTrackHTML = CD_TRACKS.map(t => {
    const active = view === `cd-track:${t.num}`;
    return `<button class="track-btn no-lyrics${active?' active':''}" data-view="cd-track:${t.num}">
      <span class="track-num">${esc(t.num)}</span>
      <span class="track-info">
        <div class="track-name">${esc(t.title)}</div>
        ${t.feat?`<div class="track-feat">${esc(t.feat)}</div>`:''}
      </span>
    </button>`;
  }).join('');

  nav.innerHTML = `
    <div class="album-item">
      <button class="album-toggle${cdOpen?' open':''}" data-album="cd">
        <span class="album-chevron">▶</span>
        ${ART_DATA['cd-overview']?`<img class="album-thumb" src="${ART_DATA['cd-overview']}" alt="">`:''}
        <span class="album-info">
          <div class="album-name">The College Dropout</div>
          <div class="album-year">2004 · 21曲（全曲和訳済）</div>
        </span>
      </button>
      <div class="album-tracks${cdOpen?' open':''}">
        <button class="track-btn${view==='cd-overview'?' active':''}" data-view="cd-overview" style="padding-left:22px;font-size:10px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;">
          <span></span><span>アルバム概要</span>
        </button>
        ${cdTrackHTML}
      </div>
    </div>
    <div class="album-item">
      <button class="album-toggle${lrOpen?' open':''}" data-album="lr">
        <span class="album-chevron">▶</span>
        ${ART_DATA['lr-overview']?`<img class="album-thumb" src="${ART_DATA['lr-overview']}" alt="">`:''}
        <span class="album-info">
          <div class="album-name">Late Registration</div>
          <div class="album-year">2005 · 21曲（全曲和訳済）</div>
        </span>
      </button>
      <div class="album-tracks${lrOpen?' open':''}">
        <button class="track-btn${view==='lr-overview'?' active':''}" data-view="lr-overview" style="padding-left:22px;font-size:10px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;">
          <span></span><span>アルバム概要</span>
        </button>
        ${lrTrackHTML}
      </div>
    </div>
    ${renderOtherAlbumsSidebar()}`;

  // Album toggle
  nav.querySelectorAll('.album-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const album = btn.dataset.album;
      const willOpen = !albumOpen[album];
      Object.keys(albumOpen).forEach(k => { albumOpen[k] = false; });
      albumOpen[album] = willOpen;
      if (willOpen) applyAlbumTheme(album);
      renderSidebar();
    });
  });
  // Track / overview buttons
  nav.querySelectorAll('[data-view]').forEach(btn => {
    btn.addEventListener('click', () => {
      navigate(btn.dataset.view);
    });
  });
}

function ytId(url) {
  if (!url) return null;
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/))([\w-]{11})/);
  return m ? m[1] : null;
}
function ytEmbed(url, title, embedId, startSec) {
  const id = ytId(url);
  if (!id) return '';
  const start = startSec ? ('?start=' + startSec) : '';
  return '<div class="sample-embed"><iframe id="' + esc(embedId) + '" data-vid="' + id + '" src="https://www.youtube.com/embed/' + id + start +
    '" title="' + esc(title||'') + '" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen loading="lazy"></iframe></div>';
}
function sampleJump(embedId, sec) {
  const f = document.getElementById(embedId);
  if (!f) return;
  f.src = 'https://www.youtube.com/embed/' + f.dataset.vid + '?start=' + sec + '&autoplay=1';
}
function fmtTime(sec) {
  if (sec == null) return '';
  const m = Math.floor(sec / 60), s = sec % 60;
  return m + ':' + (s < 10 ? '0' : '') + s;
}

            return `
            <div class="sample-item">
              <div class="sample-item-hdr"><span class="sample-item-num">${i+1}</span>サンプル ${i+1} / ${song.sampleSources.length}${roleJP?'　<span class="sample-item-rel">'+esc(roleJP)+'</span>':''}</div>
              <div class="sample-tracks">
                <div class="sample-track">

                    <div class="sample-meta">

                  ${(song.youtubeUrl && src.useTimes)?`<div class="sample-ts">
                    <span class="sample-ts-label">サンプル登場</span>
                    <span class="sample-ts-time">${src.useTimes.map(fmtTime).join('〜')}${src.useNote?' '+esc(src.useNote):''}</span>
                    <button class="sample-ts-link" onclick="sampleJump('${useId}',${src.useTimes[0]})">▶ サンプル箇所へ</button>
                  </div>`:''}
                </div>
                <div class="sample-connector"><div class="sample-arrow">←</div></div>
                <div class="sample-track">

                  ${src.youtubeUrl?ytEmbed(src.youtubeUrl, src.title, srcId, src.srcTime):''}
                  <div class="sample-track-info">

function applyTermPopListeners() {
  const pop = document.getElementById('term-pop');
  document.querySelectorAll('.gl-term').forEach(el => {
    el.addEventListener('click', e => {
      const g = GLOSSARY[el.dataset.term];
      if (!g) return;
      pop.innerHTML = `<div class="tp-type">${esc(g.type)}</div><div class="tp-name">${esc(el.dataset.term)}</div>${esc(g.desc)}`;
      pop.style.display = 'block';
      const rect = el.getBoundingClientRect();
      let left = rect.left + window.scrollX;
      if (left + 290 > window.innerWidth) left = window.innerWidth - 300;
      pop.style.top = (rect.bottom + 8 + window.scrollY) + 'px';
      pop.style.left = left + 'px';
      e.stopPropagation();
    });
  });
  document.addEventListener('click', () => { pop.style.display = 'none'; });
}

function applyAlbumTheme(albumId) {
  const c = ALBUM_COLORS[albumId] || ALBUM_COLORS.lr;
  const r = document.documentElement.style;
  r.setProperty('--red', c.accent);
  r.setProperty('--ann-bg', c.annBg);
  r.setProperty('--ann-text', c.annText);
}

function toggleSidebar() { document.body.classList.toggle('nav-open'); }
function closeSidebar() { document.body.classList.remove('nav-open'); }

function navigate(v) {
  view = v;
  if (view.startsWith('lr-')) { albumOpen.lr = true; applyAlbumTheme('lr'); }
  else if (view.startsWith('cd-')) { albumOpen.cd = true; applyAlbumTheme('cd'); }
  else if (view.startsWith('other-')) {
    const _id = view.split(':')[1];
    if (_id in albumOpen) albumOpen[_id] = true;
    applyAlbumTheme(_id);
  } else {
    applyAlbumTheme('lr');
  }
  closeSidebar();
  renderSidebar();
  renderContent();
  window.scrollTo(0,0);
}
